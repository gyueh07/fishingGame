async function hashPassword(password){
  const msg = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msg);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function normalizeUpdateNoticeIds(value, oldValue){
  if(Array.isArray(value)) return value;
  if(typeof value === "string" && value) return [value];
  if(Array.isArray(oldValue)) return oldValue;
  if(typeof oldValue === "string" && oldValue) return [oldValue];
  return [];
}

function normalizeResearchLevels(value){
  const base = {fishing:0, appraisal:0};
  if(!value || typeof value !== "object") return base;
  return {
    fishing: Number(value.fishing || 0),
    appraisal: Number(value.appraisal || 0)
  };
}

}


async function checkGameVersion(){
  try{
    const ref = db.collection("config").doc("game");
    const snap = await ref.get();

    if(!snap.exists){
      await ref.set({gameVersion: GAME_VERSION});
      return true;
    }

    const serverVersion = snap.data().gameVersion || GAME_VERSION;

    if(serverVersion !== GAME_VERSION){
      print("구버전 게임입니다.\n\n현재 버전 : " + GAME_VERSION + "\n최신 버전 : " + serverVersion + "\n\n최신 버전으로 업데이트 후 접속해주세요.");
      return false;
    }

    return true;
  }catch(e){
    console.error(e);
    return true;
  }
}

async function saveCloudData(){
  if(!currentUser) return;
  try{
    await db.collection("users").doc(currentUser).set({
      nickname: currentUser,
      money: Math.floor(money),
      rodLevel,
      title: getCurrentTitle(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      gameState: getGameState()
    }, {merge:true});
  }catch(e){
    console.error(e);
  }
}

async function refreshMyCloudData(){
  if(!currentUser) return false;

  try{
    const snap = await db.collection("users").doc(currentUser).get();

  if(!currentUser || !matchText) return;

  try{
    const ref = db.collection("users").doc(currentUser);

    await db.runTransaction(async (tx)=>{
      const snap = await tx.get(ref);
      if(!snap.exists) return;

      const data = snap.data();
      const state = data.gameState || {};
      const list = Array.isArray(state.notifications) ? state.notifications : [];

      const filtered = list.filter(msg => !String(msg).includes(matchText));
      if(filtered.length === list.length) return;

      tx.set(ref, {
        gameState: {
          ...state,
          notifications: filtered
        },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    notifications = (notifications || []).filter(msg => !String(msg).includes(matchText));
    saveGame();
  }catch(e){
    console.error(e);
  }
}

function getUnreadUpdateNotices(){
  seenUpdateNoticeIds = normalizeUpdateNoticeIds(seenUpdateNoticeIds, "");
  return UPDATE_NOTICES.filter(n => !seenUpdateNoticeIds.includes(n.id));
}

function buildUpdateNoticeText(list){
  let s = UPDATE_NOTICE_TITLE + "\n\n";

  list.forEach((notice, noticeIndex)=>{
    s += "[" + notice.title + "]\n";
    s += "버전 : " + notice.id + "\n\n";
    s += "────┬────────────────────\n";

    notice.lines.forEach((line,i)=>{
      s += rankNumber(i+1) + "│" + line + "\n";
      if(i !== notice.lines.length - 1) s += "────┼────────────────────\n";
    });

    s += "────┴────────────────────";

    if(noticeIndex !== list.length - 1){
      s += "\n\n────────────────────\n\n";
    }
  });

  return s;
}

async function markUpdateNoticesRead(list){
  seenUpdateNoticeIds = normalizeUpdateNoticeIds(seenUpdateNoticeIds, "");

  list.forEach(n => {
    if(!seenUpdateNoticeIds.includes(n.id)) seenUpdateNoticeIds.push(n.id);
  });

  saveGame();
  if(currentUser) await saveCloudData();
}

function startServerAlertListener(){
  if(!currentUser) return;
  if(serverAlertUnsubscribe) serverAlertUnsubscribe();

  serverAlertStartTime = Date.now();

  serverAlertUnsubscribe = db.collection("serverAlerts")
    .orderBy("createdAtMillis", "desc")
    .limit(10)
    .onSnapshot(snapshot => {
      snapshot.docChanges().forEach(change => {
        if(change.type !== "added") return;

        const data = change.doc.data();
        if(!data || (data.createdAtMillis || 0) <= serverAlertStartTime) return;

        if(data.type === "eternalCatch"){
          if(data.nickname === currentUser) return;

          const sender = formatUserName(data.nickname, data.title);
          const fishName = displayFishName(data.fishName);

          print("📢 알림\n\n" + sender + " 님이 " + color(fishName, data.fishGrade || "영원") + objParticle(data.fishName) + " 낚았습니다.");
          return;
        }

        if(data.type === "moneyTransfer"){
          if(data.to !== currentUser) return;

          const sender = formatUserName(data.from, data.fromTitle);
          const amountText = Number(data.amount || 0).toLocaleString() + "원을 송금했습니다.";

          print("📢 알림\n\n" + sender + " 님이 " + amountText);
          removeRealtimeNotification(amountText);
          setTimeout(() => refreshMyCloudData(), 300);
          return;
        }

        if(data.type === "fishTransfer"){
          if(data.to !== currentUser) return;

          const sender = formatUserName(data.from, data.fromTitle);
          const fish = {
            grade: data.fishGrade,
            name: data.fishName,
            size: data.fishSize ?? null
          };
          const fishText = lineFish(fish) + objParticle(data.fishName) + " 전송했습니다.";

          print("📢 알림\n\n" + sender + " 님이 " + color(lineFish(fish), fish.grade) + objParticle(data.fishName) + " 전송했습니다.");
          removeRealtimeNotification(fishText);
          setTimeout(() => refreshMyCloudData(), 300);
          return;
        }

        if(data.type === "userMessage"){
          if(data.to !== currentUser) return;

          const sender = formatUserName(data.from, data.fromTitle);
          const body = safeMessageText(data.text);

          print(sender + " 님이 메세지를 보냈습니다.\n\n" + body);
          setTimeout(() => {
            refreshMyCloudData().then(() => {
              messages = (messages || []).filter(m => {
                if(data.messageId && m.id === data.messageId) return false;

                return !(
                  m.from === data.from &&
                  m.text === data.text &&
                  Math.abs((m.createdAtMillis || 0) - (data.createdAtMillis || 0)) < 5000
                );
              });
              saveGame();
            });
          }, 300);
          return;
        }
      });
    }, e => {
      console.error(e);
    });
}

function stopServerAlertListener(){
  if(serverAlertUnsubscribe){
    serverAlertUnsubscribe();
    serverAlertUnsubscribe = null;
  }
}


function fullWidthNumber(n,len=4){
  const fw=["０","１","２","３","４","５","６","７","８","９"];
  return String(n).padStart(len,"0").split("").map(x=>fw[Number(x)]).join("");
}
function formatMoney(n){ return Math.floor(n).toLocaleString()+"원"; }
function formatSize(s){ return s === null ? "" : Number(s).toFixed(1); }

function hasBatchim(word){
  if(!word) return false;
  const ch = word[word.length - 1];
  const code = ch.charCodeAt(0);
  if(code < 0xAC00 || code > 0xD7A3) return false;
  return (code - 0xAC00) % 28 !== 0;
}

function objParticle(word){
  return hasBatchim(word) ? "을" : "를";
}

function subjectParticle(word){
  return hasBatchim(word) ? "이" : "가";
}

function formatDateTime(ms){
  const d = new Date(ms || Date.now());
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  const h = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return y + "-" + m + "-" + day + " " + h + ":" + min;
}

function safeMessageText(text){
  return String(text || "").replace(/[<>]/g, "");
}
function allFishCount(){
  return Object.values(fishByGrade).reduce((a,b)=>a+b.length,0);
}


function getMarketHour(){
  return Math.floor(Date.now() / (1000 * 60 * 10));
}

function getMarketTargets(){
  const targetGrades = ["전설","신화","초월","영원"];
  return targetGrades.flatMap(g => fishByGrade[g].map(name => ({name, grade:g})));
}

function getFishGradeByName(name){
  for(const grade of Object.keys(fishByGrade)){
    if(fishByGrade[grade].includes(name)) return grade;
  }
  return "";
}

function refreshMarketIfNeeded(){
  const nowHour = getMarketHour();
  if(marketHour === nowHour && marketRates && Object.keys(marketRates).length === 10) return;

  const targets = getMarketTargets();
  const selected = [];
  const count = Math.min(10, targets.length);

  while(selected.length < count){
    const pick = targets[Math.floor(Math.random() * targets.length)];
    if(!selected.some(x => x.name === pick.name)) selected.push(pick);
  }

  const bonusOptions = [20, 50, 100, 200];
  marketRates = {};
  selected.forEach(x => {
    marketRates[x.name] = bonusOptions[Math.floor(Math.random() * bonusOptions.length)];
  });

  marketHour = nowHour;
  saveGame();
}

function getMarketBonus(name){
  refreshMarketIfNeeded();
  return marketRates[name] || 0;
}

function applyMarketPrice(f){
  const bonus = getMarketBonus(f.name);
  return Math.floor(f.price * (1 + bonus / 100) * getAppraisalMultiplier());
}

function getNextMarketMinutes(){
  const next = (getMarketHour() + 1) * 1000 * 60 * 10;
  return Math.max(0, Math.ceil((next - Date.now()) / (1000 * 60)));
}

function buildMarketText(){
  refreshMarketIfNeeded();

  let s = "현재 시세\n\n";
  const entries = Object.entries(marketRates);

  if(entries.length === 0){
    s += "현재 적용 중인 시세가 없습니다.\n";
  } else {
    const marketGradeOrder = {"영원":0,"초월":1,"신화":2,"전설":3};

    entries.sort((a,b)=>{
      const gradeA = getFishGradeByName(a[0]);
      const gradeB = getFishGradeByName(b[0]);

      return (marketGradeOrder[gradeA] ?? 99) - (marketGradeOrder[gradeB] ?? 99)
        || b[1] - a[1]
        || a[0].localeCompare(b[0],"ko");
    });

    s += "────┬────────────────────\n";

    entries.forEach(([name, bonus], i)=>{
      const grade = getFishGradeByName(name);
      const discovered = !!collection[name];

      const shownGrade = discovered ? grade : "???";
      const shownName = discovered ? displayFishName(name) : "???";
      const line = "[" + shownGrade + "] " + shownName + " +" + bonus + "%";

      s += fullWidthNumber(i+1) + "│" + color(line, discovered ? grade : "") + "\n";

      if(i !== entries.length - 1){
        s += "────┼────────────────────\n";
      }
    });

    s += "────┴────────────────────";
  }

  s += "\n\n다음 갱신까지 : 약 " + getNextMarketMinutes() + "분";
  return s;
}

function showMarket(){
  printPreview("시세", "현재 시세 대상 : " + Object.keys(marketRates).length + "종\n다음 갱신까지 : 약 " + getNextMarketMinutes() + "분", "시세 전체보기", buildMarketText());
}

const MAX_RESEARCH = 10;
const researchCostTable = [
  100000000,
  300000000,
  1000000000,
  3000000000,
  10000000000,
  30000000000,
  100000000000,
  300000000000,
  1000000000000,
  3000000000000
];

function getResearchCost(level){
  if(level >= MAX_RESEARCH) return null;
  return researchCostTable[level] || researchCostTable[researchCostTable.length - 1];
}

function getFishingResearchLevel(){
  return Math.min(MAX_RESEARCH, researchLevels.fishing || 0);
}

function getAppraisalResearchLevel(){
  return Math.min(MAX_RESEARCH, researchLevels.appraisal || 0);
}

function getFishingTimeReduction(){
  return getFishingResearchLevel() * 5;
}

function getFishingTimeMultiplier(){
  return Math.max(0.5, 1 - getFishingResearchLevel() * 0.05);
}

function getAppraisalBonus(){
  return getAppraisalResearchLevel() * 10;
}

function getAppraisalMultiplier(){
  return 1 + getAppraisalResearchLevel() * 0.10;
}

function upgradeResearch(which){
  let key = "";
  let name = "";

  if(which === 1){
    key = "fishing";
    name = "낚시 기술 연구";
  } else if(which === 2){
    key = "appraisal";
    name = "감정 연구";
  } else {
    return print("사용법 : 연구소1 강화 / 연구소2 강화");
  }

  const level = Math.min(MAX_RESEARCH, researchLevels[key] || 0);

  if(level >= MAX_RESEARCH){
    return print(name + "는 이미 최대 레벨입니다.\nLv." + MAX_RESEARCH + " [MAX]");
  }

  const cost = getResearchCost(level);

  if(money < cost){
    return print("돈이 부족합니다.\n연구 비용 : " + formatMoney(cost));
  }

  money -= cost;
  researchLevels[key] = level + 1;
  saveGame();

  let effect = "";
  if(key === "fishing"){
    effect = "낚시시간 -" + getFishingTimeReduction() + "%";
  } else {
    effect = "판매가 +" + getAppraisalBonus() + "%";
  }

  print(name + " 강화 완료\n\nLv." + level + " → Lv." + researchLevels[key] + "\n효과 : " + effect + "\n사용 금액 : " + formatMoney(cost));
}

function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

function getSizeRatio(f){
  const range = sizeData[f.name];
  if(f.size === null || !Array.isArray(range)) return 0.5;
  const min = range[0], max = range[1];
  if(max <= min) return 0.5;
  return clamp((Number(f.size) - min) / (max - min), 0, 1);
}

function weightedRandomBySize(min,max,ratio){
  const roll = (Math.random() + Math.random() + ratio) / 3;
  return Math.floor(min + (max - min) * clamp(roll,0,1));
}

function randomInt(min,max){
  return Math.floor(min + Math.random() * (max - min + 1));
}

function randomDodgeBySize(f){
  if(f.grade === "영원") return Math.round((10 + Math.random() * 20) * 10) / 10;
  const ratio = getSizeRatio(f);
  const base = 20 - ratio * 18;
  const noise = (Math.random() * 6) - 3;
  return Math.round(clamp(base + noise, 1, 20) * 10) / 10;
}

function makeCombatStats(f){
  if(!f || f.grade === "쓰레기"){
    return {attack:0, hp:0, dodge:0, status:"전투 불가"};
  }
  const atkRange = combatAttackRanges[f.grade] || [10,50];
  const hpRange = combatHpRanges[f.grade] || [50,200];
  const ratio = getSizeRatio(f);
  return {
    attack:weightedRandomBySize(atkRange[0], atkRange[1], ratio),
    hp:randomInt(hpRange[0], hpRange[1]),
    dodge:randomDodgeBySize(f),
    status:"정상"
  };
}

function ensureCombatStats(f){
  if(!f.combat) f.combat = makeCombatStats(f);
  if(!f.combat.status) f.combat.status = f.grade === "쓰레기" ? "전투 불가" : "정상";
  return f.combat;
}

function getStatRange(grade, stat){
  if(stat === "attack") return combatAttackRanges[grade] || [0,1];
  if(stat === "hp") return combatHpRanges[grade] || [0,1];
  if(stat === "dodge") return grade === "영원" ? [10,30] : [1,20];
  return [0,1];
}

function statStars(value, grade, stat){
  if(grade === "쓰레기") return "";
  const range = getStatRange(grade, stat);
  const min = range[0], max = range[1];
  if(max <= min) return "";
  const ratio = clamp((Number(value) - min) / (max - min), 0, 1);
  if(ratio >= 0.99) return " ★★★";
  if(ratio >= 0.90) return " ★★";
  if(ratio >= 0.70) return " ★";
  return "";
}

function getUpgradeCost(level){
  // 강화비용 기준점
  // Lv.100 ≈ 7,500원
  // Lv.200 ≈ 30,000원
  // Lv.300 ≈ 150,000원
  // Lv.400 ≈ 750,000원
  // Lv.500 ≈ 3,500,000원
  // Lv.600 ≈ 15,000,000원
  // Lv.700 ≈ 75,000,000원
  // Lv.800 ≈ 300,000,000원
  // Lv.900 ≈ 1,500,000,000원
  // Lv.950 ≈ 4,000,000,000원
  // Lv.1000 ≈ 7,500,000,000원

  const points = [
    [1, 1000],
    [100, 7500],
    [200, 30000],
    [300, 150000],
    [400, 750000],
    [500, 3500000],
    [600, 15000000],
    [700, 75000000],
    [800, 300000000],
    [900, 1500000000],
    [950, 4000000000],
    [1000, 7500000000]
  ];

  if(level <= 1) return points[0][1];
  if(level >= MAX_ROD) return points[points.length - 1][1];

  for(let i = 0; i < points.length - 1; i++){
    const [l1, c1] = points[i];
    const [l2, c2] = points[i + 1];

    if(level >= l1 && level <= l2){
      const t = (level - l1) / (l2 - l1);
      return Math.floor(c1 * Math.pow(c2 / c1, t));
    }
  }

  return 1000;
}

function getUpgradeSuccessRate(level){
  if(level >= MAX_ROD) return 0;
  const t = (level - 1) / (MAX_ROD - 1);
  return Math.max(1, 100 - (99 * t)); // Lv.1 = 100%, Lv.1000 = 1%
}

function tryUpgradeSuccess(level){
  return Math.random() * 100 < getUpgradeSuccessRate(level);
}

function pickGrade(){
  const t = (rodLevel - 1) / (MAX_ROD - 1);
  let chances = [
    {name:"쓰레기", chance: 18 - 17.5 * t},
    {name:"일반", chance: 55 - 43 * t},
    {name:"희귀", chance: 25 - 1 * t},
    {name:"영웅", chance: 8 + 27 * t},
    {name:"전설", chance: 2.2 + 27.8 * t},
    {name:"신화", chance: 0.7 + 13.3 * t},
    {name:"초월", chance: 0.1 + 6.9 * t},
    {name:"영원", chance: rodLevel >= 400 ? 0.1 + ((rodLevel - 400) / (MAX_ROD - 400)) * 1.4 : 0}
  ];
  chances = chances.map(x => ({...x, chance: Math.max(0, x.chance)}));
  let total = chances.reduce((s,g)=>s+g.chance,0);
  let r = Math.random()*total;
  for(const c of chances){
    if(r < c.chance) return grades.find(g=>g.name===c.name);
    r -= c.chance;
  }
  return grades[1];
}

function pickName(grade){
  const list=fishByGrade[grade];
  return list[Math.floor(Math.random()*list.length)];
}

function makeSizeByName(name){
  const range = sizeData[name];
  if(range === null) return null;
  if(Array.isArray(range)){
    const base = Math.random() * (range[1] - range[0]) + range[0];
    return Math.round((base + rodLevel * 0.02) * 10) / 10;
  }
  return Math.round((Math.random()*100 + 10) * 10) / 10;
}

function getEscapeChance(){
  const t = Math.min(1, (rodLevel - 1) / (MAX_ROD - 1));
  return 35 - (34 * t); // Lv.1 = 35%, Lv.1000 = 1%
}

function getCurrentGradeChances(){
  const t = (rodLevel - 1) / (MAX_ROD - 1);
  let chances = [
    {name:"쓰레기", chance: 18 - 17.5 * t},
    {name:"일반", chance: 55 - 43 * t},
    {name:"희귀", chance: 25 - 1 * t},
    {name:"영웅", chance: 8 + 27 * t},
    {name:"전설", chance: 2.2 + 27.8 * t},
    {name:"신화", chance: 0.7 + 13.3 * t},
    {name:"초월", chance: 0.1 + 6.9 * t},
    {name:"영원", chance: rodLevel >= 400 ? 0.1 + ((rodLevel - 400) / (MAX_ROD - 400)) * 1.4 : 0}
  ];

  chances = chances.map(x => ({...x, chance: Math.max(0, x.chance)}));
  const total = chances.reduce((s,g)=>s+g.chance,0);

  return chances.map(x => ({
    name:x.name,
    chance: total === 0 ? 0 : x.chance / total * 100
  }));
}

function makePrice(g,size){
  if(g.name==="쓰레기") return Math.floor(Math.random()*30)+1;
  const s = size === null ? 7777 : size;
  return Math.floor(g.basePrice + s*gradePower[g.name]*1000 + Math.random()*g.basePrice*0.4);
}

function addCollection(f){
  if(!collection[f.name]) collection[f.name]={count:0,bestSize:null,bestGrade:f.grade};
  collection[f.name].count++;
  if(f.size !== null){
    if(collection[f.name].bestSize === null || f.size > collection[f.name].bestSize){
      collection[f.name].bestSize=f.size;
      collection[f.name].bestGrade=f.grade;
    }
  }
}

function fish(){
  if(isFishing) return print("이미 낚시 중입니다.");
  isFishing=true;
  const t=(rodLevel-1)/(MAX_ROD-1);
  const timeMultiplier = getFishingTimeMultiplier();
  const minTime=Math.floor((15000-(7000*t)) * timeMultiplier); // Lv1 15초 -> Lv1000 8초, 연구소 적용
  const maxTime=Math.floor((30000-(15000*t)) * timeMultiplier); // Lv1 30초 -> Lv1000 15초, 연구소 적용
  const wait=Math.floor(Math.random()*(maxTime-minTime))+minTime;
  print("낚싯대를 던졌습니다.");
  setTimeout(()=>{
    const g=pickGrade();
    const name=pickName(g.name);
    const size=makeSizeByName(name);
    const price=makePrice(g,size);
    const caught={grade:g.name,name,size,price,locked:false,time:new Date().toLocaleString()};
    caught.combat = makeCombatStats(caught);

    const escapeGrades = ["일반","희귀","영웅","전설","신화"];
    if(escapeGrades.includes(g.name)){
      const escapeChance = getEscapeChance();
      if(Math.random() * 100 < escapeChance){
        totalFishingCount++;
        const newAchievements = updateAchievements();
        checkSpecialTitles();
        saveGame();
        print(color("[" + g.name + "] " + name, g.name) + subjectParticle(name) + " 도주했습니다.");
        printAchievementRewards(newAchievements);
        isFishing=false;
        return;
      }
    }

    bucket.push(caught);
    addCollection(caught);

    totalFishingCount++;
    gradeCounts[g.name] = (gradeCounts[g.name] || 0) + 1;

    const newAchievements = updateAchievements();

    checkSpecialTitles();
    saveGame();
    print(color(lineFish(caught), caught.grade)+objParticle(caught.name)+" 낚았습니다.");
    announceEternalCatch(caught);
    printAchievementRewards(newAchievements);
    isFishing=false;
  }, wait);
}

function sortedBucketList(){
  return bucket.map((fish, originalIndex) => ({fish, originalIndex})).sort((a,b)=>{
    const gradeCompare = gradePower[b.fish.grade] - gradePower[a.fish.grade];
    const nameCompare = a.fish.name.localeCompare(b.fish.name, "ko");

    if(bucketSortOrder === "오름차순"){
      return -gradeCompare || nameCompare;
    }

    return gradeCompare || nameCompare;
  });
}

function getBucketIndexByDisplayNumber(n){

function sellAll(){

  if(sell.length===0) return print("판매할 수 있는 물고기가 없습니다. 전부 잠금 상태입니다.");
  const baseTotal=sell.reduce((s,f)=>s+f.price,0);
  const total=sell.reduce((s,f)=>s+applyMarketPrice(f),0);
  const bonusTotal=total-baseTotal;

  bucket=keep;
  money+=total;
  totalEarned+=total;
  saveGame();

  let msg = "잠금된 물고기를 제외한\n"+sell.length+"마리를 판매했습니다.\n\n";

    msg += "추가 보너스 : +"+formatMoney(bonusTotal)+"\n";

  msg += "+"+formatMoney(total);
  print(msg);
}

function upgradeOne(){
  if(rodLevel>=MAX_ROD) return print("이미 최대 레벨입니다.\nLv."+MAX_ROD);

  const cost=getUpgradeCost(rodLevel);
  const rate=getUpgradeSuccessRate(rodLevel);

  if(money<cost) return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(cost));

  const before=rodLevel;
  money-=cost;

  if(tryUpgradeSuccess(before)){
    rodLevel++;
    saveGame();
    print("강화 성공\n\nLv."+before+" → Lv."+rodLevel+"\n성공 확률 : "+rate.toFixed(1)+"%\n사용 금액 : "+formatMoney(cost));
  } else {
    saveGame();
    print("강화 실패\n\nLv."+before+" → Lv."+rodLevel+"\n성공 확률 : "+rate.toFixed(1)+"%\n사용 금액 : "+formatMoney(cost));
  }
}

function upgradeMax(){
  if(rodLevel>=MAX_ROD) return print("이미 최대 레벨입니다.\nLv."+MAX_ROD);

  const before=rodLevel;
  let spent=0;
  let success=0;
  let fail=0;
  let attempts=0;

  while(rodLevel<MAX_ROD){
    const cost=getUpgradeCost(rodLevel);
    if(money<cost) break;

    const levelBefore=rodLevel;
    money-=cost;
    spent+=cost;
    attempts++;

    if(tryUpgradeSuccess(levelBefore)){
      rodLevel++;
      success++;
    } else {
      fail++;
    }

    // 너무 긴 반복 방지
    if(attempts >= 10000) break;
  }

  if(spent===0){
    return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(getUpgradeCost(rodLevel)));
  }

  saveGame();

  let msg = "일괄강화 결과\n\n";
  msg += "Lv."+before+" → Lv."+rodLevel+"\n\n";
  msg += "시도 : "+attempts.toLocaleString()+"회\n";
  msg += "성공 : "+success.toLocaleString()+"회\n";
  msg += "실패 : "+fail.toLocaleString()+"회\n\n";
  msg += "사용 금액 : "+formatMoney(spent)+"\n";
  msg += "남은 돈 : "+formatMoney(money);

  if(rodLevel<MAX_ROD && attempts>=10000){
    msg += "\n\n시도 횟수가 너무 많아 자동 중단되었습니다.";
  }

  print(msg);
}

async function sendMoney(targetNickname, amount){
  if(isOnlineActionRunning) return print("처리 중입니다. 잠시만 기다려주세요.");
  if(!currentUser) return print("로그인 후 사용 가능합니다.");

  targetNickname = cleanNickname(targetNickname);
  amount = Number(amount);

  if(!targetNickname || !amount || amount <= 0) return print("사용법 : 송금 닉네임 금액");
  if(targetNickname === currentUser) return print("자기 자신에게는 송금할 수 없습니다.");

  isOnlineActionRunning = true;

  try{
    await refreshMyCloudData();

    if(money < amount){
      isOnlineActionRunning = false;
      return print("돈이 부족합니다.");
    }

    const myRef = db.collection("users").doc(currentUser);
    const targetRef = db.collection("users").doc(targetNickname);

    await db.runTransaction(async (tx)=>{
      const mySnap = await tx.get(myRef);
      const targetSnap = await tx.get(targetRef);

      if(!mySnap.exists) throw new Error("MY_ACCOUNT_NOT_FOUND");
      if(!targetSnap.exists) throw new Error("TARGET_NOT_FOUND");

      const myData = mySnap.data();
      const targetData = targetSnap.data();

      const myState = myData.gameState || {};
      const targetState = targetData.gameState || {};
      const currentMoney = myData.money || 0;

      if(currentMoney < amount) throw new Error("NOT_ENOUGH_MONEY");

      const targetNotifications = targetState.notifications || [];
      targetNotifications.push("📢 알림\n\n" + formatCurrentUserName() + " 님이 " + amount.toLocaleString() + "원을 송금했습니다.");

      myState.money = currentMoney - amount;

      tx.set(myRef, {
        money: currentMoney - amount,
        gameState: myState,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});

      tx.set(targetRef, {
        money: (targetData.money || 0) + amount,
        gameState: {...targetState, money:(targetState.money || targetData.money || 0) + amount, notifications: targetNotifications},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "moneyTransfer",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      amount: amount,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: Date.now()
    });

    await refreshMyCloudData();
    print(targetNickname + " 님에게 " + amount.toLocaleString() + "원을 송금하였습니다.");
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else if(e.message === "NOT_ENOUGH_MONEY") print("돈이 부족합니다.");
    else if(e.message === "MY_ACCOUNT_NOT_FOUND") print("현재 계정을 찾을 수 없습니다. 다시 로그인해주세요.");
    else print("송금 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

async function sendFish(targetNickname, displayNumber){
  if(isOnlineActionRunning) return print("처리 중입니다. 잠시만 기다려주세요.");
  if(!currentUser) return print("로그인 후 사용 가능합니다.");

  targetNickname = cleanNickname(targetNickname);

  if(!targetNickname) return print("사용법 : 전송 닉네임 번호");
  if(targetNickname === currentUser) return print("자기 자신에게는 전송할 수 없습니다.");

  isOnlineActionRunning = true;

  try{
    await refreshMyCloudData();

    const idx = getBucketIndexByDisplayNumber(Number(displayNumber));
    if(idx < 0 || !bucket[idx]){
      isOnlineActionRunning = false;
      return print("존재하지 않는 번호입니다.");
    }

    if(bucket[idx].locked){
      isOnlineActionRunning = false;
      return print("잠금된 물고기는 전송할 수 없습니다.");
    }

    const fish = {...bucket[idx], locked:false};

    const myRef = db.collection("users").doc(currentUser);
    const targetRef = db.collection("users").doc(targetNickname);

    await db.runTransaction(async (tx)=>{
      const mySnap = await tx.get(myRef);
      const targetSnap = await tx.get(targetRef);

      if(!mySnap.exists) throw new Error("MY_ACCOUNT_NOT_FOUND");
      if(!targetSnap.exists) throw new Error("TARGET_NOT_FOUND");

      const myData = mySnap.data();
      const targetData = targetSnap.data();

      const myState = myData.gameState || {};
      const targetState = targetData.gameState || {};
      const myBucket = myState.bucket || [];
      const targetBucket = targetState.bucket || [];
      const targetNotifications = targetState.notifications || [];

      const currentList = myBucket.map((fish, originalIndex) => ({fish, originalIndex})).sort((a,b)=>{
        const gradeCompare = gradePower[b.fish.grade] - gradePower[a.fish.grade];
        const nameCompare = a.fish.name.localeCompare(b.fish.name, "ko");

        if(bucketSortOrder === "오름차순"){
          return -gradeCompare || nameCompare;
        }

        return gradeCompare || nameCompare;
      });

      const displayItem = currentList[Number(displayNumber)-1];
      if(!displayItem || !myBucket[displayItem.originalIndex]) throw new Error("FISH_NOT_FOUND");
      if(myBucket[displayItem.originalIndex].locked) throw new Error("FISH_LOCKED");

      const movedFish = {...myBucket.splice(displayItem.originalIndex,1)[0], locked:false};

      targetBucket.push(movedFish);
      targetNotifications.push("📢 알림\n\n" + formatCurrentUserName() + " 님이 " + lineFish(movedFish) + objParticle(movedFish.name) + " 전송했습니다.");

      tx.set(myRef, {
        gameState: {...myState, bucket: myBucket},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});

      tx.set(targetRef, {
        gameState: {...targetState, bucket: targetBucket, notifications: targetNotifications},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "fishTransfer",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      fishName: fish.name,
      fishGrade: fish.grade,
      fishSize: fish.size,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: Date.now()
    });

    await refreshMyCloudData();
    print(targetNickname + " 님에게 " + lineFish(fish) + objParticle(fish.name) + " 전송하였습니다.");
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else if(e.message === "FISH_NOT_FOUND") print("존재하지 않는 번호입니다.");
    else if(e.message === "FISH_LOCKED") print("잠금된 물고기는 전송할 수 없습니다.");
    else if(e.message === "MY_ACCOUNT_NOT_FOUND") print("현재 계정을 찾을 수 없습니다. 다시 로그인해주세요.");
    else print("전송 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

function requireLoginForCommand(cmd){
  const allowed = ["명령어", "회원가입", "로그인"];

  if(allowed.includes(cmd)) return true;

  // 다른 사람 정보 조회/랭킹도 로그인 없이 막음
  return false;
}

function runCommand(){
  let cmd=input.value.trim();
  input.value="";
  if(!cmd) return;

  // 예전처럼 !를 붙여도 작동하게 호환
  if(cmd.startsWith("!")) cmd = cmd.slice(1).trim();

  print("> "+cmd);

  if(!currentUser && !requireLoginForCommand(cmd)){
    return print("로그인 후 이용 가능합니다.\n\n회원가입 또는 로그인 을 입력하세요.");
  }

  if(cmd==="명령어") showCommands();
  else if(cmd==="낚시") fish();
  else if(cmd==="양동이") showBucket();
  else if(cmd.startsWith("양동이 ")) showOtherBucket(cmd.split(" ")[1]);
  else if(cmd==="도감") showCollection();
  else if(cmd==="내정보") showGameInfo();
  else if(cmd.startsWith("정보 ")){ const p=cmd.split(" "); showFishInfo(Number(p[1])); }
  else if(cmd==="정보") print("사용법 : 내정보 / 정보 번호");
  else if(cmd==="보스전") showBossBattle();
  else if(cmd==="보스정보") showBossInfo();
  else if(cmd==="보스목록") showBossList();
  else if(cmd==="연구소") showResearchLab();
  else if(cmd==="연구소1 강화") upgradeResearch(1);
  else if(cmd==="연구소2 강화") upgradeResearch(2);
  else if(cmd==="시세") showMarket();
  else if(cmd==="랭킹") showRanking();
  else if(cmd.startsWith("메세지 ")) sendMessage(cmd.split(" ")[1]);
  else if(cmd==="지갑") showWallet();
  else if(cmd.startsWith("지갑 ")) showOtherWallet(cmd.split(" ")[1]);
  else if(cmd==="업적") showAchievements();
  else if(cmd==="칭호") showTitles();
  else if(cmd.startsWith("칭호 장착 ")) equipTitle(cmd.split(" ")[2]);
  else if(cmd==="칭호 장착해제") unequipTitle();
  else if(cmd==="회원가입") registerUser();
  else if(cmd==="로그인") loginUser();
  else if(cmd==="로그아웃") logoutUser();
  else if(cmd==="탈퇴") deleteAccount();
  else if(cmd.startsWith("송금 ")){ const p=cmd.split(" "); sendMoney(p[1], p[2]); }
  else if(cmd.startsWith("전송 ")){ const p=cmd.split(" "); sendFish(p[1], p[2]); }
  else if(cmd==="강화") upgradeOne();
  else if(cmd==="일괄강화" || cmd==="강화 최대") upgradeMax();
  else if(cmd.startsWith("정렬 ")) sortBucket(cmd.split(" ")[1]);
  else if(cmd==="일괄판매" || cmd==="물고기 일괄판매") sellAll();
  else if(cmd.startsWith("판매 ")) sellOne(Number(cmd.split(" ")[1]));
  else if(cmd.startsWith("물고기 판매 ")) sellOne(Number(cmd.split(" ")[2]));
  else if(cmd.startsWith("잠금해제 ")) lockOne(Number(cmd.split(" ")[1]), false);
  else if(cmd.startsWith("잠금 ")) lockOne(Number(cmd.split(" ")[1]), true);
  else print("없는 명령어입니다. 명령어 를 입력해보세요.");
}

input.addEventListener("keydown", e=>{ if(e.key==="Enter") runCommand(); });

loadGame();

if(!currentUser){
  resetGameData();
  refreshMarketIfNeeded();
  saveGame();
  updateWallet();
  print("로그인이 필요합니다.\n\n처음이라면 회원가입 을 입력하세요.\n이미 계정이 있다면 로그인 을 입력하세요.");
  checkGameVersion();
} else {
  updateWallet();
  print(currentUser + " 님으로 접속 중입니다.\n클라우드 데이터를 불러오는 중입니다.");
  checkGameVersion();

  (async function(){
    let startupAchievements = [];

    try{
      const snap = await db.collection("users").doc(currentUser).get();

      if(!snap.exists){
        currentUser = null;
        localStorage.removeItem("textFishingCurrentUser");
        resetGameData();
        updateWallet();
        print("저장된 계정을 찾을 수 없습니다.\n다시 로그인해주세요.");
        return;
      }

      const data = snap.data();
      applyGameState(data.gameState);
      updateWallet();

      print(currentUser + " 님 데이터 불러오기 완료.");
    }catch(e){
      console.error(e);
      print("클라우드 데이터를 불러오지 못했습니다.\n네트워크 상태를 확인한 뒤 다시 로그인해주세요.");
      return;
    }

    try{
      refreshMarketIfNeeded();
    }catch(e){
      console.error(e);
    }

    try{
      startupAchievements = updateAchievements();
      checkSpecialTitles();
      saveGame();
      updateWallet();
      printAchievementRewards(startupAchievements);
    }catch(e){
      console.error(e);
    }

    try{
      startServerAlertListener();
    }catch(e){
      console.error(e);
    }

    try{
      await showUpdateNoticeIfNeeded();
    }catch(e){
      console.error(e);
    }

    try{
      await showNewNotifications();
    }catch(e){
      console.error(e);
    }

    try{
      await showNewMessages();
    }catch(e){
      console.error(e);
    }
  })();
}
