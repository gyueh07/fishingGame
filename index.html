<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>텍스트 낚시 게임</title>
<style>
body {
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:Consolas,'Courier New',monospace;
}
.wrap { max-width:980px; margin:0 auto; padding:20px; }
.box {
  background:#161b22;
  border:1px solid #30363d;
  border-radius:8px;
  padding:12px;
  margin:10px 0;
}
#log {
  height:540px;
  overflow-y:auto;
  white-space:pre-wrap;
  line-height:1.45;
}
input {
  width:360px;
  max-width:calc(100% - 90px);
  padding:10px;
  background:#0d1117;
  color:#e6edf3;
  border:1px solid #30363d;
  border-radius:6px;
  font-family:inherit;
}
button {
  padding:10px 14px;
  background:#21262d;
  color:#e6edf3;
  border:1px solid #30363d;
  border-radius:6px;
  cursor:pointer;
}
button:hover { background:#30363d; }
.cmd span {
  display:inline-block;
  background:#21262d;
  padding:4px 8px;
  border-radius:5px;
  margin:3px;
}

.modalOverlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.72);
  z-index:1000;
}
.modal {
  width:min(900px, calc(100% - 32px));
  height:min(760px, calc(100% - 32px));
  margin:16px auto;
  background:#161b22;
  border:1px solid #30363d;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}
.modalHead {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #30363d;
}
.modalBody {
  padding:12px;
  overflow:auto;
  white-space:pre-wrap;
  line-height:1.45;
}
.openBtn {
  margin-top:8px;
}

</style>
</head>

function fullWidthNumber(n,len=4){
  const fw=["０","１","２","３","４","５","６","７","８","９"];
  return String(n).padStart(len,"0").split("").map(x=>fw[Number(x)]).join("");
}
function formatMoney(n){ return Math.floor(n).toLocaleString()+"원"; }
function formatSize(s){ return s === null ? "" : Number(s).toFixed(1); }

function hasBatchim(word){
  if(!word) return false;
  const ch = word[word.length - 1];
  const code = ch.charCodeAt(0);
  if(code < 0xAC00 || code > 0xD7A3) return false;
  return (code - 0xAC00) % 28 !== 0;
}

function objParticle(word){
  return hasBatchim(word) ? "을" : "를";
}

function lineFish(f){
  if(f.size === null) return `[${f.grade}] ${f.name}`;
  return `[${f.grade}] ${f.name}(${formatSize(f.size)}cm)`;
}

function color(text,grade){
  const g=grades.find(x=>x.name===grade);
  return `<span style="color:${g?g.color:'#e6edf3'}">${text}</span>`;
}
function print(t){

function printPreview(title, summary, buttonText, modalContent){
  const id = "btn_" + Math.random().toString(36).slice(2);

  updateWallet();
  setTimeout(() => {

    if(btn) btn.onclick = () => openModal(title, modalContent);
  }, 0);
}
function allFishCount(){
  return Object.values(fishByGrade).reduce((a,b)=>a+b.length,0);
}

function updateTitles(){
  const newly = [];
  for(const t of titleList){
    if(t.check() && !unlockedTitles.includes(t.name)){
      unlockedTitles.push(t.name);
      newly.push(t.name);
    }
  }

  if(currentTitle === "없음" && unlockedTitles.length > 0){
    currentTitle = unlockedTitles[0];
  }

  return newly;
}

function buildTitleText(){
  let s = "칭호\n\n";
  s += "현재 칭호 : " + currentTitle + "\n";
  s += "획득 칭호 : " + unlockedTitles.length + " / " + titleList.length + "\n\n";

  titleList.forEach((t,i)=>{
    const has = unlockedTitles.includes(t.name);
    s += fullWidthNumber(i+1) + "│" + (has ? "[획득] " : "[미획득] ") + t.name + "\n";
    s += "    조건 : " + t.desc + "\n\n";
  });

  s += "장착 방법 : 칭호 장착 번호";
  return s;
}

function showTitles(){
  const newTitles = updateTitles();
  if(newTitles.length > 0) saveGame();

  const summary =
    "현재 칭호 : " + currentTitle + "\n" +
    "획득 칭호 : " + unlockedTitles.length + " / " + titleList.length + "\n\n" +
    "칭호 장착 : 칭호 장착 번호";

  printPreview("칭호", summary, "칭호 전체보기", buildTitleText());
}

function equipTitle(n){
  const title = titleList[n-1];
  if(!title) return print("존재하지 않는 칭호 번호입니다.");
  if(!unlockedTitles.includes(title.name)) return print("아직 획득하지 못한 칭호입니다.");

  currentTitle = title.name;
  saveGame();
  print("현재 칭호가 [" + currentTitle + "] 으로 변경되었습니다.");
}
function saveGame(){
  localStorage.setItem("textFishingSpeciesSizeSave", JSON.stringify({money,totalEarned,rodLevel,bucket,collection,ranking,totalFishingCount,gradeCounts,unlockedTitles,currentTitle}));
}
function loadGame(){
  const raw=localStorage.getItem("textFishingSpeciesSizeSave");
  if(!raw) return;
  try {
    const s=JSON.parse(raw);
    money=s.money??0; totalEarned=s.totalEarned??0; rodLevel=s.rodLevel??1;
    bucket=s.bucket??[]; collection=s.collection??{}; ranking=s.ranking??[];
    totalFishingCount=s.totalFishingCount??0; gradeCounts=s.gradeCounts??{}; unlockedTitles=s.unlockedTitles??[]; currentTitle=s.currentTitle??"없음";
  } catch(e) {}
}

  // Lv.500 ≈ 100,000,000원
  // Lv.600 ≈ 1,000,000,000원
  // Lv.700 ≈ 5,000,000,000원
  // Lv.800 ≈ 20,000,000,000원
  // Lv.900 ≈ 100,000,000,000원

  const points = [
    [1, 1000],
    [50, 50000],
    [100, 200000],
    [200, 1000000],
    [300, 5000000],
    [400, 20000000],
    [500, 100000000],
    [600, 1000000000],
    [700, 5000000000],
    [800, 20000000000],
    [900, 100000000000],
    [1000, 500000000000]
  ];

  if(level <= 1) return points[0][1];
  if(level >= 1000) return points[points.length - 1][1];

  for(let i = 0; i < points.length - 1; i++){
    const [l1, c1] = points[i];
    const [l2, c2] = points[i + 1];

    if(level >= l1 && level <= l2){
      const t = (level - l1) / (l2 - l1);
      return Math.floor(c1 * Math.pow(c2 / c1, t));
    }
  }

  return 1000;
}

function pickGrade(){
  const t = (rodLevel - 1) / (MAX_ROD - 1);
  let chances = [
    {name:"쓰레기", chance: 8 - 7.5 * t},
    {name:"일반", chance: 55 - 43 * t},
    {name:"희귀", chance: 25 - 1 * t},
    {name:"영웅", chance: 8 + 27 * t},
    {name:"전설", chance: 2.2 + 27.8 * t},
    {name:"신화", chance: 0.7 + 13.3 * t},
    {name:"초월", chance: 0.1 + 6.9 * t},
    {name:"영원", chance: rodLevel >= 400 ? 0.5 + ((rodLevel - 400) / 600) * 2.0 : 0}
  ];
  chances = chances.map(x => ({...x, chance: Math.max(0, x.chance)}));
  let total = chances.reduce((s,g)=>s+g.chance,0);
  let r = Math.random()*total;
  for(const c of chances){
    if(r < c.chance) return grades.find(g=>g.name===c.name);
    r -= c.chance;
  }
  return grades[1];
}

function pickName(grade){
  const list=fishByGrade[grade];
  return list[Math.floor(Math.random()*list.length)];
}

function makeSizeByName(name){
  const range = sizeData[name];
  if(range === null) return null;
  if(Array.isArray(range)){
    const base = Math.random() * (range[1] - range[0]) + range[0];
    return Math.round((base + rodLevel * 0.02) * 10) / 10;
  }
  return Math.round((Math.random()*100 + 10) * 10) / 10;
}

function makePrice(g,size){
  if(g.name==="쓰레기") return Math.floor(Math.random()*30)+1;
  const s = size === null ? 7777 : size;
  return Math.floor(g.basePrice + s*gradePower[g.name]*1000 + Math.random()*g.basePrice*0.4);
}

function addCollection(f){
  if(!collection[f.name]) collection[f.name]={count:0,bestSize:null,bestGrade:f.grade};
  collection[f.name].count++;
  if(f.size !== null){
    if(collection[f.name].bestSize === null || f.size > collection[f.name].bestSize){
      collection[f.name].bestSize=f.size;
      collection[f.name].bestGrade=f.grade;
    }
  }
}

function fish(){
  if(isFishing) return print("이미 낚시 중입니다.");
  isFishing=true;
  const t=(rodLevel-1)/999;
  const minTime=Math.floor(10000-(5000*t)); // Lv1 10초 -> Lv1000 5초
  const maxTime=Math.floor(20000-(12000*t)); // Lv1 20초 -> Lv1000 8초
  const wait=Math.floor(Math.random()*(maxTime-minTime))+minTime;
  print("낚싯대를 던졌습니다.");
  setTimeout(()=>{
    const g=pickGrade();
    const name=pickName(g.name);
    const size=makeSizeByName(name);
    const price=makePrice(g,size);
    const caught={grade:g.name,name,size,price,locked:false,time:new Date().toLocaleString()};
    bucket.push(caught);
    addCollection(caught);

    totalFishingCount++;
    gradeCounts[g.name] = (gradeCounts[g.name] || 0) + 1;

    const newTitles = updateTitles();

    saveGame();
    print(color(lineFish(caught), caught.grade)+objParticle(caught.name)+" 낚았습니다.");

    if(newTitles.length > 0){
      print("새 칭호를 획득했습니다.\n\n[" + newTitles.join("]\n[") + "]");
    }
    isFishing=false;
  }, wait);
}


let bucketSortOrder = localStorage.getItem("textFishingBucketSortOrder") || "내림차순";

function sortedBucketList(){
  return [...bucket].sort((a,b)=>{
    const gradeCompare = gradePower[b.grade] - gradePower[a.grade];
    const nameCompare = a.name.localeCompare(b.name, "ko");

    if(bucketSortOrder === "오름차순"){
      return -gradeCompare || nameCompare;
    }

    return gradeCompare || nameCompare;
  });
}

function buildBucketText(){
  if(bucket.length===0) return "양동이가 비어있습니다.";
  let s="내 양동이\n\n────┬────────────────────\n";
  const list = sortedBucketList();
  list.forEach((f,i)=>{
    s+=fullWidthNumber(i+1)+"│"+lineFish(f)+(f.locked?" [잠금]":"")+"\n";
    if(i!==list.length-1) s+="────┼────────────────────\n";
  });
  return s;
}

function showBucket(){
  if(bucket.length===0) return print("양동이가 비어있습니다.");
  const lockedCount = bucket.filter(f=>f.locked).length;
  const totalValue = bucket.reduce((s,f)=>s+f.price,0);
  const summary =
    "보유 물고기 : " + bucket.length + "마리\n" +
    "잠금 : " + lockedCount + "마리\n" +
    "총 판매가 : " + formatMoney(totalValue);
  printPreview("양동이", summary, "양동이 전체보기", buildBucketText());
}

function sortBucket(type){
  if(type !== "오름차순" && type !== "내림차순"){
    return print("정렬 명령어: 정렬 오름차순 / 정렬 내림차순");
  }

  bucketSortOrder = type;
  localStorage.setItem("textFishingBucketSortOrder", bucketSortOrder);

  print("양동이 정렬을 " + type + "으로 설정했습니다.\n기준 : 등급 1순위, 가나다 2순위");
  showBucket();
}

function lockOne(n,lockState){
  const idx=n-1;
  if(!bucket[idx]) return print("존재하지 않는 번호입니다.");
  bucket[idx].locked=lockState;
  saveGame();
  let s="────┬────────────────────\n";
  s+=fullWidthNumber(n)+"│"+lineFish(bucket[idx])+(bucket[idx].locked?" [잠금]":"")+"\n";
  s+="────┴────────────────────\n\n";
  s+=lockState?"잠금되었습니다.":"잠금이 해제되었습니다.";
  print(s);
}

function sellOne(n){
  const idx=n-1;
  if(!bucket[idx]) return print("존재하지 않는 번호입니다.");
  if(bucket[idx].locked) return print("잠금된 물고기는 판매할 수 없습니다.");
  const f=bucket.splice(idx,1)[0];
  money+=f.price;
  totalEarned+=f.price;
  saveGame();
  print(lineFish(f)+objParticle(f.name)+" 판매했습니다.\n\n+"+formatMoney(f.price));
}

function sellAll(){
  if(bucket.length===0) return print("팔 물고기가 없습니다.");
  const sell=bucket.filter(f=>!f.locked);
  const keep=bucket.filter(f=>f.locked);
  if(sell.length===0) return print("판매할 수 있는 물고기가 없습니다. 전부 잠금 상태입니다.");
  const total=sell.reduce((s,f)=>s+f.price,0);
  bucket=keep;
  money+=total;
  totalEarned+=total;
  saveGame();
  print("잠금된 물고기를 제외한\n"+sell.length+"마리를 판매했습니다.\n\n+"+formatMoney(total));
}

function buildCollectionText(){
  let s="도감\n\n";
  let index=1;
  for(const grade of Object.keys(fishByGrade)){
    s+="["+grade+"]\n";
    for(const name of [...fishByGrade[grade]].sort((a,b)=>a.localeCompare(b,"ko"))){
      const c=collection[name];
      if(c){
        s+=fullWidthNumber(index)+"│"+name+"\n";
      } else {
        s+=fullWidthNumber(index)+"│???\n";
      }
      index++;
    }
    s+="\n";
  }
  s+="도감 진행률 : "+Object.keys(collection).length+"/"+allFishCount();
  return s;
}

function showCollection(){
  const got = Object.keys(collection).length;
  const total = allFishCount();
  const percent = total === 0 ? 0 : (got / total * 100).toFixed(1);
  const summary =
    "도감 진행률\n\n" +
    got + " / " + total + "\n" +
    percent + "%";
  printPreview("도감", summary, "도감 전체보기", buildCollectionText());
}

function showWallet(){
  print("지갑\n\n현재 칭호 : "+currentTitle+"\n현재 돈 : "+formatMoney(money)+"\n총 수익 : "+formatMoney(totalEarned)+"\n낚싯대 레벨 : "+rodLevel+"/"+MAX_ROD+"\n낚시 횟수 : "+totalFishingCount.toLocaleString()+"회\n다음 강화 비용 : "+(rodLevel>=MAX_ROD?"최대 레벨":formatMoney(getUpgradeCost(rodLevel))));
}

function upgradeOne(){
  if(rodLevel>=MAX_ROD) return print("이미 최대 레벨입니다.\nLv."+MAX_ROD);
  const cost=getUpgradeCost(rodLevel);
  if(money<cost) return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(cost));
  const before=rodLevel;
  money-=cost;
  rodLevel++;
  saveGame();
  print("Lv."+before+" → Lv."+rodLevel+"\n\n사용 금액 : "+formatMoney(cost)+"\n\n강화되었습니다.");
}

function upgradeMax(){
  if(rodLevel>=MAX_ROD) return print("이미 최대 레벨입니다.\nLv."+MAX_ROD);
  const before=rodLevel;
  let spent=0;
  while(rodLevel<MAX_ROD){
    const cost=getUpgradeCost(rodLevel);
    if(money<cost) break;
    money-=cost;
    spent+=cost;
    rodLevel++;
  }
  if(spent===0) return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(getUpgradeCost(rodLevel)));
  saveGame();
  print("Lv."+before+" → Lv."+rodLevel+"\n\n사용 금액 : "+formatMoney(spent)+"\n남은 돈 : "+formatMoney(money)+"\n\n강화되었습니다.");
}

  print(`명령어 목록

[정보]
양동이
도감
정보

function showGameInfo(){
  print(`게임 정보

최대 낚싯대 레벨 : 1000
영원 등급 해금 : Lv.400부터
낚시 시간 : Lv.1 약 10~20초 / Lv.1000 약 5~8초

기본 정렬

등급 순서

저장 방식
브라우저 자동 저장

칭호
칭호 명령어로 확인
칭호 장착 번호로 장착`);
}

function runCommand(){
  let cmd=input.value.trim();
  input.value="";
  if(!cmd) return;

  // 예전처럼 !를 붙여도 작동하게 호환
  if(cmd.startsWith("!")) cmd = cmd.slice(1).trim();

  print("> "+cmd);

  if(cmd==="명령어") showCommands();
  else if(cmd==="낚시") fish();
  else if(cmd==="양동이") showBucket();
  else if(cmd==="도감") showCollection();
  else if(cmd==="정보") showGameInfo();
  else if(cmd==="지갑") showWallet();
  else if(cmd==="칭호") showTitles();
  else if(cmd.startsWith("칭호 장착 ")) equipTitle(Number(cmd.split(" ")[2]));
  else if(cmd==="강화") upgradeOne();
  else if(cmd==="강화 최대") upgradeMax();
  else if(cmd.startsWith("정렬 ")) sortBucket(cmd.split(" ")[1]);
  else if(cmd==="물고기 일괄판매") sellAll();
  else if(cmd.startsWith("물고기 판매 ")) sellOne(Number(cmd.split(" ")[2]));
  else if(cmd.startsWith("잠금해제 ")) lockOne(Number(cmd.split(" ")[1]), false);
  else if(cmd.startsWith("잠금 ")) lockOne(Number(cmd.split(" ")[1]), true);
  else print("없는 명령어입니다. 명령어 를 입력해보세요.");
}

input.addEventListener("keydown", e=>{ if(e.key==="Enter") runCommand(); });

loadGame();
updateTitles();
updateWallet();
print("게임이 시작되었습니다.\n\n명령어를 확인하려면\n명령어 를 입력하세요.");
