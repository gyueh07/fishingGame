    s += "패시브 - 절대악\n모든 물고기는 체력과 별개인 존재 3으로 시작\n존재가 0이 되면 체력과 관계없이 즉시 회복 중 상태\n체력 75%·50%·25% 진입 시 무작위 물고기의 존재 1 감소\n\n";
    s += "존재 말살 (20%)\n공격력이 가장 높은 물고기에게 공격력 1.8배와 존재 1 감소\n공격을 회피해도 존재는 감소\n공격 피해로 쓰러지면 존재 감소는 다른 무작위 물고기에게 이동\n\n";
    s += "창조의 붕괴 (15%)\n모든 물고기에게 최대 체력 15%의 회피 불가 피해\n체력이 40% 이하가 된 물고기는 존재 1 감소\n이 체력 피해만으로는 쓰러지지 않음\n\n";
    s += "패시브 - 영겁의 밤\n체력 25% 이하에서 공격력 30% 증가, 회피율 0%\n존재 말살 공격력 2.2배, 창조의 붕괴 피해 20%로 강화\n\n";
    } else {
    s += "스킬\n\n";
    s += boss.skillName + (boss.skillRate ? " (" + boss.skillRate + "%)" : "") + "\n" + boss.skillDesc + "\n\n";
    s += "패시브\n\n";
    if(boss.id === "kraken") s += "먹물 난사\n회피 시도 시 회피 실패 처리\n\n";
    else if(boss.id === "hydra") s += "재생\n매 턴 최대 체력의 5% 회복\n\n";
    else if(boss.id === "leviathan") s += "심연의 분노\n체력 50% 이하 시 공격력 30% 증가\n\n";
    else if(boss.id === "behemoth") s += "고대의 육체\n받는 피해 20% 감소\n\n";
    else s += "없음\n\n";
  }

  s += line();
  return s;
}

function showBossInfo(number){
  if(number === undefined || number === null || number === ""){
    return print(buildBossInfoText());
  }

  const index = Number(number) - 1;
  if(!Number.isInteger(index) || index < 0 || index >= bossList.length){
    return print("사용법 : 보스정보 번호\n\n보스목록에서 번호를 확인해주세요.");
  }

  print(buildBossInfoText(bossList[index]));
}

function buildBossListText(){
  let s = "보스목록\n\n────┬────────────────────\n";
  bossList.forEach((boss,i)=>{
    const selected = getCurrentBoss().id === boss.id ? " [선택됨]" : "";
    s += fullWidthNumber(i+1) + "│" + bossColor("[" + boss.grade + "] " + boss.name + " [" + getBossStatus(boss) + "]" + selected, boss) + "\n";
    if(i !== bossList.length - 1) s += "────┼────────────────────\n";
  });
  s += "────┴────────────────────\n\n";
  s += "명령어 : 보스정보 번호 / 보스선택 번호";
  return s;
}

function showBossList(){ print(buildBossListText()); }

function prepareBossFish(displayNumber){
  if(!isBossMenu) return print("보스전에서만 사용할 수 있습니다.");
  recoverStunnedFish();

  const idx = getBucketIndexByDisplayNumber(displayNumber);
  if(idx < 0 || !bucket[idx]) return print("존재하지 않는 번호입니다.");
  if(bossPrepIndexes.includes(idx)) return print("이미 준비된 물고기입니다.");
  if(bossPrepIndexes.length >= 5) return print("전투 준비는 최대 5마리까지 가능합니다.");

  const f = bucket[idx];
  const c = ensureCombatStats(f);

  if(f.grade === "쓰레기") return print("쓰레기 등급은 전투에 참가할 수 없습니다.");
  if(c.status === "기절") c.status = "회복 중";

  bossPrepIndexes.push(idx);
  pendingRecoveryBattleConfirm = false;
  saveGame();

  let msg = color(lineFish(f), f.grade) + "\n\n전투 준비 완료\n\n" + bossPrepIndexes.length + " / 5";
  if(c.status === "회복 중"){
    msg += "\n\n주의 : 이 물고기는 회복 중입니다.";
  }
  print(msg);
}

function unprepareBossFish(displayNumber){
  if(!isBossMenu) return print("보스전에서만 사용할 수 있습니다.");

  const idx = getBucketIndexByDisplayNumber(displayNumber);
  const pos = bossPrepIndexes.indexOf(idx);

  if(pos < 0) return print("준비 목록에 없는 물고기입니다.");

  const f = bucket[idx];
  bossPrepIndexes.splice(pos,1);
  saveGame();

  print(color(lineFish(f), f.grade) + "\n\n전투 준비 해제");
}

function calcDamage(attackerAttack, critRate, critDamage){
  let damage = attackerAttack;
  const crit = Math.random() * 100 < critRate;
  if(crit) damage = Math.floor(damage * (critDamage / 100));
  return {damage, crit};
}

function stunFish(f){
  const c = ensureCombatStats(f);
  c.hp = 0;
  c.status = "회복 중";
  c.recoveryStartAt = Date.now();
  c.recoveryStartHp = 0;
  c.stunUntil = Date.now() + getStunMinutes(f.grade) * 60 * 1000;
}


function pickBossPattern(boss){
  const r = Math.random() * 100;

  if(boss.id === "kraken"){
    if(r < 25) return "tentacle";
    if(r < 40) return "ink";
  }

  if(boss.id === "leviathan"){
    if(r < 25) return "pressure";
    if(r < 40) return "slash";
  }

  return "normal";
}

function getBossCooldownLeft(bossId=null){
  const id = bossId || getCurrentBoss().id;
  const cooldowns = bossProgress.cooldowns || {};
  return Math.max(0, (cooldowns[id] || 0) - Date.now());
}

function isBossCooldownActive(bossId=null){
  return getBossCooldownLeft(bossId) > 0;
}

function setBossCooldown(bossId=null){
  const id = bossId || getCurrentBoss().id;
  if(!bossProgress.cooldowns) bossProgress.cooldowns = {};
  bossProgress.cooldowns[id] = Date.now() + 5 * 60 * 1000;
}


function getAlivePreparedFishes(){
  return bossPrepIndexes
    .map(idx => bucket[idx])
    .filter(f => {
      if(!f || f.grade === "쓰레기") return false;
      updateRecoveringFishHp(f);
      const c = ensureCombatStats(f);
      if(c.status === "회복 중" && c.hp <= 0) c.hp = 1;
      return c.hp > 0;
    });
}

function getBossAttackMultiplier(boss){
  let multiplier = 1;

  if(boss._enraged){
    multiplier *= 1.3;
  }

  if(boss.id === "jormungandr"){
    const maxBoost = boss._ringCompleted ? 1.0 : 0.5;
    const boost = Math.min(maxBoost, Number(boss._attackBoost || 0));
    multiplier *= (1 + boost);
  }

  if(boss.id === "fenrir" && Number(boss._gleipnirKnots || 0) > 0){
    multiplier *= 0.75;
  }

  if(boss.id === "typhon" && boss._typhonWeather === "headwind") multiplier *= 1.1;
  if(boss.id === "angra_mainyu" && boss._eternalNight) multiplier *= 1.3;

  return multiplier;
}

function getBossAttackValue(boss, bossAttackMultiplier=1){
  const bonusAttack = Number(boss._bahamutAttackBonus || 0) + Number(boss._fenrirNextAttackBonus || 0);
  return Math.floor((boss.attack + bonusAttack) * bossAttackMultiplier * getBossAttackMultiplier(boss));
}

function getAliveTargets(targets){
  return targets.filter(f => {
    const c = ensureCombatStats(f);
    return c.hp > 0 && c.status !== "기절" && !c.devouredByFenrir;
  });
}

function getStrongestAliveFish(targets){
  const alive = getAliveTargets(targets);
  return alive.sort((a,b) => ensureCombatStats(b).attack - ensureCombatStats(a).attack)[0] || null;
}

function getEffectiveBossDodge(boss){
  if(boss.id === "fenrir" && Number(boss._gleipnirKnots || 0) > 0) return 0;
  if(boss.id === "angra_mainyu" && boss._eternalNight) return 0;
  if(boss.id === "typhon" && boss._typhonWeather === "turbulence") return Number(boss.dodge || 0) + 10;
  return Number(boss.dodge || 0);
}

function getEffectiveFishAttack(f, boss){
  const c = ensureCombatStats(f);
  let value = Number(c.attack || 0);
  if(c.azhiCurses && c.azhiCurses.weakness) value *= 0.85;
  if(boss.id === "typhon" && boss._typhonWeather === "headwind") value *= 0.8;
  return Math.max(0, Math.floor(value));
}

function getEffectiveFishDodge(f, boss){
  const c = ensureCombatStats(f);
  let value = Number(c.dodge || 0);
  if(c.azhiCurses && c.azhiCurses.fear) value *= 0.5;
  if(boss.id === "typhon" && boss._typhonWeather === "turbulence") value -= 10;
  if(boss.id === "typhon" && boss._typhonWeather === "eye") value = 0;
  return Math.max(0, value);
}

function getEffectiveFishCritRate(f){
  const c = ensureCombatStats(f);
  return Math.max(0, Number(c.critRate || 0) - (c.azhiCurses && c.azhiCurses.distrust ? 15 : 0));
}

function applyDamageToFish(f, damage, battleLog, prefix){
  const c = ensureCombatStats(f);
  const beforeHp = c.hp;
  c.hp = Math.max(0, c.hp - damage);

  let logText = prefix;
  logText += damage.toLocaleString() + " 피해\n\n";
  logText += color(lineFish(f), f.grade) + "\n" + hpBar(c.hp, c.maxHp);
  battleLog.push(logText);

  if(c.hp <= 0){
    stunFish(f);
    battleLog.push(color(lineFish(f), f.grade) + "\n체력이 0이 되어 회복 중입니다.");
  }

  const actualDamage = Math.min(beforeHp, damage);
  const peers = Array.isArray(c.rootLinkedPeers) ? c.rootLinkedPeers.filter(x => x !== f && ensureCombatStats(x).hp > 0) : [];
  if(actualDamage > 0 && peers.length > 0 && !c._receivingRootShare){
    const shareEach = Math.floor(actualDamage * 0.5 / peers.length);
    peers.forEach(peer => {
      const pc = ensureCombatStats(peer);
      pc._receivingRootShare = true;
      pc.hp = Math.max(0, pc.hp - shareEach);
      battleLog.push("뿌리의 연결\n" + color(lineFish(peer), peer.grade) + "에게 " + shareEach.toLocaleString() + " 피해 분배\n\n" + hpBar(pc.hp, pc.maxHp));
      if(pc.hp <= 0){
        stunFish(peer);
        delete pc.rootLinkedPeers;
        battleLog.push(color(lineFish(peer), peer.grade) + "\n연결 피해로 체력이 0이 되어 회복 중입니다.");
      }
      delete pc._receivingRootShare;
    });
  }
}

function bossSingleTargetAttack(boss, targets, battleLog, bossAttackMultiplier=1, skillName="공격", ignoreDodge=false, options={}){
  const alive = getAliveTargets(targets);
  if(alive.length === 0) return;

  const f = alive[Math.floor(Math.random() * alive.length)];
  const c = ensureCombatStats(f);
  const bossAttack = getBossAttackValue(boss, bossAttackMultiplier);
  const dodgeRoll = Math.random() * 100 < getEffectiveFishDodge(f, boss);

  if(dodgeRoll && !ignoreDodge){
    battleLog.push(bossColor(boss.name, boss) + "의 " + skillName + "\n" + color(lineFish(f), f.grade) + " 회피");
    return;
  }

  const bossHit = calcDamage(bossAttack, boss.critRate, boss.critDamage);

  let prefix = bossColor(boss.name, boss) + "의 " + skillName + "\n";
  if(dodgeRoll && ignoreDodge) prefix += "회피 시도!\n먹물 때문에 회피에 실패했습니다.\n";
  if(bossHit.crit) prefix += "치명타!\n";

  applyDamageToFish(f, bossHit.damage, battleLog, prefix);

  if(ensureCombatStats(f).hp > 0 && options.burn){
    c.burnStacks = Math.min(3, Number(c.burnStacks || 0) + 1);
    battleLog.push(color(lineFish(f), f.grade) + "\n화상 " + c.burnStacks + "중첩");
  }

  if(ensureCombatStats(f).hp > 0 && options.poison){
    c.poisonStacks = Math.min(3, Number(c.poisonStacks || 0) + 1);
    battleLog.push(color(lineFish(f), f.grade) + "\n독 " + c.poisonStacks + "중첩");
  }
}

function bossAttackSpecificTarget(boss, f, battleLog, bossAttackMultiplier=1, skillName="공격", ignoreDodge=false){
  if(!f) return false;
  const c = ensureCombatStats(f);
  if(c.hp <= 0 || c.status === "기절" || c.devouredByFenrir) return false;

  const dodgeRoll = Math.random() * 100 < getEffectiveFishDodge(f, boss);
  if(dodgeRoll && !ignoreDodge){
    battleLog.push(bossColor(boss.name, boss) + "의 " + skillName + "\n" + color(lineFish(f), f.grade) + " 회피");
    return false;
  }

  const hit = calcDamage(getBossAttackValue(boss, bossAttackMultiplier), boss.critRate, boss.critDamage);
  let prefix = bossColor(boss.name, boss) + "의 " + skillName + "\n";
  if(hit.crit) prefix += "치명타!\n";
  applyDamageToFish(f, hit.damage, battleLog, prefix);
  return true;
}

function bossAllTargetAttack(boss, targets, battleLog, bossAttackMultiplier=1, skillName="전체 공격", options={}){
  const logs = [];
  const bossAttack = getBossAttackValue(boss, bossAttackMultiplier);

  targets.forEach(f => {
    const c = ensureCombatStats(f);
    if(c.hp <= 0 || c.status === "기절") return;

    const dodgeRoll = Math.random() * 100 < getEffectiveFishDodge(f, boss);
    if(dodgeRoll){
      logs.push(color(lineFish(f), f.grade) + "\n회피");
      return;
    }

    const hit = calcDamage(bossAttack, boss.critRate, boss.critDamage);
    let damage = hit.damage;

    if(options.burnBonus){
      const burn = Number(c.burnStacks || 0);
      if(burn >= 2) damage = Math.floor(damage * 2.0);
      else if(burn >= 1) damage = Math.floor(damage * 1.5);
    }

    c.hp = Math.max(0, c.hp - damage);

    let entry = color(lineFish(f), f.grade) + "\n";
    if(hit.crit) entry += "치명타!\n";
    if(options.burnBonus && (c.burnStacks || 0) > 0) entry += "화상 추가 피해!\n";
    entry += damage.toLocaleString() + " 피해\n";
    entry += hpBar(c.hp, c.maxHp);

    if(c.hp <= 0){
      stunFish(f);
      entry += "\n체력이 0이 되어 회복 중입니다.";
    }

    logs.push(entry);
  });

  if(logs.length > 0) battleLog.push(bossColor(boss.name, boss) + "의 " + skillName + "!\n\n" + logs.join("\n\n"));
}

function applyBossPassiveBeforeFishAttack(boss, damage, battleLog=null){
  boss._lastDamageToSword = 0;

  if(boss.id === "behemoth") return Math.floor(damage * 0.8);

  if(boss.id === "bahamut"){
    const record = Number(boss._damageRecord || 0);
    if(damage >= record){
      const reduced = Math.floor(damage * 0.5);
      boss._damageRecord = reduced;
      if(battleLog){
        battleLog.push(bossColor(boss.name, boss) + "의 드래곤 스케일\n" + damage.toLocaleString() + " 피해를 " + reduced.toLocaleString() + " 피해로 감소\n피해 기록 : " + reduced.toLocaleString());
      }
      return reduced;
    }
  }

  if(boss.id === "surtr"){
    const swordHp = Math.max(0, Number(boss._flameSwordHp || 0));
    if(swordHp > 0){
      const swordDamage = Math.min(swordHp, Math.floor(damage * 0.5));
      boss._flameSwordHp = Math.max(0, swordHp - swordDamage);
      boss._lastDamageToSword = swordDamage;
      const bossDamage = damage - swordDamage;

      if(battleLog){
        battleLog.push(bossColor(boss.name, boss) + "의 불꽃의 검\n검에 " + swordDamage.toLocaleString() + " 피해\n내구도 : " + boss._flameSwordHp.toLocaleString() + " / 30,000,000");
      }

      if(boss._flameSwordHp <= 0 && !boss._flameSwordBroken){
        boss._flameSwordBroken = true;
        if(battleLog) battleLog.push(bossColor(boss.name, boss) + "의 불꽃의 검이 파괴되었습니다.\n이후 수르트가 받는 피해가 30% 증가합니다.");
      }
      return bossDamage;
    }

    if(boss._flameSwordBroken) return Math.floor(damage * 1.3);
  }

  return damage;
}

function handleFenrirCriticalHit(boss, hit, battleLog){
  if(boss.id !== "fenrir" || !hit.crit) return;

  if(boss._devouredFish) boss._devourCritThisTurn = true;

  const knots = Number(boss._gleipnirKnots || 0);
  const brokenThisTurn = Number(boss._knotsBrokenThisTurn || 0);
  if(knots <= 0 || brokenThisTurn >= 2) return;

  boss._gleipnirKnots = knots - 1;
  boss._knotsBrokenThisTurn = brokenThisTurn + 1;
  battleLog.push(bossColor(boss.name, boss) + "의 글레이프니르\n매듭 해제 : " + boss._gleipnirKnots + " / 6 남음");

  if(boss._gleipnirKnots <= 0){
    battleLog.push(bossColor(boss.name, boss) + "가 글레이프니르를 완전히 끊었습니다.\n공격력과 회피율이 원래 수치로 돌아가며 신을 삼키는 자를 사용할 수 있습니다.");
  }
}

function resolveFenrirDevour(boss, bossHp, battleLog){
  const f = boss._devouredFish;
  if(boss.id !== "fenrir" || !f) return;

  const c = ensureCombatStats(f);
  delete c.devouredByFenrir;

  if(bossHp <= 0 || boss._devourCritThisTurn){
    battleLog.push(color(lineFish(f), f.grade) + "\n신을 삼키는 자에서 구출되었습니다.");
  } else {
    const damage = Math.floor(c.maxHp * 0.5);
    applyDamageToFish(f, damage, battleLog, bossColor(boss.name, boss) + "의 신을 삼키는 자\n구출 실패\n");
  }

  boss._devouredFish = null;
  boss._devourCritThisTurn = false;
}

function prepareSurtrTurn(boss, participants, battleLog){
  if(boss.id !== "surtr") return;

  boss._surtrTurnAction = "normal";
  boss._surtrDuelTarget = null;

  if(boss._muspelPending){
    boss._muspelPending = false;
    boss._surtrTurnAction = "march";
    bossAllTargetAttack(boss, participants, battleLog, 0.8, "무스펠의 진군");
    return;
  }

  const roll = Math.random() * 100;
  if(roll < 20){
    const target = getStrongestAliveFish(participants);
    if(target){
      boss._surtrTurnAction = "duel";
      boss._surtrDuelTarget = target;
      battleLog.push(bossColor(boss.name, boss) + "의 프레이르와의 결투\n" + color(lineFish(target), target.grade) + "와 1대1 결투를 시작합니다.\n다른 물고기는 이번 턴에 행동하지 않습니다.");
    }
    return;
  }

  if(roll < 35){
    boss._surtrTurnAction = "prepare";
    boss._muspelPending = true;
    battleLog.push(bossColor(boss.name, boss) + "가 무스펠의 진군을 준비합니다.\n이번 턴에는 공격하지 않고 다음 턴 시작 시 전체 공격을 사용합니다.");
  }
}

function applyPhoenixImmortalityIfNeeded(boss, bossHp, battleLog){
  if(boss.id !== "phoenix") return bossHp;
  if(bossHp > 0) return bossHp;
  if(boss._revived) return bossHp;

  boss._revived = true;
  bossHp = Math.floor(boss.hp * 0.5);
  battleLog.push(bossColor(boss.name, boss) + "의 불사\n체력 50%로 1회 부활했습니다.\n\n" + hpBar(bossHp, boss.hp));
  return bossHp;
}

function applyBossStartTurnEffects(participants, battleLog){
  participants.forEach(f => {
    const c = ensureCombatStats(f);
    if(c.hp <= 0 || c.status === "기절") return;

    const poison = Math.min(3, Number(c.poisonStacks || 0));
    if(poison <= 0) return;

    const damage = Math.floor(c.maxHp * 0.02 * poison);
    c.hp = Math.max(0, c.hp - damage);

    let entry = color(lineFish(f), f.grade) + "\n독 " + poison + "중첩\n";
    entry += damage.toLocaleString() + " 피해\n";
    entry += hpBar(c.hp, c.maxHp);

    if(c.hp <= 0){
      stunFish(f);
      entry += "\n체력이 0이 되어 회복 중입니다.";
    }

    battleLog.push(entry);
  });
}

function applyBossEndTurnPassive(boss, bossHp, battleLog){
  if((boss.id === "hydra" || boss.id === "tiamat") && bossHp > 0){
    const rate = boss.id === "hydra" ? 0.05 : 0.02;
    const heal = Math.floor(boss.hp * rate);
    const before = bossHp;
    bossHp = Math.min(boss.hp, bossHp + heal);
    if(bossHp > before) battleLog.push(bossColor(boss.name, boss) + "가 회복했습니다.\n" + (bossHp - before).toLocaleString() + " 회복\n\n" + hpBar(bossHp, boss.hp));
  }

  if(boss.id === "leviathan" && bossHp > 0 && bossHp <= boss.hp * 0.5 && !boss._enraged){
    boss._enraged = true;
    battleLog.push(bossColor(boss.name, boss) + "이 분노했습니다!\n공격력이 증가했습니다.");
  }

  return bossHp;
}

function spawnBabyDragons(boss, battleLog){
  if(!boss._summons) boss._summons = [];

  for(let i=0;i<3;i++){
    const babyHp = randomInt(100000, 300000);
    const babyAttack = randomInt(10000, 30000);
    boss._summons.push({name:"새끼 용", hp:babyHp, maxHp:babyHp, attack:babyAttack});
  }

  battleLog.push(bossColor(boss.name, boss) + "의 괴수 탄생 (15%)\n새끼 용 3마리를 소환했습니다.");
}

function getAliveSummons(boss){
  return (boss._summons || []).filter(x => x.hp > 0);
}

function fishAttackTargetText(target, boss){
  if(target.type === "boss") return bossColor(boss.name, boss) + "\n" + hpBar(target.hp, boss.hp);
  return target.name + "\n" + hpBar(target.hp, target.maxHp);
}

function babyDragonActions(boss, participants, battleLog){
  const summons = getAliveSummons(boss);
  if(summons.length === 0) return;

  summons.forEach((dragon, i) => {
    const alive = getAliveTargets(participants);
    if(alive.length === 0) return;

    const f = alive[Math.floor(Math.random() * alive.length)];
    const c = ensureCombatStats(f);
    const dodgeRoll = Math.random() * 100 < c.dodge;

    if(dodgeRoll){
      battleLog.push("새끼 용 " + (i+1) + "의 공격\n" + color(lineFish(f), f.grade) + " 회피");
      return;
    }

    applyDamageToFish(f, dragon.attack, battleLog, "새끼 용 " + (i+1) + "의 공격\n");
  });
}

function runFenrirTyrHand(boss, participants, battleLog){
  const target = getStrongestAliveFish(participants);
  if(!target) return;

  const hit = bossAttackSpecificTarget(boss, target, battleLog, 1.3, "티르의 오른손", false);
  boss._fenrirNextAttackBonus = 0;

  if(hit){
    boss._fenrirNextAttackBonus = Math.floor(ensureCombatStats(target).attack * 0.4);
    battleLog.push(bossColor(boss.name, boss) + "가 " + color(lineFish(target), target.grade) + "의 공격력 40%를 빼앗았습니다.\n다음 공격 추가 공격력 : " + boss._fenrirNextAttackBonus.toLocaleString());
  }
}

function runFenrirDevour(boss, participants, battleLog){
  const target = getStrongestAliveFish(participants);
  if(!target) return;

  const c = ensureCombatStats(target);
  c.devouredByFenrir = true;
  boss._devouredFish = target;
  boss._devourCritThisTurn = false;
  battleLog.push(bossColor(boss.name, boss) + "의 신을 삼키는 자\n" + color(lineFish(target), target.grade) + "를 삼켰습니다.\n다음 턴에 남은 물고기가 치명타 피해를 주면 구출할 수 있습니다.");
}

function getFishByHighest(participants, getter){
  return getAliveTargets(participants).sort((a,b) => getter(b) - getter(a))[0] || null;
}

function runCerberusJudgment(boss, participants, battleLog){
  const hpRate = Number(boss._currentHp || boss.hp) / boss.hp;
  const heads = hpRate > 0.66 ? 3 : (hpRate > 0.33 ? 2 : 1);
  const targets = [
    getFishByHighest(participants, f => ensureCombatStats(f).attack),
    getFishByHighest(participants, f => ensureCombatStats(f).maxHp),
    getFishByHighest(participants, f => ensureCombatStats(f).critRate)
  ];
  battleLog.push(bossColor(boss.name, boss) + "의 세 머리의 판결\n남은 머리 : " + heads);
  for(let i=0;i<heads;i++) bossAttackSpecificTarget(boss, targets[i], battleLog, 0.6, "세 머리의 판결", false);
}

function runCerberusDeadWeight(boss, participants, battleLog){
  const target = getAliveTargets(participants).sort((a,b) => ensureCombatStats(a).hp - ensureCombatStats(b).hp)[0];
  if(!target) return;
  const c = ensureCombatStats(target);
  const lostRate = 1 - c.hp / c.maxHp;
  bossAttackSpecificTarget(boss, target, battleLog, 1.2 + lostRate, "망자의 무게", false);
}

function refreshRootLinks(boss, participants, battleLog){
  let links = (boss._rootLinks || []).filter(f => ensureCombatStats(f).hp > 0);
  const available = getAliveTargets(participants).filter(f => !links.includes(f));
  if(links.length === 0){
    while(links.length < 2 && available.length){
      links.push(available.splice(Math.floor(Math.random()*available.length),1)[0]);
    }
  } else if(links.length < 3 && available.length){
    links.push(available.splice(Math.floor(Math.random()*available.length),1)[0]);
  }
  boss._rootLinks = links;
  boss._rootLinkTurns = 3;
  links.forEach(f => ensureCombatStats(f).rootLinkedPeers = links);
  battleLog.push(bossColor(boss.name, boss) + "의 뿌리의 연결\n" + links.map(f => color(lineFish(f), f.grade)).join("\n") + "\n연결 지속 : 2턴");
}

function runRatatoskr(boss, participants, battleLog){
  const attacker = getStrongestAliveFish(participants);
  if(!attacker) return;
  ensureCombatStats(attacker).ratatoskrRedirect = true;
  battleLog.push(bossColor(boss.name, boss) + "의 라타토스크의 이간질\n" + color(lineFish(attacker), attacker.grade) + "의 다음 공격이 아군을 향합니다.");
}

function getCurseCount(f){
  return Object.values(ensureCombatStats(f).azhiCurses || {}).filter(Boolean).length;
}

function triggerThreeCalamities(f, battleLog){
  const c = ensureCombatStats(f);
  if(getCurseCount(f) < 3) return;
  const damage = Math.floor(c.maxHp * 0.2);
  c.hp = Math.max(0, c.hp - damage);
  c.azhiCurses = {};
  battleLog.push("세 가지 재앙 폭발\n" + color(lineFish(f), f.grade) + "에게 최대 체력의 20% 피해\n\n" + hpBar(c.hp, c.maxHp));
  if(c.hp <= 0) stunFish(f);
}

function applyAzhiCurse(boss, f, curse, label, participants, battleLog){
  if(!f || ensureCombatStats(f).hp <= 0) return;
  const c = ensureCombatStats(f);
  if(!c.azhiCurses) c.azhiCurses = {};
  c.azhiCurses[curse] = true;
  bossAttackSpecificTarget(boss, f, battleLog, 0.65, "세 머리의 선택 - " + label, false);
  triggerThreeCalamities(f, battleLog);
}

function runAzhiChoice(boss, participants, battleLog){
  applyAzhiCurse(boss, getFishByHighest(participants,f=>ensureCombatStats(f).attack), "weakness", "쇠약", participants, battleLog);
  applyAzhiCurse(boss, getFishByHighest(participants,f=>ensureCombatStats(f).dodge), "fear", "공포", participants, battleLog);
  applyAzhiCurse(boss, getFishByHighest(participants,f=>ensureCombatStats(f).critRate), "distrust", "불신", participants, battleLog);
}

function runAzhiConcentration(boss, participants, battleLog){
  const alive = getAliveTargets(participants);
  const target = alive.sort((a,b)=>getCurseCount(b)-getCurseCount(a))[0];
  if(!target) return;
  const tc = ensureCombatStats(target);
  if(!tc.azhiCurses) tc.azhiCurses = {};
  let moved = 0;
  alive.filter(f=>f!==target).forEach(f=>{
    const c = ensureCombatStats(f);
    const key = Object.keys(c.azhiCurses || {}).find(k => c.azhiCurses[k] && !tc.azhiCurses[k]);
    if(key){ delete c.azhiCurses[key]; tc.azhiCurses[key] = true; moved++; }
  });
  if(moved === 0) return bossAttackSpecificTarget(boss, target, battleLog, 1.6, "재앙 집중", false);
  battleLog.push(bossColor(boss.name, boss) + "의 재앙 집중\n" + moved + "개의 재앙이 " + color(lineFish(target), target.grade) + "에게 이동했습니다.");
  triggerThreeCalamities(target, battleLog);
}

function prepareTyphonWeather(boss, battleLog){
  if(boss.id !== "typhon") return;
  const weather = ["headwind","turbulence","eye"][Math.floor(Math.random()*3)];
  boss._typhonWeather = weather;
  boss.critRate = boss._baseCritRate;
  boss.critDamage = boss._baseCritDamage;
  let text = "역풍 - 물고기 공격력 -20%, 타이폰 공격력 +10%";
  if(weather === "turbulence") text = "난기류 - 물고기 회피율 -10%, 타이폰 회피율 +10%";
  if(weather === "eye"){
    boss.critRate += 15;
    boss.critDamage += 50;
    text = "폭풍의 눈 - 물고기 회피 불가, 타이폰 치명타 강화";
  }
  battleLog.push(bossColor(boss.name, boss) + "의 폭풍의 지배자\n" + text);
}

function runTyphonEcho(boss, participants, battleLog){
  const f = boss._lastTopDamageFish;
  if(!f || ensureCombatStats(f).hp <= 0 || !boss._lastTopDamage){
    return bossSingleTargetAttack(boss, participants, battleLog, 1.3, "폭풍의 반향", false);
  }
  const c = ensureCombatStats(f);
  const damage = Math.min(Math.floor(boss._lastTopDamage * 0.3), Math.floor(c.maxHp * 0.25));
  applyDamageToFish(f, damage, battleLog, bossColor(boss.name, boss) + "의 폭풍의 반향\n회피 불가\n");
}

function runTyphonFall(boss, participants, battleLog){
  const a = getFishByHighest(participants,f=>ensureCombatStats(f).attack);
  const h = getFishByHighest(participants,f=>ensureCombatStats(f).maxHp);
  if(!a || !h) return;
  if(a === h) return bossAttackSpecificTarget(boss, a, battleLog, 1.7, "대지와 하늘의 추락", false);
  const ac=ensureCombatStats(a), hc=ensureCombatStats(h);
  const lower=Math.min(ac.hp/ac.maxHp,hc.hp/hc.maxHp);
  ac.hp=Math.max(1,Math.floor(ac.maxHp*lower)); hc.hp=Math.max(1,Math.floor(hc.maxHp*lower));
  battleLog.push(bossColor(boss.name,boss)+"의 대지와 하늘의 추락\n두 대상의 체력 비율이 "+Math.floor(lower*100)+"%로 추락했습니다.\n\n"+color(lineFish(a),a.grade)+"\n"+hpBar(ac.hp,ac.maxHp)+"\n\n"+color(lineFish(h),h.grade)+"\n"+hpBar(hc.hp,hc.maxHp));
}

function reduceExistence(boss, f, amount, battleLog, reason){
  if(!f || ensureCombatStats(f).hp <= 0) return;
  const c=ensureCombatStats(f);
  c.existence=Math.max(0,Number(c.existence===undefined?3:c.existence)-amount);
  battleLog.push(reason+"\n"+color(lineFish(f),f.grade)+"\n존재 : "+c.existence+" / 3");
  if(c.existence<=0){ stunFish(f); battleLog.push(color(lineFish(f),f.grade)+"\n존재가 말살되어 회복 중입니다."); }
}

function runExistenceAnnihilation(boss, participants, battleLog){
  const target=getStrongestAliveFish(participants); if(!target) return;
  const before=ensureCombatStats(target).hp;
  bossAttackSpecificTarget(boss,target,battleLog,boss._eternalNight?2.2:1.8,"존재 말살",false);
  if(ensureCombatStats(target).hp<=0 && before>0){
    const other=getAliveTargets(participants).filter(f=>f!==target); if(other.length) reduceExistence(boss,other[Math.floor(Math.random()*other.length)],1,battleLog,"존재 말살 전이");
  } else reduceExistence(boss,target,1,battleLog,"존재 말살");
}

function runCreationCollapse(boss, participants, battleLog){
  const rate=boss._eternalNight?0.2:0.15;
  getAliveTargets(participants).forEach(f=>{
    const c=ensureCombatStats(f), damage=Math.floor(c.maxHp*rate);
    c.hp=Math.max(1,c.hp-damage);
    battleLog.push(bossColor(boss.name,boss)+"의 창조의 붕괴\n"+color(lineFish(f),f.grade)+"\n"+damage.toLocaleString()+" 피해\n\n"+hpBar(c.hp,c.maxHp));
    if(c.hp/c.maxHp<=0.4) reduceExistence(boss,f,1,battleLog,"창조의 붕괴");
  });
}

function runBossAction(boss, participants, battleLog){
  if(boss.id === "cerberus"){
    const r=Math.random()*100;
    if(r<20) return runCerberusJudgment(boss,participants,battleLog);
    if(r<35) return runCerberusDeadWeight(boss,participants,battleLog);
    return bossSingleTargetAttack(boss,participants,battleLog,1,"공격",false);
  }

  if(boss.id === "nidhogg"){
    const r=Math.random()*100;
    if(r<20) return refreshRootLinks(boss,participants,battleLog);
    if(r<35) return runRatatoskr(boss,participants,battleLog);
    return bossSingleTargetAttack(boss,participants,battleLog,1,"공격",false);
  }

  if(boss.id === "azhi_dahaka"){
    const r=Math.random()*100;
    if(r<25) return runAzhiChoice(boss,participants,battleLog);
    if(r<40) return runAzhiConcentration(boss,participants,battleLog);
    return bossSingleTargetAttack(boss,participants,battleLog,1,"공격",false);
  }

  if(boss.id === "typhon"){
    const r=Math.random()*100;
    if(r<20) return runTyphonEcho(boss,participants,battleLog);
    if(r<35) return runTyphonFall(boss,participants,battleLog);
    return bossSingleTargetAttack(boss,participants,battleLog,1,"공격",false);
  }

  if(boss.id === "angra_mainyu"){
    const r=Math.random()*100;
    if(r<20) return runExistenceAnnihilation(boss,participants,battleLog);
    if(r<35) return runCreationCollapse(boss,participants,battleLog);
    return bossSingleTargetAttack(boss,participants,battleLog,1,"공격",false);
  }

  if(boss.id === "fenrir"){
    const r = Math.random() * 100;
    if(r < 20) return runFenrirTyrHand(boss, participants, battleLog);
    if(r < 35 && Number(boss._gleipnirKnots || 0) <= 0 && !boss._devouredFish){
      return runFenrirDevour(boss, participants, battleLog);
    }
    bossSingleTargetAttack(boss, participants, battleLog, 1, "공격", false);
    boss._fenrirNextAttackBonus = 0;
    return;
  }

  if(boss.id === "surtr"){
    if(boss._surtrTurnAction === "normal") bossSingleTargetAttack(boss, participants, battleLog, 1, "공격", false);
    return;
  }

  if(boss.id === "phoenix"){
    const r = Math.random() * 100;
    if(r < 25) return bossSingleTargetAttack(boss, participants, battleLog, 1, "재의 낙인", false, {burn:true});
    if(r < 40) return bossAllTargetAttack(boss, participants, battleLog, 1.5, "윤회의 불꽃", {burnBonus:true});
    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  if(boss.id === "bahamut"){
    const r = Math.random() * 100;

    if(r < 15){
      bossSingleTargetAttack(boss, participants, battleLog, 3, "메가 플레어", false);
      boss._fishDisabledNextTurn = true;
      battleLog.push(bossColor(boss.name, boss) + "의 메가 플레어 여파\n다음 턴 참가 물고기 전체가 행동할 수 없습니다.");
      return;
    }

    if(r < 40){
      bossSingleTargetAttack(boss, participants, battleLog, 1.5, "용왕의 포효", false);
      boss._bahamutAttackBonus = Number(boss._bahamutAttackBonus || 0) + Math.floor(boss.attack * 0.5);
      battleLog.push(bossColor(boss.name, boss) + "의 공격력이 누적 증가했습니다.\n현재 공격력 : " + (boss.attack + boss._bahamutAttackBonus).toLocaleString());
      return;
    }

    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  if(boss.id === "tiamat"){
    const r = Math.random() * 100;
    if(r < 25) return bossSingleTargetAttack(boss, participants, battleLog, 2, "창세의 바다", false);
    if(r < 40) return spawnBabyDragons(boss, battleLog);
    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  if(boss.id === "jormungandr"){
    const r = Math.random() * 100;
    if(r < 25){
      bossSingleTargetAttack(boss, participants, battleLog, 2, "미드가르드 감기", false);
      boss._ring = Math.min(3, Number(boss._ring || 0) + 1);
      if(boss._ring >= 3 && !boss._ringCompleted){
        boss._ringCompleted = true;
        boss._attackBoost = Math.max(Number(boss._attackBoost || 0), 0.5);
        battleLog.push(bossColor(boss.name, boss) + "의 세계의 고리가 완성되었습니다.\n공격력 증가 한도가 100%로 확장되고 힘이 더 강해졌습니다.");
      } else {
        battleLog.push(bossColor(boss.name, boss) + "의 세계의 고리 " + boss._ring + " / 3");
      }
      return;
    }
    if(r < 40) return bossSingleTargetAttack(boss, participants, battleLog, 1.2, "종말의 독", false, {poison:true});
    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  const skillRoll = Math.random() * 100 < (boss.skillRate || 20);

  if(skillRoll){
    if(boss.id === "kraken") bossSingleTargetAttack(boss, participants, battleLog, 1.5, boss.skillName, false);
    else if(boss.id === "hydra") bossSingleTargetAttack(boss, participants, battleLog, 1.8, boss.skillName, false);
    else if(boss.id === "leviathan") bossAllTargetAttack(boss, participants, battleLog, 1, boss.skillName);
    else if(boss.id === "behemoth") bossSingleTargetAttack(boss, participants, battleLog, 2.5, boss.skillName, false);
    else bossSingleTargetAttack(boss, participants, battleLog, 1, boss.skillName || "공격", false);
  } else {
    if(boss.id === "kraken") bossSingleTargetAttack(boss, participants, battleLog, 1.2, "먹물 난사", true);
    else bossSingleTargetAttack(boss, participants, battleLog, 1, "공격", false);
  }
}

function cleanupBattleEffects(participants){
  participants.forEach(f => {
    const c = ensureCombatStats(f);
    delete c.burnStacks;
    delete c.poisonStacks;
    delete c.devouredByFenrir;
    delete c.rootLinkedPeers;
    delete c.ratatoskrRedirect;
    delete c.azhiCurses;
    delete c.existence;
    if(c._preErosionMaxHp){
      c.maxHp = c._preErosionMaxHp;
      if(c.hp > 0) c.hp = c.maxHp;
      delete c._preErosionMaxHp;
    }
  });
}

function getPreparedRecoveryFishes(){
  return bossPrepIndexes
    .map(idx => bucket[idx])
    .filter(f => f && f.grade !== "쓰레기" && ensureCombatStats(f).status === "회복 중");
}

function runBossBattle(){
  if(!isBossMenu) return print("보스전에 입장한 뒤 사용할 수 있습니다.");
  recoverStunnedFish();

  const selectedBoss = getCurrentBoss();
  if(isBossCooldownActive(selectedBoss.id)) return print("아직 보스전 쿨타임이 남아있습니다.\n\n남은 시간 : " + formatRemain(getBossCooldownLeft(selectedBoss.id)));
  if(bossPrepIndexes.length === 0) return print("준비된 물고기가 없습니다.\n준비 번호 를 입력하세요.");

  const recoveryFishes = getPreparedRecoveryFishes();
  if(recoveryFishes.length > 0 && !pendingRecoveryBattleConfirm){
    let msg = "회복 중인 물고기가 포함되어 있습니다.\n\n";
    recoveryFishes.forEach(f => {
      msg += color(lineFish(f), f.grade) + "\n";
      msg += "상태 : " + getCombatStatusText(f) + "\n\n";
    });
    msg += "회복 중인 물고기도 전투에 참가합니다.\n\n계속하려면 전투 확인 을 입력하세요.";
    pendingRecoveryBattleConfirm = true;
    return print(msg.trim());
  }

  pendingRecoveryBattleConfirm = false;

  const boss = {
    ...getCurrentBoss(),
    _enraged:false,
    _revived:false,
    _damageRecord:0,
    _fishDisabledNextTurn:false,
    _bahamutAttackBonus:0,
    _summons:[],
    _attackBoost:0,
    _ring:0,
    _ringCompleted:false,
    _gleipnirKnots:6,
    _knotsBrokenThisTurn:0,
    _fenrirNextAttackBonus:0,
    _devouredFish:null,
    _devourCritThisTurn:false,
    _flameSwordHp:30000000,
    _flameSwordBroken:false,
    _lastDamageToSword:0,
    _muspelPending:false,
    _surtrTurnAction:"normal",
    _surtrDuelTarget:null,
    _rootLinks:[],
    _rootLinkTurns:0,
    _erosionStacks:0,
    _baseCritRate:selectedBoss.critRate,
    _baseCritDamage:selectedBoss.critDamage,
    _typhonWeather:null,
    _lastTopDamageFish:null,
    _lastTopDamage:0,
    _thisTurnTopDamageFish:null,
    _thisTurnTopDamage:0,
    _existenceWaves:{75:false,50:false,25:false},
    _eternalNight:false
  };

  if(!isBossUnlocked(boss)) return print("아직 해금되지 않은 보스입니다.");
  if(isBossCooldownActive(boss.id)) return print("아직 보스전 쿨타임이 남아있습니다.\n\n남은 시간 : " + formatRemain(getBossCooldownLeft(boss.id)));

  let bossHp = getBossHp(boss);
  let totalDamage = 0;
  const participants = getAlivePreparedFishes();
  const battleLog = [];
  let result = "처치 실패";
  let rewardMoney = 0;
  let rewardDrop = "";

  if(participants.length === 0) return print("전투 가능한 물고기가 없습니다.");

  cleanupBattleEffects(participants);

  if(boss.id === "angra_mainyu") participants.forEach(f => ensureCombatStats(f).existence = 3);

  battleLog.push("전투 시작\n\n" + participants.map(f => color(lineFish(f), f.grade) + "\n" + hpBar(ensureCombatStats(f).hp, ensureCombatStats(f).maxHp)).join("\n\n"));

  let turn = 1;
  while(bossHp > 0 && participants.some(f => ensureCombatStats(f).hp > 0 && ensureCombatStats(f).status !== "기절") && turn <= 200){
    boss._fishDisabledThisTurn = !!boss._fishDisabledNextTurn;
    boss._fishDisabledNextTurn = false;
    boss._knotsBrokenThisTurn = 0;
    if(boss._devouredFish) boss._devourCritThisTurn = false;
    boss._thisTurnTopDamage = 0;
    boss._thisTurnTopDamageFish = null;

    battleLog.push("턴 " + turn);

    if(boss.id === "nidhogg"){
      if(boss._rootLinkTurns > 0){
        boss._rootLinkTurns--;
        if(boss._rootLinkTurns <= 0){
          (boss._rootLinks || []).forEach(f => delete ensureCombatStats(f).rootLinkedPeers);
          boss._rootLinks = [];
          battleLog.push(bossColor(boss.name,boss) + "의 뿌리 연결이 풀렸습니다.");
        }
      }
      if(turn % 4 === 0 && boss._erosionStacks < 5){
        boss._erosionStacks++;
        participants.forEach(f => {
          const c=ensureCombatStats(f);
          if(!c._preErosionMaxHp) c._preErosionMaxHp=c.maxHp;
          const newMax=Math.max(1,Math.floor(c._preErosionMaxHp*(1-boss._erosionStacks*0.05)));
          c.maxHp=newMax; c.hp=Math.min(c.hp,newMax);
        });
        battleLog.push(bossColor(boss.name,boss)+"의 세계수 침식\n최대 체력 -"+(boss._erosionStacks*5)+"%");
      }
    }

    prepareTyphonWeather(boss,battleLog);

    if(boss._fishDisabledThisTurn){
      battleLog.push(bossColor(boss.name, boss) + "의 메가 플레어 여파\n참가 물고기 전체가 이번 턴 행동할 수 없습니다.");
    }

    if(boss.id === "jormungandr"){
      const limit = boss._ringCompleted ? 1.0 : 0.5;
      const before = Number(boss._attackBoost || 0);
      boss._attackBoost = Math.min(limit, before + 0.05);
      if(boss._attackBoost > before){
        battleLog.push(bossColor(boss.name, boss) + "의 세계를 감은 자\n공격력 증가 : +" + Math.round(boss._attackBoost * 100) + "%");
      }
    }

    applyBossStartTurnEffects(participants, battleLog);
    if(!participants.some(f => ensureCombatStats(f).hp > 0 && ensureCombatStats(f).status !== "기절")) break;

    prepareSurtrTurn(boss, participants, battleLog);
    if(!participants.some(f => ensureCombatStats(f).hp > 0 && ensureCombatStats(f).status !== "기절")) break;

    battleLog.push('<span style="color:#58a6ff;font-weight:700">내 턴</span>');

    for(const f of participants){
      const c = ensureCombatStats(f);
      if(c.hp <= 0 || c.status === "기절") continue;
      if(bossHp <= 0) break;

      if(c.devouredByFenrir){
        battleLog.push(color(lineFish(f), f.grade) + "\n펜리르에게 삼켜져 이번 턴에 행동할 수 없습니다.");
        continue;
      }

      if(boss.id === "surtr" && boss._surtrTurnAction === "duel" && f !== boss._surtrDuelTarget){
        battleLog.push(color(lineFish(f), f.grade) + "\n프레이르와의 결투가 진행 중이어서 이번 턴에 행동하지 않습니다.");
        continue;
      }

      if(boss._fishDisabledThisTurn){
        battleLog.push(color(lineFish(f), f.grade) + "\n메가 플레어의 여파로 행동할 수 없습니다.");
        continue;
      }

      if(c.ratatoskrRedirect){
        delete c.ratatoskrRedirect;
        const allies=getAliveTargets(participants).filter(x=>x!==f).sort((a,b)=>ensureCombatStats(b).hp-ensureCombatStats(a).hp);
        const ally=allies[0];
        if(ally){
          const ac=ensureCombatStats(ally);
          if(Math.random()*100 < getEffectiveFishDodge(ally,boss)){
            battleLog.push("라타토스크의 이간질\n"+color(lineFish(f),f.grade)+"의 공격을 "+color(lineFish(ally),ally.grade)+"이 회피했습니다.");
          } else {
            const redirected=calcDamage(getEffectiveFishAttack(f,boss),getEffectiveFishCritRate(f),c.critDamage);
            applyDamageToFish(ally,redirected.damage,battleLog,"라타토스크의 이간질\n"+color(lineFish(f),f.grade)+"의 아군 공격\n"+(redirected.crit?"치명타!\n":""));
          }
          continue;
        }
      }

      const summons = getAliveSummons(boss);
      const targetSummon = summons.length > 0 ? summons[0] : null;

      if(targetSummon){
        const hit = calcDamage(getEffectiveFishAttack(f,boss), getEffectiveFishCritRate(f), c.critDamage);
        targetSummon.hp = Math.max(0, targetSummon.hp - hit.damage);
        totalDamage += hit.damage;

        let entry = color(lineFish(f), f.grade) + " 공격\n";
        if(hit.crit) entry += "치명타!\n";
        entry += hit.damage.toLocaleString() + " 피해\n\n";
        entry += targetSummon.name + "\n" + hpBar(targetSummon.hp, targetSummon.maxHp);
        battleLog.push(entry);

        if(targetSummon.hp <= 0){
          battleLog.push(targetSummon.name + "을 쓰러뜨렸습니다.");
        }
        continue;
      }

      const duelAttack = boss.id === "surtr" && boss._surtrTurnAction === "duel" && f === boss._surtrDuelTarget;
      if(duelAttack || Math.random() * 100 >= getEffectiveBossDodge(boss)){
        const hit = calcDamage(getEffectiveFishAttack(f,boss), getEffectiveFishCritRate(f), c.critDamage);
        let damage = applyBossPassiveBeforeFishAttack(boss, hit.damage, battleLog);
        bossHp = Math.max(0, bossHp - damage);
        boss._currentHp = bossHp;
        totalDamage += damage + Number(boss._lastDamageToSword || 0);

        if(boss.id === "typhon" && damage > boss._thisTurnTopDamage){
          boss._thisTurnTopDamage=damage;
          boss._thisTurnTopDamageFish=f;
        }

        let entry = color(lineFish(f), f.grade) + " 공격\n";
        if(hit.crit) entry += "치명타!\n";
        if(boss.id === "behemoth" && damage < hit.damage) entry += "베히모스가 피해를 감소시켰습니다.\n";
        entry += damage.toLocaleString() + " 피해\n\n";
        entry += bossColor(boss.name, boss) + "\n" + hpBar(bossHp, boss.hp);
        battleLog.push(entry);

        handleFenrirCriticalHit(boss, hit, battleLog);

        if(boss.id === "angra_mainyu"){
          [75,50,25].forEach(threshold=>{
            if(!boss._existenceWaves[threshold] && bossHp <= boss.hp*threshold/100){
              boss._existenceWaves[threshold]=true;
              const alive=getAliveTargets(participants);
              if(alive.length) reduceExistence(boss,alive[Math.floor(Math.random()*alive.length)],1,battleLog,"파멸의 파동 (체력 "+threshold+"%)");
            }
          });
          if(bossHp <= boss.hp*0.25 && !boss._eternalNight){
            boss._eternalNight=true;
            battleLog.push(bossColor(boss.name,boss)+"의 영겁의 밤\n공격력 30% 증가, 회피율 0%\n존재 말살과 창조의 붕괴가 강화됩니다.");
          }
        }

        bossHp = applyPhoenixImmortalityIfNeeded(boss, bossHp, battleLog);

        if(duelAttack){
          bossAttackSpecificTarget(boss, f, battleLog, 1.8, "프레이르와의 결투", true);
        }
      } else {
        battleLog.push(color(lineFish(f), f.grade) + " 공격\n" + bossColor(boss.name, boss) + " 회피");
      }
    }

    resolveFenrirDevour(boss, bossHp, battleLog);

    if(bossHp <= 0) break;

    bossHp = applyBossEndTurnPassive(boss, bossHp, battleLog);
    boss._currentHp = bossHp;
    battleLog.push('<span style="color:#ff7b72;font-weight:700">보스 턴</span>');
    runBossAction(boss, participants, battleLog);
    babyDragonActions(boss, participants, battleLog);

    if(boss.id === "typhon"){
      boss._lastTopDamage=boss._thisTurnTopDamage;
      boss._lastTopDamageFish=boss._thisTurnTopDamageFish;
    }

    turn++;
  }

  if(bossHp <= 0){
    result = "처치 성공";
    const firstClear = isBossFirstClear(boss);
    rewardMoney = firstClear ? boss.reward : 0;
    rewardDrop = boss.drop;

    if(rewardMoney > 0){
      money = normalizeMoney(money + rewardMoney);
      totalEarned = normalizeMoney(totalEarned + rewardMoney);
    }

    addMaterial(rewardDrop, 1);
    bossProgress.defeated[boss.id] = true;
    bossProgress.hp[boss.id] = boss.hp;

    if(firstClear){
      battleLog.push("최초 클리어 보상\n" + formatMoney(rewardMoney) + " 획득");
    } else {
      battleLog.push("재도전 클리어\n이미 최초 클리어 보상을 획득한 보스입니다.\n상금은 지급되지 않습니다.");
    }

    const nextBoss = bossList.find(b => isBossUnlocked(b) && !bossProgress.defeated[b.id]);
    if(nextBoss){
      bossProgress.selectedBossId = nextBoss.id;
      if(!bossProgress.hp[nextBoss.id]) bossProgress.hp[nextBoss.id] = nextBoss.hp;
    }
  } else {
    bossProgress.hp[boss.id] = boss.hp;
    battleLog.push(bossColor(boss.name, boss) + "의 체력이 최대 체력으로 회복되었습니다.\n다음 전투는 처음부터 다시 시작됩니다.");
  }

  participants.forEach(f => {
    const c = ensureCombatStats(f);
    if(c.hp > 0){
      c.hp = c.maxHp;
      c.status = "정상";
      delete c.stunUntil;
    }
  });
  cleanupBattleEffects(participants);

  const resultText = buildBattleResultText(boss, participants, totalDamage, result, rewardMoney, rewardDrop, battleLog);
  const summary = buildBattleSummaryText(boss, result, rewardMoney, rewardDrop);

  if(result === "처치 성공"){
    setBossCooldown(boss.id);
  }
  bossPrepIndexes = [];
  saveGame();

  printPreview("전투 종료", summary, "전투 결과", resultText);
}

function buildBattleSummaryText(boss, result, rewardMoney, rewardDrop){
  let s = line() + "\n\n";
  s += bossColor(boss.name, boss) + " " + result + "\n\n";

  if(result === "처치 성공"){
    s += "획득\n\n";
    if(rewardMoney > 0){
      s += "최초 클리어 상금 : " + formatMoney(rewardMoney) + "\n";
    } else {
      s += "상금 : 이미 획득 완료\n";
    }
    s += rewardDrop + " x1\n\n";
  }

  s += line();
  return s;
}

function buildBattleResultText(boss, participants, totalDamage, result, rewardMoney, rewardDrop, battleLog){
  let s = "전투 결과\n\n";
  s += line() + "\n\n";

  if(battleLog && battleLog.length > 0){
    battleLog.forEach((entry,i)=>{
      s += entry + "\n";
      s += "\n" + line() + "\n\n";
    });
  }

  s += "참가 물고기\n\n";

  if(participants.length === 0){
    s += "없음\n";
  } else {
    participants.forEach(f => {
      s += lineFish(f) + " (" + getCombatStatusText(f) + ")\n";
    });
  }

  s += "\n" + line() + "\n\n";
  s += "총 피해\n\n";
  s += totalDamage.toLocaleString() + "\n\n";
  s += line() + "\n\n";
  s += "결과\n\n";
  s += boss.name + " " + result + "\n\n";

  if(result === "처치 성공"){
    s += line() + "\n\n";
    s += "획득\n\n";
    if(rewardMoney > 0){
      s += "최초 클리어 상금 : " + formatMoney(rewardMoney) + "\n";
    } else {
      s += "상금 : 이미 획득 완료\n";
    }
    s += rewardDrop + " x1\n\n";
  }

  s += line();
  return s;
}

function getUpgradeCost(level){
  const points = [
    [1, 1000],[100, 7500],[200, 30000],[300, 150000],[400, 750000],
    [500, 3500000],[600, 15000000],[700, 75000000],[800, 300000000],
    [900, 1500000000],[950, 4000000000],[1000, 7500000000],
    [1100, 15000000000],[1200, 30000000000],[1300, 75000000000],
    [1400, 150000000000],[1500, 300000000000]
  ];

  if(level <= 1) return points[0][1];
  if(level >= MAX_ROD) return points[points.length - 1][1];

  for(let i = 0; i < points.length - 1; i++){
    const [l1, c1] = points[i];
    const [l2, c2] = points[i + 1];

    if(level >= l1 && level <= l2){
      const t = (level - l1) / (l2 - l1);
      return Math.floor(c1 * Math.pow(c2 / c1, t));
    }
  }

  return 1000;
}

function getUpgradeSuccessRate(level){
  if(level >= MAX_ROD) return 0;
  if(level < 1000){
    const t = (level - 1) / (999 - 1);
    return 100 - (90 * t);
  }
  const t = (level - 1000) / (1500 - 1000);
  return Math.max(20, 100 - (80 * t));
}

function getBossMaterialRequirement(level){
  if(level < 1000) return null;
  if(level >= getCurrentPlayableMaxRod()) return "LOCKED";

  let item = "";
  let start = 1000;

  if(level < 1050){ item = "심연의 촉수"; start = 1000; }
  else if(level < 1100){ item = "히드라의 독니"; start = 1050; }
  else if(level < 1150){ item = "리바이어던의 코어"; start = 1100; }
  else if(level < 1200){ item = "고대의 비늘"; start = 1150; }
  else if(level < 1250){ item = "불멸의 깃털"; start = 1200; }
  else if(level < 1300){ item = "용왕의 심장"; start = 1250; }
  else if(level < 1350){ item = "혼돈의 파편"; start = 1300; }
  else if(level < 1400){ item = "세계뱀의 비늘"; start = 1350; }
  else if(level < 1450){ item = "글레이프니르의 파편"; start = 1400; }
  else if(level < 1500){ item = "무스펠의 불꽃"; start = 1450; }
  else return "LOCKED";

  const amount = Math.floor((level - start) / 25) + 1;
  return {item, amount};
}

function getRequiredBossMaterials(level){
  const req = getBossMaterialRequirement(level);
  if(!req || req === "LOCKED") return [];
  return [{name:req.item, count:req.amount}];
}

function hasRequiredBossMaterials(level){
  return getRequiredBossMaterials(level).every(m => (bossProgress.materials[m.name] || 0) >= m.count);
}

function formatRequiredBossMaterials(level){
  const req = getRequiredBossMaterials(level);
  if(req.length === 0) return "";
  return req.map(m => m.name + " x" + m.count).join("\n");
}

function consumeRequiredBossMaterials(level){
  getRequiredBossMaterials(level).forEach(m => {
    bossProgress.materials[m.name] = Math.max(0, (bossProgress.materials[m.name] || 0) - m.count);
  });
}

function getRawGradeChances(){
  if(rodLevel <= 1000){
    const t = (rodLevel - 1) / (1000 - 1);
    return [
      {name:"쓰레기", chance: 18 - 17.5 * t},
      {name:"일반", chance: 55 - 43 * t},
      {name:"희귀", chance: 25 - 1 * t},
      {name:"영웅", chance: 8 + 27 * t},
      {name:"전설", chance: 2.2 + 27.8 * t},
      {name:"신화", chance: 0.7 + 13.3 * t},
      {name:"초월", chance: 0.1 + 6.9 * t},
      {name:"영원", chance: rodLevel >= 400 ? 0.1 + ((rodLevel - 400) / (1000 - 400)) * 1.4 : 0},
      {name:"공허", chance:0}
    ];
  }

  const base = {"쓰레기":0.40,"일반":9.68,"희귀":19.35,"영웅":28.23,"전설":24.19,"신화":11.29,"초월":5.65,"영원":1.21,"공허":0};
  const target = {"쓰레기":0,"일반":4,"희귀":14,"영웅":21,"전설":25,"신화":22,"초월":10,"영원":3,"공허":1};
  const t = Math.min(1, (rodLevel - 1000) / 500);
  return Object.keys(target).map(name => ({name, chance: base[name] + (target[name] - base[name]) * t}));
}

function pickGrade(){
  let chances = getRawGradeChances();
  chances = chances.map(x => ({...x, chance: Math.max(0, x.chance)}));
  let total = chances.reduce((s,g)=>s+g.chance,0);
  let r = Math.random()*total;
  for(const c of chances){
    if(r < c.chance) return grades.find(g=>g.name===c.name);
    r -= c.chance;
  }
  return grades[1];
}

function pickName(grade){
  const list=fishByGrade[grade];
  return list[Math.floor(Math.random()*list.length)];
}

function makeSizeByName(name){
  const range = sizeData[name];
  if(range === null) return null;
  if(Array.isArray(range)){
    const base = Math.random() * (range[1] - range[0]) + range[0];
    return Math.round((base + rodLevel * 0.02) * 10) / 10;
  }
  return Math.round((Math.random()*100 + 10) * 10) / 10;
}

function getEscapeChance(){
  const t = Math.min(1, (rodLevel - 1) / (MAX_ROD - 1));
  return 35 - (34 * t); // Lv.1 = 35%, Lv.1000 = 1%
}

function getCurrentGradeChances(){
  let chances = getRawGradeChances();
  chances = chances.map(x => ({...x, chance: Math.max(0, x.chance)}));
  const total = chances.reduce((s,g)=>s+g.chance,0);
  return chances.map(x => ({name:x.name, chance: total === 0 ? 0 : x.chance / total * 100}));
}

function makePrice(g,size){
  if(g.name==="쓰레기") return Math.floor(Math.random()*30)+1;
  const s = size === null ? 7777 : size;
  return Math.floor(g.basePrice + s*gradePower[g.name]*1000 + Math.random()*g.basePrice*0.4);
}

function addCollection(f){
  if(!collection[f.name]) collection[f.name]={count:0,bestSize:null,bestGrade:f.grade};
  collection[f.name].count++;
  if(f.size !== null){
    if(collection[f.name].bestSize === null || f.size > collection[f.name].bestSize){
      collection[f.name].bestSize=f.size;
      collection[f.name].bestGrade=f.grade;
    }
  }
}

function fish(){
  if(isFishing) return print("이미 낚시 중입니다.");
  isFishing=true;
  const castUser = currentUser;
  const castSessionId = ++fishingSessionId;
  const t=(rodLevel-1)/(MAX_ROD-1);
  const timeMultiplier = getFishingTimeMultiplier();
  const minTime=Math.floor((15000-(7000*t)) * timeMultiplier); // Lv1 15초 -> Lv1000 8초, 연구소 적용
  const maxTime=Math.floor((30000-(15000*t)) * timeMultiplier); // Lv1 30초 -> Lv1000 15초, 연구소 적용
  const wait=Math.floor(Math.random()*(maxTime-minTime))+minTime;
  print("낚싯대를 던졌습니다.");
  fishingTimer = setTimeout(()=>{
    fishingTimer = null;
    if(castSessionId !== fishingSessionId || currentUser !== castUser){
      isFishing = false;
      return;
    }
    const g=pickGrade();
    const name=pickName(g.name);
    const size=makeSizeByName(name);
    const price=makePrice(g,size);
    const caught={grade:g.name,name,size,price,locked:false,time:new Date().toLocaleString()};
    caught.combat = makeCombatStats(caught);

    const escapeGrades = ["일반","희귀","영웅","전설","신화"];
    if(escapeGrades.includes(g.name)){
      const escapeChance = getEscapeChance();
      if(Math.random() * 100 < escapeChance){
        totalFishingCount++;
        const newAchievements = updateAchievements();
        checkSpecialTitles();
        saveGame();
        print(color("[" + g.name + "] " + name, g.name) + subjectParticle(name) + " 도주했습니다.");
        printAchievementRewards(newAchievements);
        isFishing=false;
        fishingSessionId++;
        return;
      }
    }

    bucket.push(caught);
    addCollection(caught);

    totalFishingCount++;
    gradeCounts[g.name] = (gradeCounts[g.name] || 0) + 1;

    const newAchievements = updateAchievements();

    checkSpecialTitles();
    saveGame();
    print(color(lineFish(caught), caught.grade)+objParticle(caught.name)+" 낚았습니다.");
    announceEternalCatch(caught);
    printAchievementRewards(newAchievements);
    isFishing=false;
    fishingSessionId++;
  }, wait);
}

  if(bucketSortOrder.startsWith("공격력")) bucketSortOrder = "공격력";
  else if(bucketSortOrder.startsWith("체력")) bucketSortOrder = "체력";
  else bucketSortOrder = "등급";
  localStorage.setItem("textFishingBucketSortOrder", bucketSortOrder);
}

function sortBucketEntries(source, order=bucketSortOrder){
  return (source || []).map((fish, originalIndex) => ({fish, originalIndex})).sort((a,b)=>{
    const gradeCompare = gradePower[b.fish.grade] - gradePower[a.fish.grade];
    const nameCompare = a.fish.name.localeCompare(b.fish.name, "ko");
    const attackA = Number(a.fish.combat && a.fish.combat.attack || 0);
    const attackB = Number(b.fish.combat && b.fish.combat.attack || 0);
    const hpA = Number(a.fish.combat && (a.fish.combat.maxHp ?? a.fish.combat.hp) || 0);
    const hpB = Number(b.fish.combat && (b.fish.combat.maxHp ?? b.fish.combat.hp) || 0);

    if(order === "공격력"){
      return (attackB - attackA) || (hpB - hpA) || gradeCompare || nameCompare;
    }

    if(order === "체력"){
      return (hpB - hpA) || (attackB - attackA) || gradeCompare || nameCompare;
    }

    return gradeCompare || nameCompare;
  });
}

function sortedBucketList(){
  return sortBucketEntries(bucket, bucketSortOrder);

function upgradeOne(){
  if(rodLevel>=getCurrentPlayableMaxRod()) return print(getLockedUpgradeMessage());

  const materialReq = getBossMaterialRequirement(rodLevel);
  if(materialReq === "LOCKED") return print(getLockedUpgradeMessage());

  const cost=getUpgradeCost(rodLevel);
  const rate=getUpgradeSuccessRate(rodLevel);

  if(money<cost) return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(cost));

  if(!hasRequiredBossMaterials(rodLevel)){
    const need = getRequiredBossMaterials(rodLevel)[0];
    const owned = need ? (bossProgress.materials[need.name] || 0) : 0;
    return print("강화 재료가 부족합니다.\n\n필요 : " + need.name + " x" + need.count + "\n보유 : " + owned.toLocaleString() + "개");
  }

  const before=rodLevel;
  const usedMaterials = formatRequiredBossMaterials(before);
  money=normalizeMoney(money - cost);
  consumeRequiredBossMaterials(before);

  if(tryUpgradeSuccess(before)){
    rodLevel++;
    saveGame();
    print("강화 성공\n\nLv."+before+" → Lv."+rodLevel+"\n성공 확률 : "+rate.toFixed(1)+"%\n사용 금액 : "+formatMoney(cost)+(usedMaterials ? "\n사용 재료\n"+usedMaterials : ""));
  } else {
    saveGame();
    print("강화 실패\n\nLv."+before+" → Lv."+rodLevel+"\n성공 확률 : "+rate.toFixed(1)+"%\n사용 금액 : "+formatMoney(cost)+(usedMaterials ? "\n사용 재료\n"+usedMaterials : ""));
  }
}

function upgradeMax(){
  if(rodLevel>=getCurrentPlayableMaxRod()) return print(getLockedUpgradeMessage());

  const before=rodLevel;
  let spent=0;
  let success=0;
  let fail=0;
  let attempts=0;
  let usedMaterials = {};

  while(rodLevel<getCurrentPlayableMaxRod()){
    const cost=getUpgradeCost(rodLevel);
    if(money<cost) break;
    if(!hasRequiredBossMaterials(rodLevel)) break;

    const levelBefore=rodLevel;
    const req = getRequiredBossMaterials(levelBefore);
    req.forEach(m => {
      usedMaterials[m.name] = (usedMaterials[m.name] || 0) + m.count;
    });

    money=normalizeMoney(money - cost);
    consumeRequiredBossMaterials(levelBefore);
    spent+=cost;
    attempts++;

    if(tryUpgradeSuccess(levelBefore)){
      rodLevel++;
      success++;
    } else {
      fail++;
    }

    if(before < 1000 && rodLevel >= 1000) break;

    if(attempts >= 10000) break;
  }

  if(spent===0){
    if(rodLevel>=1000 && !hasRequiredBossMaterials(rodLevel)){
      const need = getRequiredBossMaterials(rodLevel)[0];
      const owned = need ? (bossProgress.materials[need.name] || 0) : 0;
      return print("강화 재료가 부족합니다.\n\n필요 : " + need.name + " x" + need.count + "\n보유 : " + owned.toLocaleString() + "개");
    }

    return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(getUpgradeCost(rodLevel)));
  }

  saveGame();

  let msg = "일괄강화 결과\n\n";
  msg += "Lv."+before+" → Lv."+rodLevel+"\n\n";
  msg += "시도 : "+attempts.toLocaleString()+"회\n";
  msg += "성공 : "+success.toLocaleString()+"회\n";
  msg += "실패 : "+fail.toLocaleString()+"회\n\n";
  msg += "사용 금액 : "+formatMoney(spent)+"\n";

  const materialEntries = Object.entries(usedMaterials);
  if(materialEntries.length > 0){
    msg += "사용 재료\n";
    materialEntries.forEach(([name,count]) => {
      msg += name + " x" + count.toLocaleString() + "\n";
    });
  }

  msg += "남은 돈 : "+formatMoney(money);

  if(rodLevel>=getCurrentPlayableMaxRod()){
    msg += "\n\n" + getLockedUpgradeMessage();
  } else if(before < 1000 && rodLevel === 1000){
    msg += "\n\n1000레벨에 도달하여 일괄강화를 멈췄습니다.\n계속 강화하려면 일괄강화를 다시 입력해주세요.";
  } else if(rodLevel<MAX_ROD && attempts>=10000){
    msg += "\n\n시도 횟수가 너무 많아 자동 중단되었습니다.";
  } else if(rodLevel>=1000 && !hasRequiredBossMaterials(rodLevel)){
    msg += "\n\n강화 재료가 부족하여 중단되었습니다.\n필요 재료\n" + formatRequiredBossMaterials(rodLevel);
  }

  print(msg.trim());
}

  const raw = JSON.parse(JSON.stringify(ensureCombatStats(f)));
  const lv = levels || trainingLevels || {attack:0,hp:0,critDamage:0};

  const baseAttack = Number(raw._baseAttack ?? raw.attack ?? 0);
  const baseMaxHp = Number(raw._baseMaxHp ?? raw.maxHp ?? raw.hp ?? 1);
  const baseCritDamage = Number(raw._baseCritDamage ?? raw.critDamage ?? 0);

  raw.attack = Math.max(0, Math.floor(baseAttack * (1 + Number(lv.attack || 0) * 0.10)));
  raw.maxHp = Math.max(1, Math.floor(baseMaxHp * (1 + Number(lv.hp || 0) * 0.10)));
  raw.hp = raw.maxHp;
  raw.critDamage = Math.floor(baseCritDamage + Number(lv.critDamage || 0) * 20);
  raw.status = "정상";

  c.combat = raw;
  return c;
}

function buildPvpTeamFromIndexes(indexes, sourceBucket, levels){
  const team = [];

  (indexes || []).forEach(rawIndex => {
    const idx = Number(rawIndex);
    const f = sourceBucket[idx];

    if(f && f.grade !== "쓰레기"){
      team.push(cloneForPvp(f, levels));
    }
  });

  return team.slice(0,3);
}

function pvpDisplayName(name,title){
  return title ? "[" + title + "] " + name : name;
}

function pvpTeamLine(team){
  return team.map((f,i)=>(i+1)+". "+color(lineFish(f), f.grade)).join("\n");
}

function pvpAlive(team){
  return team.find(f => f && f.combat && f.combat.hp > 0);
}

function pvpFishLabel(f){
  return color(lineFish(f), f.grade);
}

function pvpHpBar(cur,max){
  cur = Math.max(0, Math.floor(cur));
  max = Math.max(1, Math.floor(max));
  const ratio = Math.max(0, Math.min(1, cur / max));
  const filled = Math.round(ratio * 10);
  return "HP " + cur.toLocaleString() + " / " + max.toLocaleString() + "\n" +
    "█".repeat(filled) + "░".repeat(10-filled) + " " + Math.floor(ratio*100) + "%";
}

function simulatePvpBattle({leftName,leftTitle,leftTeam,rightName,rightTitle,rightTeam}){
  const left = (leftTeam || []).map(f => JSON.parse(JSON.stringify(f))).slice(0,3);
  const right = (rightTeam || []).map(f => JSON.parse(JSON.stringify(f))).slice(0,3);

  let logText = "";
  logText += "1대1 대전 시작\n\n";
  logText += pvpDisplayName(leftName,leftTitle) + "\n" + pvpTeamLine(left) + "\n\n";
  logText += "VS\n\n";
  logText += pvpDisplayName(rightName,rightTitle) + "\n" + pvpTeamLine(right) + "\n\n";
  logText += "━━━━━━━━━━━━━━\n\n";

  let turn = 1;
  let leftDamage = 0;
  let rightDamage = 0;
  const firstSide = Math.random() < 0.5 ? "left" : "right";

  logText += "선공 : " + (firstSide === "left" ? pvpDisplayName(leftName,leftTitle) : pvpDisplayName(rightName,rightTitle)) + "\n\n";
  logText += "━━━━━━━━━━━━━━\n\n";

  function attackOnce(attackerFish, defenderFish, attackerSide){
    if(!attackerFish || !defenderFish) return "";
    if(!attackerFish.combat || !defenderFish.combat) return "";
    if(attackerFish.combat.hp <= 0 || defenderFish.combat.hp <= 0) return "";

    const ac = attackerFish.combat;
    const dc = defenderFish.combat;
    const attackerName = attackerSide === "left" ? pvpDisplayName(leftName,leftTitle) : pvpDisplayName(rightName,rightTitle);
    let s = '<span style="font-weight:700">' + attackerName + '의 턴</span>\n\n';

    if(Math.random() * 100 < Number(dc.dodge || 0)){
      s += pvpFishLabel(defenderFish) + " 회피!\n\n";
      return s;
    }

    let dmg = Math.max(1, Number(ac.attack || 1));
    const crit = Math.random() * 100 < Number(ac.critRate || 0);
    if(crit) dmg = Math.floor(dmg * Number(ac.critDamage || 150) / 100);

    dc.hp = Math.max(0, Math.floor(dc.hp - dmg));

    if(attackerSide === "left") leftDamage += dmg;
    else rightDamage += dmg;

    s += pvpFishLabel(attackerFish) + " 공격!\n";
    if(crit) s += "치명타!\n";
    s += "피해량 : " + dmg.toLocaleString() + "\n\n";
    s += pvpFishLabel(defenderFish) + "\n" + pvpHpBar(dc.hp, dc.maxHp) + "\n\n";

    if(dc.hp <= 0){
      s += pvpFishLabel(defenderFish) + " 쓰러짐\n\n";
    }

    return s;
  }

  while(pvpAlive(left) && pvpAlive(right) && turn <= 300){
    logText += "턴 " + turn + "\n\n";

    if(firstSide === "left"){
      let lf = pvpAlive(left);
      let rf = pvpAlive(right);

      logText += attackOnce(lf, rf, "left");

      // 방금 쓰러진 물고기는 공격하지 못함
      if(!pvpAlive(right)) break;

      lf = pvpAlive(left);
      rf = pvpAlive(right);
      logText += attackOnce(rf, lf, "right");
    }else{
      let lf = pvpAlive(left);
      let rf = pvpAlive(right);

      logText += attackOnce(rf, lf, "right");

      // 방금 쓰러진 물고기는 공격하지 못함
      if(!pvpAlive(left)) break;

      lf = pvpAlive(left);
      rf = pvpAlive(right);
      logText += attackOnce(lf, rf, "left");
    }

    logText += "━━━━━━━━━━━━━━\n\n";
    turn++;
  }

  const leftWin = !!pvpAlive(left) && !pvpAlive(right);
  const rightWin = !!pvpAlive(right) && !pvpAlive(left);
  let winner = "무승부";
  if(leftWin) winner = pvpDisplayName(leftName,leftTitle);
  if(rightWin) winner = pvpDisplayName(rightName,rightTitle);

  const summary =
    "대전 결과\n\n" +
    "승자 : " + winner + "\n" +
    "총 턴 : " + Math.min(turn,300) + "\n" +
    pvpDisplayName(leftName,leftTitle) + " 피해량 : " + leftDamage.toLocaleString() + "\n" +
    pvpDisplayName(rightName,rightTitle) + " 피해량 : " + rightDamage.toLocaleString();

  logText += "전투 종료\n\n" + summary;
  return {summary, fullLog:logText};
}

function printPvpResultPreview(summary, fullLog){
  printPreview("대전 결과", summary, "대전 전체보기", fullLog);
}

async function requestPvp(nickname){

    const userSnap = await db.collection("users").doc(nickname).get();

    const online = await isUserOnline(nickname);

      requester:currentUser,
      accepted:false,
      ready:false,
      prepIndexes:[],
      updatedAtMillis:Date.now()
    });

      type:"pvpRequest",
      roomId,
      from:currentUser,
      fromTitle:getCurrentTitle(),
      to:nickname,
      createdAtMillis:Date.now(),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()

async function preparePvpFish(n){
  const active = await getMyActivePvp();
  if(!active || active.status !== "accepted"){
    return print("대전이 성립된 후에 준비할 수 있습니다.\\n\\n먼저 대전 닉네임 또는 대전수락 을 진행하세요.");
  }

  const displayNo = Number(n);
  if(!Number.isInteger(displayNo) || displayNo < 1){
    return print("사용법 : 대전준비 양동이번호");
  }

  const idx = getBucketIndexByDisplayNumber(displayNo);
  const f = bucket[idx];

  if(idx < 0 || !f) return print("존재하지 않는 양동이 번호입니다.");
  if(f.grade === "쓰레기") return print("쓰레기는 대전에 참가할 수 없습니다.");

  if(pvpPrepIndexes.includes(idx)){
    return print("이미 대전 준비된 물고기입니다.\\n\\n양동이 " + displayNo + "번\\n" + color(lineFish(f), f.grade));
  }

  if(pvpPrepIndexes.length >= 3){
    return print("대전에는 최대 3마리까지만 출전할 수 있습니다.");
  }

  pvpPrepIndexes.push(idx);
  saveGame();

  await getMyActivePvpRef().set({
    prepIndexes:pvpPrepIndexes,
    ready:false,
    updatedAtMillis:Date.now()
  }, {merge:true});

  print("대전 준비 완료\n\n" + color(lineFish(f), f.grade));
}

async function finishPvpReady(){
  const active = await getMyActivePvp();
  if(!active || active.status !== "accepted"){
    return print("대전이 성립된 후에 준비완료할 수 있습니다.");
  }

  if(pvpPrepIndexes.length === 0){
    return print("대전 준비 물고기가 없습니다.\n\n대전준비 양동이번호 를 먼저 입력하세요.");
  }

  const team = buildPvpTeamFromIndexes(pvpPrepIndexes, bucket, trainingLevels);
  if(team.length === 0) return print("대전에 참가할 수 있는 물고기가 없습니다.");

  try{
    const roomRef = db.collection("pvpRooms").doc(active.roomId);
    const roomSnap = await roomRef.get();
    if(!roomSnap.exists) return print("대전방을 찾을 수 없습니다.");

    const room = roomSnap.data() || {};
    const staleResolution = room.status === "resolving" && Number(room.resolvingAtMillis || 0) < Date.now() - 30000;
    if(room.status !== "accepted" && !staleResolution) return print("현재 준비할 수 없는 대전 상태입니다.");

    const myKey = currentUser + "_ready";
    const myTeamKey = currentUser + "_team";
    const opp = currentUser === room.from ? room.to : room.from;
    const oppKey = opp + "_ready";
    const oppTeamKey = opp + "_team";

    await roomRef.set({
      [myKey]: true,
      [myTeamKey]: team,
      updatedAtMillis:Date.now()
    }, {merge:true});

    await getMyActivePvpRef().set({
      ready:true,
      prepIndexes:pvpPrepIndexes,
      updatedAtMillis:Date.now()
    }, {merge:true});

    const afterSnap = await roomRef.get();
    const after = afterSnap.data() || {};
    const bothReady = !!after[myKey] && !!after[oppKey];

    await db.collection("serverAlerts").add({
      type:"pvpReady",
      from:currentUser,
      fromTitle:getCurrentTitle(),
      to:opp,
      createdAtMillis:Date.now(),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    if(!bothReady){
      return print("대전 준비완료\n\n상대 대기중...");
    }

    let claimedRoom = null;
    await db.runTransaction(async tx => {
      claimedRoom = null;
      const latestSnap = await tx.get(roomRef);
      if(!latestSnap.exists) return;

      const latest = latestSnap.data() || {};
      const leftReady = !!latest[(latest.from || room.from) + "_ready"];
      const rightReady = !!latest[(latest.to || room.to) + "_ready"];
      const canClaim = latest.status === "accepted" ||
        (latest.status === "resolving" && Number(latest.resolvingAtMillis || 0) < Date.now() - 30000);
      if(!canClaim || !leftReady || !rightReady) return;

      claimedRoom = latest;
      tx.set(roomRef, {
        status:"resolving",
        resolvedBy:currentUser,
        resolvingAtMillis:Date.now(),
        updatedAtMillis:Date.now()
      }, {merge:true});
    });

    if(!claimedRoom){
      return print("상대 브라우저에서 대전 결과를 계산 중입니다.");
    }

    const leftName = claimedRoom.from;
    const rightName = claimedRoom.to;
    const result = simulatePvpBattle({
      leftName,
      leftTitle: claimedRoom.fromTitle || "",
      leftTeam: claimedRoom[leftName + "_team"] || [],
      rightName,
      rightTitle: claimedRoom.toTitle || "",
      rightTeam: claimedRoom[rightName + "_team"] || []
    });

    await roomRef.set({
      status:"finished",
      finishedAtMillis:Date.now(),
      resultSummary:result.summary,
      resultLog:result.fullLog,
      updatedAtMillis:Date.now()
    }, {merge:true});

    await clearBothActivePvp(room.from, room.to);

    pvpPrepIndexes = [];
    saveGame();

    await db.collection("serverAlerts").add({
      type:"pvpResult",
      to:opp,
      summary:result.summary,
      fullLog:result.fullLog,
      createdAtMillis:Date.now(),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    printPvpResultPreview(result.summary, result.fullLog);
  }catch(e){
    console.error(e);
    print("대전 준비완료 중 오류가 발생했습니다.");
  }
}

async function sendMoney(targetNickname, amount){
  if(isOnlineActionRunning) return print("처리 중입니다. 잠시만 기다려주세요.");
  if(!currentUser) return print("로그인 후 사용 가능합니다.");

  targetNickname = cleanNickname(targetNickname);
  amount = Number(amount);

  if(!targetNickname || !Number.isSafeInteger(amount) || amount <= 0) return print("송금 금액은 1 이상의 안전한 정수로 입력해주세요.");
  if(targetNickname === currentUser) return print("자기 자신에게는 송금할 수 없습니다.");

  isOnlineActionRunning = true;

  try{
    await refreshMyCloudData();
    const sessionHash = await getCurrentSessionHash();
    if(!sessionHash) throw new Error("SESSION_INVALID");

    if(money < amount){
      isOnlineActionRunning = false;
      return print("돈이 부족합니다.");
    }

    const myRef = db.collection("users").doc(currentUser);
    const targetRef = db.collection("users").doc(targetNickname);

    await db.runTransaction(async (tx)=>{
      const mySnap = await tx.get(myRef);
      const targetSnap = await tx.get(targetRef);

      if(!mySnap.exists) throw new Error("MY_ACCOUNT_NOT_FOUND");
      if(!targetSnap.exists) throw new Error("TARGET_NOT_FOUND");

      const myData = mySnap.data();
      const targetData = targetSnap.data();
      if(myData.sessionTokenHash !== sessionHash) throw new Error("SESSION_INVALID");

      const myState = myData.gameState || {};
      const targetState = targetData.gameState || {};
      const currentMoney = myData.money || 0;
      const senderMoneyAfter = normalizeMoney(currentMoney - amount);
      const targetMoneyAfter = normalizeMoney((targetData.money || 0) + amount);

      if(currentMoney < amount) throw new Error("NOT_ENOUGH_MONEY");

      const targetNotifications = targetState.notifications || [];
      targetNotifications.push("📢 알림\n\n" + formatCurrentUserName() + " 님이 " + amount.toLocaleString() + "원을 송금했습니다.");

      myState.money = senderMoneyAfter;

      tx.set(myRef, {
        money: senderMoneyAfter,
        cloudRevision: Number(myData.cloudRevision || 0) + 1,
        gameState: myState,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});

      tx.set(targetRef, {
        money: targetMoneyAfter,
        cloudRevision: Number(targetData.cloudRevision || 0) + 1,
        gameState: {...targetState, money:targetMoneyAfter, notifications: targetNotifications},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "moneyTransfer",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      amount: amount,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: Date.now()
    });

    await refreshMyCloudData();
    print(targetNickname + " 님에게 " + amount.toLocaleString() + "원을 송금하였습니다.");
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else if(e.message === "NOT_ENOUGH_MONEY") print("돈이 부족합니다.");
    else if(e.message === "MY_ACCOUNT_NOT_FOUND") print("현재 계정을 찾을 수 없습니다. 다시 로그인해주세요.");
    else print("송금 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

async function sendFish(targetNickname, displayNumber){
  if(isOnlineActionRunning) return print("처리 중입니다. 잠시만 기다려주세요.");
  if(!currentUser) return print("로그인 후 사용 가능합니다.");

  targetNickname = cleanNickname(targetNickname);

  if(!targetNickname) return print("사용법 : 전송 닉네임 번호");
  if(targetNickname === currentUser) return print("자기 자신에게는 전송할 수 없습니다.");

  isOnlineActionRunning = true;

  try{
    await refreshMyCloudData();
    const sessionHash = await getCurrentSessionHash();
    if(!sessionHash) throw new Error("SESSION_INVALID");

    const idx = getBucketIndexByDisplayNumber(Number(displayNumber));
    if(idx < 0 || !bucket[idx]){
      isOnlineActionRunning = false;
      return print("존재하지 않는 번호입니다.");
    }

    if(bucket[idx].locked){
      isOnlineActionRunning = false;
      return print("잠금된 물고기는 전송할 수 없습니다.");
    }

    let transferredFish = null;

    const myRef = db.collection("users").doc(currentUser);
    const targetRef = db.collection("users").doc(targetNickname);

    await db.runTransaction(async (tx)=>{
      const mySnap = await tx.get(myRef);
      const targetSnap = await tx.get(targetRef);

      if(!mySnap.exists) throw new Error("MY_ACCOUNT_NOT_FOUND");
      if(!targetSnap.exists) throw new Error("TARGET_NOT_FOUND");

      const myData = mySnap.data();
      const targetData = targetSnap.data();
      if(myData.sessionTokenHash !== sessionHash) throw new Error("SESSION_INVALID");

      const myState = myData.gameState || {};
      const targetState = targetData.gameState || {};
      const myBucket = myState.bucket || [];
      const targetBucket = targetState.bucket || [];
      const targetNotifications = targetState.notifications || [];

      const currentList = sortBucketEntries(myBucket, bucketSortOrder);

      const displayItem = currentList[Number(displayNumber)-1];
      if(!displayItem || !myBucket[displayItem.originalIndex]) throw new Error("FISH_NOT_FOUND");
      if(myBucket[displayItem.originalIndex].locked) throw new Error("FISH_LOCKED");

      const movedFish = {...myBucket.splice(displayItem.originalIndex,1)[0], locked:false};
      transferredFish = movedFish;

      targetBucket.push(movedFish);
      targetNotifications.push("📢 알림\n\n" + formatCurrentUserName() + " 님이 " + lineFish(movedFish) + objParticle(movedFish.name) + " 전송했습니다.");

      tx.set(myRef, {
        cloudRevision: Number(myData.cloudRevision || 0) + 1,
        gameState: {...myState, bucket: myBucket, pvpPrepIndexes:[]},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});

      tx.set(targetRef, {
        cloudRevision: Number(targetData.cloudRevision || 0) + 1,
        gameState: {...targetState, bucket: targetBucket, notifications: targetNotifications},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "fishTransfer",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      fishName: transferredFish.name,
      fishGrade: transferredFish.grade,
      fishSize: transferredFish.size,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: Date.now()
    });

    await refreshMyCloudData();
    print(targetNickname + " 님에게 " + lineFish(transferredFish) + objParticle(transferredFish.name) + " 전송하였습니다.");
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else if(e.message === "FISH_NOT_FOUND") print("존재하지 않는 번호입니다.");
    else if(e.message === "FISH_LOCKED") print("잠금된 물고기는 전송할 수 없습니다.");
    else if(e.message === "MY_ACCOUNT_NOT_FOUND") print("현재 계정을 찾을 수 없습니다. 다시 로그인해주세요.");
    else print("전송 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

async function showNewMessages(){
  if(!messages || messages.length === 0) return;

  const list = [...messages].sort((a,b)=>(a.createdAtMillis || 0) - (b.createdAtMillis || 0));

  let full = "메세지\n\n";
  full += "────┬────────────────────\n";

  list.forEach((m,i)=>{
    const sender = formatUserName(m.from || "알 수 없음", m.fromTitle || "");
    full += rankNumber(i+1) + "│" + sender + "\n";
    full += "    " + formatDateTime(m.createdAtMillis || Date.now()) + "\n";
    full += "    " + safeMessageText(m.text) + "\n";
    if(i !== list.length - 1) full += "────┼────────────────────\n";
  });

  full += "────┴────────────────────";

  printPreview(
    "메세지",
    "새로운 메세지가 " + list.length + "개 도착했습니다.",
    "메세지 전체보기",
    full
  );

  messages = [];
  saveGame();
  if(currentUser) await saveCloudData();
}

async function sendMessage(targetNickname){
  if(isOnlineActionRunning) return print("처리 중입니다. 잠시만 기다려주세요.");
  if(!currentUser) return print("로그인 후 사용 가능합니다.");

  targetNickname = cleanNickname(targetNickname);
  if(!targetNickname) return print("사용법 : 메세지 닉네임");
  if(targetNickname === currentUser) return print("자기 자신에게는 메세지를 보낼 수 없습니다.");

  const text = safeMessageText(prompt("보낼 메세지를 입력하세요."));
  if(!text) return print("메세지 전송이 취소되었습니다.");
  if(text.length > 300) return print("메세지는 300자 이하로 입력해주세요.");

  isOnlineActionRunning = true;

  try{
    const targetRef = db.collection("users").doc(targetNickname);
    const targetSnap = await targetRef.get();

    if(!targetSnap.exists){
      isOnlineActionRunning = false;
      return print("존재하지 않는 닉네임입니다.");
    }

    const messageId = "msg_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const payload = {
      id: messageId,
      from: currentUser,
      fromTitle: getCurrentTitle(),
      text: text,
      createdAtMillis: Date.now()
    };

    await db.runTransaction(async (tx)=>{
      const snap = await tx.get(targetRef);
      if(!snap.exists) throw new Error("TARGET_NOT_FOUND");

      const data = snap.data();
      const state = data.gameState || {};
      const targetMessages = Array.isArray(state.messages) ? state.messages : [];

      targetMessages.push(payload);

      tx.set(targetRef, {
        cloudRevision: Number(data.cloudRevision || 0) + 1,
        gameState: {
          ...state,
          messages: targetMessages
        },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "userMessage",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      text: text,
      messageId: messageId,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: payload.createdAtMillis
    });

    print(targetNickname + " 님에게 메세지를 보냈습니다.\n\n" + text);
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else print("메세지 전송 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

function requireLoginForCommand(cmd){
  const allowed = ["명령어", "회원가입", "로그인"];

  if(allowed.includes(cmd)) return true;

  // 다른 사람 정보 조회/랭킹도 로그인 없이 막음
  return false;
}


function runCommand(){

  let cmd=input.value.trim();
  input.value="";
  if(!cmd) return;

  // 예전처럼 !를 붙여도 작동하게 호환
  if(cmd.startsWith("!")) cmd = cmd.slice(1).trim();

  print("> "+escapeHtml(cmd));

  if(cmd.startsWith("대전 ") && cmd.split(/\s+/).length === 2) return requestPvp(cmd.split(/\s+/)[1]);
  if(cmd.startsWith("대전준비 ")) return preparePvpFish(cmd.split(/\s+/)[1]);
  if(cmd.startsWith("대전해제 ")) return unpreparePvpFish(cmd.split(/\s+/)[1]);
  if(cmd === "대전목록") return showPvpPrepList();
  if(cmd === "대전준비완료") return finishPvpReady();
  if(cmd === "대전수락") return acceptLatestPvpRequest();
  if(cmd === "대전거절") return rejectLatestPvpRequest();
  if(cmd === "대전취소") return cancelPvpRequest();


  if(!currentUser && !requireLoginForCommand(cmd)){
    return print("로그인 후 이용 가능합니다.\n\n회원가입 또는 로그인 을 입력하세요.");
  }

  if(!isAllowedInBossMenu(cmd)){
    return blockedBossCommand();
  }

  if(cmd==="명령어") showCommands();
  else if(cmd==="낚시") fish();
  else if(cmd==="양동이") showBucket();
  else if(cmd.startsWith("양동이 ")) showOtherBucket(cmd.split(" ")[1]);
  else if(cmd==="도감") showCollection();
  else if(cmd==="물고기도감") showFishCollection();

  else if(cmd==="일괄판매" || cmd==="물고기 일괄판매") sellAll();
  else if(cmd.startsWith("판매 ")) sellOne(Number(cmd.split(" ")[1]));
  else if(cmd.startsWith("물고기 판매 ")) sellOne(Number(cmd.split(" ")[2]));
  else if(cmd.startsWith("잠금해제 ")) lockOne(Number(cmd.split(" ")[1]), false);
  else if(cmd.startsWith("잠금 ")) lockOne(Number(cmd.split(" ")[1]), true);
  else print("없는 명령어입니다. 명령어 를 입력해보세요.");
}

input.addEventListener("keydown", e=>{ if(e.key==="Enter") runCommand(); });
window.addEventListener("beforeunload", () => {
  cancelActiveFishing();
  stopOnlinePresence();
});

loadGame();

if(!currentUser){
  clearUserSession();
  resetGameData();
  refreshMarketIfNeeded();
  saveGame();
  updateWallet();
  print("로그인이 필요합니다.\n\n처음이라면 회원가입 을 입력하세요.\n이미 계정이 있다면 로그인 을 입력하세요.");
  checkGameVersion();
} else {
  updateWallet();
  print(currentUser + " 님으로 접속 중입니다.\n클라우드 데이터를 불러오는 중입니다.");
  checkGameVersion();

  (async function(){
    let startupAchievements = [];

    try{
      const snap = await db.collection("users").doc(currentUser).get();

      if(!snap.exists){
        currentUser = null;
        localStorage.removeItem("textFishingCurrentUser");
        clearUserSession();
        resetGameData();
        updateWallet();
        print("저장된 계정을 찾을 수 없습니다.\n다시 로그인해주세요.");
        return;
      }

      const data = snap.data();
      if(!(await hasValidSession(data))){
        currentUser = null;
        localStorage.removeItem("textFishingCurrentUser");
        clearUserSession();
        resetGameData();
        updateWallet();
        print("로그인 세션이 없거나 만료되었습니다. 다시 로그인해주세요.");
        return;
      }
      applyGameState(data.gameState);
      cloudRevision = Number(data.cloudRevision || 0);
      migrateCombatStatsToCurrentVersion();
      updateWallet();

      print(currentUser + " 님 데이터 불러오기 완료.");
    }catch(e){
      console.error(e);
      print("클라우드 데이터를 불러오지 못했습니다.\n네트워크 상태를 확인한 뒤 다시 로그인해주세요.");
      return;
    }

    try{
      refreshMarketIfNeeded();
    }catch(e){
      console.error(e);
    }

    try{
      startupAchievements = updateAchievements();
      checkSpecialTitles();
      saveGame();
      updateWallet();
      printAchievementRewards(startupAchievements);
    }catch(e){
      console.error(e);
    }

    try{
      startServerAlertListener();
      startOnlinePresence();
    }catch(e){
      console.error(e);
    }

    try{
      await showUpdateNoticeIfNeeded();
    }catch(e){
      console.error(e);
    }

    try{
      await showNewNotifications();
    }catch(e){
      console.error(e);
    }

    try{
      await showNewMessages();
    }catch(e){
      console.error(e);
    }
  })();
}
</script>
