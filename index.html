<title>텍스트 낚시 게임</title>
<style>
body {
  margin:0;
  background:#0d1117;
  color:#e6edf3;
  font-family:Consolas,'Courier New',monospace;
}
.wrap { max-width:980px; margin:0 auto; padding:20px; }
.box {
  background:#161b22;
  border:1px solid #30363d;
  border-radius:8px;
  padding:12px;
  margin:10px 0;
}
#log {
  height:540px;
  overflow-y:auto;
  white-space:pre-wrap;
  line-height:1.45;
}
input {
  width:360px;
  max-width:calc(100% - 90px);
  padding:10px;
  background:#0d1117;
  color:#e6edf3;
  border:1px solid #30363d;
  border-radius:6px;
  font-family:inherit;
}
button {
  padding:10px 14px;
  background:#21262d;
  color:#e6edf3;
  border:1px solid #30363d;
  border-radius:6px;
  cursor:pointer;
}
button:hover { background:#30363d; }
.cmd span {
  display:inline-block;
  background:#21262d;
  padding:4px 8px;
  border-radius:5px;
  margin:3px;
}

.modalOverlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.72);
  z-index:1000;
}
.modal {
  width:min(900px, calc(100% - 32px));
  height:min(760px, calc(100% - 32px));
  margin:16px auto;
  background:#161b22;
  border:1px solid #30363d;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}
.modalHead {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #30363d;
}
.modalBody {
  padding:12px;
  overflow:auto;
  white-space:pre-wrap;
  line-height:1.45;
}
.openBtn {
  margin-top:8px;
}

</style>
</head>

<div class="box" id="wallet"></div>

<input id="command" placeholder="낚시">
<button onclick="runCommand()">실행</button>

function cleanNickname(name){
  return String(name || "").trim().replace(/\s+/g, "_").slice(0, 16);
}

async function hashPassword(password){
  const msg = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", msg);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
}

}

function normalizeUpdateNoticeIds(value, oldValue){
  if(Array.isArray(value)) return value;
  if(typeof value === "string" && value) return [value];
  if(Array.isArray(oldValue)) return oldValue;
  if(typeof oldValue === "string" && oldValue) return [oldValue];
  return [];
}


function normalizeBossProgress(value){
  const base = {defeated:{}, hp:{}, materials:{}, selectedBossId:"", cooldownUntil:0, cooldowns:{}};
  if(!value || typeof value !== "object") return base;
  return {
    defeated:value.defeated || {},
    hp:value.hp || {},
    materials:value.materials || {},
    selectedBossId:value.selectedBossId || "",
    cooldownUntil:Number(value.cooldownUntil || 0),
    cooldowns:value.cooldowns || {}
  };
}

function normalizeResearchLevels(value){
  const base = {fishing:0, appraisal:0};
  if(!value || typeof value !== "object") return base;
  return {
    fishing: Number(value.fishing || 0),
    appraisal: Number(value.appraisal || 0)
  };
}

function applyGameState(s){
  if(!s) return;
  money=s.money??money;
  totalEarned=s.totalEarned??totalEarned;
  rodLevel=s.rodLevel??rodLevel;
  bucket=s.bucket??bucket;
  collection=s.collection??collection;
  ranking=s.ranking??ranking;
  totalFishingCount=s.totalFishingCount??totalFishingCount;
  gradeCounts=s.gradeCounts??gradeCounts;
  completedAchievements=s.completedAchievements??completedAchievements;
  marketHour=s.marketHour??marketHour;
  marketRates=s.marketRates??marketRates;
  notifications=s.notifications??notifications;
  messages=Array.isArray(s.messages)?s.messages:messages;
  researchLevels=normalizeResearchLevels(s.researchLevels??researchLevels);
  unlockedTitles=Array.isArray(s.unlockedTitles)?s.unlockedTitles:unlockedTitles;
  equippedTitle=s.equippedTitle??equippedTitle;
  seenUpdateNoticeIds=normalizeUpdateNoticeIds(s.seenUpdateNoticeIds, s.lastSeenUpdateVersion);
  bossProgress=normalizeBossProgress(s.bossProgress??bossProgress);
}


async function checkGameVersion(){
  try{
    const ref = db.collection("config").doc("game");
    const snap = await ref.get();

    if(!snap.exists){
      await ref.set({gameVersion: GAME_VERSION});
      return true;
    }

    const serverVersion = snap.data().gameVersion || GAME_VERSION;

    if(serverVersion !== GAME_VERSION){
      print("구버전 게임입니다.\n\n현재 버전 : " + GAME_VERSION + "\n최신 버전 : " + serverVersion + "\n\n최신 버전으로 업데이트 후 접속해주세요.");

async function removeRealtimeNotification(matchText){
  if(!currentUser || !matchText) return;

  try{
    const ref = db.collection("users").doc(currentUser);

    await db.runTransaction(async (tx)=>{
      const snap = await tx.get(ref);
      if(!snap.exists) return;

      const data = snap.data();
      const state = data.gameState || {};
      const list = Array.isArray(state.notifications) ? state.notifications : [];

      const filtered = list.filter(msg => !String(msg).includes(matchText));
      if(filtered.length === list.length) return;

      tx.set(ref, {
        gameState: {
          ...state,
          notifications: filtered
        },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    notifications = (notifications || []).filter(msg => !String(msg).includes(matchText));
    saveGame();
  }catch(e){
    console.error(e);
  }
}

function getUnreadUpdateNotices(){
  seenUpdateNoticeIds = normalizeUpdateNoticeIds(seenUpdateNoticeIds, "");
  return UPDATE_NOTICES.filter(n => !seenUpdateNoticeIds.includes(n.id));
}

function buildUpdateNoticeText(list){
  let s = UPDATE_NOTICE_TITLE + "\n\n";

  list.forEach((notice, noticeIndex)=>{
    s += "[" + notice.title + "]\n";
    s += "버전 : " + notice.id + "\n\n";
    s += "────┬────────────────────\n";

    notice.lines.forEach((line,i)=>{
      s += rankNumber(i+1) + "│" + line + "\n";
      if(i !== notice.lines.length - 1) s += "────┼────────────────────\n";
    });

    s += "────┴────────────────────";

    if(noticeIndex !== list.length - 1){
      s += "\n\n────────────────────\n\n";
    }
  });

  return s;
}

async function markUpdateNoticesRead(list){
  seenUpdateNoticeIds = normalizeUpdateNoticeIds(seenUpdateNoticeIds, "");

  list.forEach(n => {
    if(!seenUpdateNoticeIds.includes(n.id)) seenUpdateNoticeIds.push(n.id);
  });

  saveGame();
  if(currentUser) await saveCloudData();
}

  const summary = "새로운 업데이트가 " + unread.length + "개 있습니다.";
  const modalContent = buildUpdateNoticeText(unread);

  log.innerHTML += title + "\n\n" + summary + "\n\n" +
    `<button class="openBtn" id="${id}">업데이트 전체보기</button>` + "\n\n";

      // 업데이트는 전체보기를 누르면 읽음 처리됩니다.
    };
  }, 0);
}

}

function buildRankSection(title, list, type){
  let s = "[" + title + "]\n";
  s += "────────────────────\n";

  if(list.length === 0){
    s += "등록된 유저가 없습니다.\n";
    s += "────────────────────\n";
    return s;
  }

  list.forEach((u,i)=>{
    if(type === "money"){
      s += rankNumber(i+1) + " | " + formatUserName(u.nickname, u.title) + " : " + formatMoney(u.money || 0) + "\n";
    } else {
      s += rankNumber(i+1) + " | " + formatUserName(u.nickname, u.title) + " : Lv." + (u.rodLevel || 1) + "\n";
    }

    s += "────────────────────\n";
  });

  return s;
}

async function announceEternalCatch(fish){
  if(!currentUser || !["영원","공허"].includes(fish.grade)) return;

  try{
    await db.collection("serverAlerts").add({
      type: "eternalCatch",
      nickname: currentUser,
      title: getCurrentTitle(),
      fishName: fish.name,
      fishGrade: fish.grade,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: Date.now()
    });
  }catch(e){
    console.error(e);
  }
}

function startServerAlertListener(){
  if(!currentUser) return;
  if(serverAlertUnsubscribe) serverAlertUnsubscribe();

  serverAlertStartTime = Date.now();

  serverAlertUnsubscribe = db.collection("serverAlerts")
    .orderBy("createdAtMillis", "desc")
    .limit(10)
    .onSnapshot(snapshot => {
      snapshot.docChanges().forEach(change => {
        if(change.type !== "added") return;

        const data = change.doc.data();
        if(!data || (data.createdAtMillis || 0) <= serverAlertStartTime) return;

        if(data.type === "eternalCatch"){
          if(data.nickname === currentUser) return;

          const sender = formatUserName(data.nickname, data.title);
          const fishName = displayFishName(data.fishName);

          print("📢 알림\n\n" + sender + " 님이 " + color(fishName, data.fishGrade || "영원") + objParticle(data.fishName) + " 낚았습니다.");
          return;
        }

        if(data.type === "moneyTransfer"){
          if(data.to !== currentUser) return;

          const sender = formatUserName(data.from, data.fromTitle);
          const amountText = Number(data.amount || 0).toLocaleString() + "원을 송금했습니다.";

          print("📢 알림\n\n" + sender + " 님이 " + amountText);
          removeRealtimeNotification(amountText);
          setTimeout(() => refreshMyCloudData(), 300);
          return;
        }

        if(data.type === "fishTransfer"){
          if(data.to !== currentUser) return;

          const sender = formatUserName(data.from, data.fromTitle);
          const fish = {
            grade: data.fishGrade,
            name: data.fishName,
            size: data.fishSize ?? null
          };
          const fishText = lineFish(fish) + objParticle(data.fishName) + " 전송했습니다.";

          print("📢 알림\n\n" + sender + " 님이 " + color(lineFish(fish), fish.grade) + objParticle(data.fishName) + " 전송했습니다.");
          removeRealtimeNotification(fishText);
          setTimeout(() => refreshMyCloudData(), 300);
          return;
        }

        if(data.type === "userMessage"){
          if(data.to !== currentUser) return;

          const sender = formatUserName(data.from, data.fromTitle);
          const body = safeMessageText(data.text);

          print(sender + " 님이 메세지를 보냈습니다.\n\n" + body);
          setTimeout(() => {
            refreshMyCloudData().then(() => {
              messages = (messages || []).filter(m => {
                if(data.messageId && m.id === data.messageId) return false;

                return !(
                  m.from === data.from &&
                  m.text === data.text &&
                  Math.abs((m.createdAtMillis || 0) - (data.createdAtMillis || 0)) < 5000
                );
              });
              saveGame();
            });
          }, 300);
          return;
        }
      });
    }, e => {
      console.error(e);
    });
}

function stopServerAlertListener(){
  if(serverAlertUnsubscribe){
    serverAlertUnsubscribe();
    serverAlertUnsubscribe = null;
  }
}


function fullWidthNumber(n,len=4){
  const fw=["０","１","２","３","４","５","６","７","８","９"];
  return String(n).padStart(len,"0").split("").map(x=>fw[Number(x)]).join("");
}
function formatMoney(n){ return Math.floor(n).toLocaleString()+"원"; }
function formatSize(s){ return s === null ? "" : Number(s).toFixed(1); }

function hasBatchim(word){
  if(!word) return false;
  const ch = word[word.length - 1];
  const code = ch.charCodeAt(0);
  if(code < 0xAC00 || code > 0xD7A3) return false;
  return (code - 0xAC00) % 28 !== 0;
}

function objParticle(word){
  return hasBatchim(word) ? "을" : "를";
}

function subjectParticle(word){
  return hasBatchim(word) ? "이" : "가";
}

function formatDateTime(ms){
  const d = new Date(ms || Date.now());
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  const h = String(d.getHours()).padStart(2,"0");
  const min = String(d.getMinutes()).padStart(2,"0");
  return y + "-" + m + "-" + day + " " + h + ":" + min;
}

function safeMessageText(text){

function getMarketHour(){
  return Math.floor(Date.now() / (1000 * 60 * 10));
}

function getMarketTargets(){
  const targetGrades = ["전설","신화","초월","영원"];
  return targetGrades.flatMap(g => fishByGrade[g].map(name => ({name, grade:g})));
}

function getFishGradeByName(name){
  for(const grade of Object.keys(fishByGrade)){
    if(fishByGrade[grade].includes(name)) return grade;
  }
  return "";
}

function refreshMarketIfNeeded(){
  const nowHour = getMarketHour();
  if(marketHour === nowHour && marketRates && Object.keys(marketRates).length === 10) return;

  const targets = getMarketTargets();
  const selected = [];
  const count = Math.min(10, targets.length);

  while(selected.length < count){
    const pick = targets[Math.floor(Math.random() * targets.length)];
    if(!selected.some(x => x.name === pick.name)) selected.push(pick);
  }

  const bonusOptions = [20, 50, 100, 200];
  marketRates = {};
  selected.forEach(x => {
    marketRates[x.name] = bonusOptions[Math.floor(Math.random() * bonusOptions.length)];
  });

  marketHour = nowHour;
  saveGame();
}

function getMarketBonus(name){
  refreshMarketIfNeeded();
  return marketRates[name] || 0;
}

function applyMarketPrice(f){
  const bonus = getMarketBonus(f.name);
  return Math.floor(f.price * (1 + bonus / 100) * getAppraisalMultiplier());
}

function getNextMarketMinutes(){
  const next = (getMarketHour() + 1) * 1000 * 60 * 10;
  return Math.max(0, Math.ceil((next - Date.now()) / (1000 * 60)));
}

function buildMarketText(){
  refreshMarketIfNeeded();

  let s = "현재 시세\n\n";
  const entries = Object.entries(marketRates);

  if(entries.length === 0){
    s += "현재 적용 중인 시세가 없습니다.\n";
  } else {
    const marketGradeOrder = {"영원":0,"초월":1,"신화":2,"전설":3};

    entries.sort((a,b)=>{
      const gradeA = getFishGradeByName(a[0]);
      const gradeB = getFishGradeByName(b[0]);

      return (marketGradeOrder[gradeA] ?? 99) - (marketGradeOrder[gradeB] ?? 99)
        || b[1] - a[1]
        || a[0].localeCompare(b[0],"ko");
    });

    s += "────┬────────────────────\n";

    entries.forEach(([name, bonus], i)=>{
      const grade = getFishGradeByName(name);
      const discovered = !!collection[name];

      const shownGrade = discovered ? grade : "???";
      const shownName = discovered ? displayFishName(name) : "???";
      const line = "[" + shownGrade + "] " + shownName + " +" + bonus + "%";

      s += fullWidthNumber(i+1) + "│" + color(line, discovered ? grade : "") + "\n";

      if(i !== entries.length - 1){
        s += "────┼────────────────────\n";
      }
    });

    s += "────┴────────────────────";
  }

  s += "\n\n다음 갱신까지 : 약 " + getNextMarketMinutes() + "분";
  return s;
}

  printPreview("시세", "현재 시세 대상 : " + Object.keys(marketRates).length + "종\n다음 갱신까지 : 약 " + getNextMarketMinutes() + "분", "시세 전체보기", buildMarketText());

const MAX_RESEARCH = 10;
const researchCostTable = [
  100000000,
  300000000,
  1000000000,
  3000000000,
  10000000000,
  30000000000,
  100000000000,
  300000000000,
  1000000000000,
  3000000000000
];

function getResearchCost(level){
  if(level >= MAX_RESEARCH) return null;
  return researchCostTable[level] || researchCostTable[researchCostTable.length - 1];
}

function getFishingResearchLevel(){
  return Math.min(MAX_RESEARCH, researchLevels.fishing || 0);
}

function getAppraisalResearchLevel(){
  return Math.min(MAX_RESEARCH, researchLevels.appraisal || 0);
}

function getFishingTimeReduction(){
  return getFishingResearchLevel() * 5;
}

function getFishingTimeMultiplier(){

  const maxed = level >= MAX_RESEARCH;
  let s = fullWidthNumber(num) + "│" + name + " Lv." + level + (maxed ? " [MAX]" : "") + "\n";
  s += "    효과 : " + effectText + "\n";
  s += "    비용 : " + (maxed ? "최대 레벨" : formatMoney(getResearchCost(level)));

}

function upgradeResearch(which){
  let key = "";
  let name = "";

  if(which === 1){
    key = "fishing";
    name = "낚시 기술 연구";
  } else if(which === 2){
    key = "appraisal";
    name = "감정 연구";
  } else {
    return print("사용법 : 연구소1 강화 / 연구소2 강화");
  }

  const level = Math.min(MAX_RESEARCH, researchLevels[key] || 0);

  if(level >= MAX_RESEARCH){
    return print(name + "는 이미 최대 레벨입니다.\nLv." + MAX_RESEARCH + " [MAX]");
  }

  const cost = getResearchCost(level);

  if(money < cost){
    return print("돈이 부족합니다.\n연구 비용 : " + formatMoney(cost));
  }

  money -= cost;
  researchLevels[key] = level + 1;
  saveGame();

  let effect = "";
  if(key === "fishing"){
    effect = "낚시시간 -" + getFishingTimeReduction() + "%";
  } else {
    effect = "판매가 +" + getAppraisalBonus() + "%";
  }

  print(name + " 강화 완료\n\nLv." + level + " → Lv." + researchLevels[key] + "\n효과 : " + effect + "\n사용 금액 : " + formatMoney(cost));
}

function hpBar(current,max,size=10){
  current = Math.max(0, Number(current || 0));
  max = Math.max(1, Number(max || 1));
  const ratio = Math.max(0, Math.min(1, current / max));
  const filled = Math.round(ratio * size);
  return "[" + "█".repeat(filled) + "░".repeat(size - filled) + "] " + Math.floor(current).toLocaleString() + " / " + Math.floor(max).toLocaleString();
}

function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

function getSizeRatio(f){
  const range = sizeData[f.name];
  if(f.size === null || !Array.isArray(range)) return 0.5;
  const min = range[0], max = range[1];
  if(max <= min) return 0.5;
  return clamp((Number(f.size) - min) / (max - min), 0, 1);
}

function weightedRandomBySize(min,max,ratio){
  const roll = (Math.random() + Math.random() + ratio) / 3;
  return Math.floor(min + (max - min) * clamp(roll,0,1));
}

function randomInt(min,max){
  return Math.floor(min + Math.random() * (max - min + 1));
}

function randomDodgeBySize(f){
  if(["영원","공허"].includes(f.grade)) return Math.round((10 + Math.random() * 20) * 10) / 10;
  const ratio = getSizeRatio(f);
  const base = 20 - ratio * 18;
  const noise = (Math.random() * 6) - 3;
  return Math.round(clamp(base + noise, 1, 20) * 10) / 10;
}

function rollDodgeByStar(tier, ratio=0.5){
  let min = 1;
  let max = 10;

  if(tier === 1){
    min = 10;
    max = 15;
  } else if(tier === 2){
    min = 15;
    max = 25;
  } else if(tier === 3){
    min = 25;
    max = 45;
  }

  const value = min + (max - min) * clamp((Math.random() + Math.random() + ratio) / 3, 0, 1);
  return Math.round(value * 10) / 10;
}

function rollStarTier(){
  const r = Math.random() * 100;
  if(r < 2) return 3;
  if(r < 10) return 2;
  if(r < 30) return 1;
  return 0;
}

function starText(tier){
  if(tier === 3) return " ★★★";
  if(tier === 2) return " ★★";
  if(tier === 1) return " ★";
  return "";
}

function rollByStarRange(min,max,tier,ratio=0.5){
  const multiplier = tier === 3 ? 20 : tier === 2 ? 7 : tier === 1 ? 3 : 1;
  const scaledMin = min * multiplier;
  const scaledMax = max * multiplier;

  if(tier === 0){
    return weightedRandomBySize(min, max, ratio);
  }

  return randomInt(Math.floor(scaledMin), Math.floor(scaledMax));
}
function rollCritRateByStar(tier){
  if(tier === 3) return Math.round((40 + Math.random() * 10) * 10) / 10;
  if(tier === 2) return Math.round((30 + Math.random() * 10) * 10) / 10;
  if(tier === 1) return Math.round((20 + Math.random() * 10) * 10) / 10;
  return Math.round((10 + Math.random() * 10) * 10) / 10;
}

function rollCritDamageByStar(tier){
  if(tier === 3) return randomInt(450, 500);
  if(tier === 2) return randomInt(350, 450);
  if(tier === 1) return randomInt(250, 350);
  return randomInt(150, 250);
}

function rerollCritStats(f){
  const c = ensureCombatStats(f);
  if(f.grade === "쓰레기") return c;

  if(!c.stars) c.stars = {attack:0,hp:0,dodge:0,critRate:0,critDamage:0};

  c.stars.critRate = rollStarTier();
  c.stars.critDamage = rollStarTier();
  c.critRate = rollCritRateByStar(c.stars.critRate);
  c.critDamage = rollCritDamageByStar(c.stars.critDamage);

  return c;
}


function makeCombatStats(f){
  if(!f || f.grade === "쓰레기"){
    return {attack:0, hp:0, maxHp:0, dodge:0, critRate:0, critDamage:0, status:"전투 불가", combatVersion:COMBAT_VERSION, stars:{attack:0,hp:0,dodge:0,critRate:0,critDamage:0}};
  }

  const atkRange = combatAttackRanges[f.grade] || [10,50];
  const hpRange = combatHpRanges[f.grade] || [50,200];
  const ratio = getSizeRatio(f);

  const stars = {
    attack:rollStarTier(),
    hp:rollStarTier(),
    dodge:rollStarTier(),
    critRate:rollStarTier(),
    critDamage:rollStarTier()
  };

  const attack = rollByStarRange(atkRange[0], atkRange[1], stars.attack, ratio);
  const hp = rollByStarRange(hpRange[0], hpRange[1], stars.hp, 0.5);

  const dodge = rollDodgeByStar(stars.dodge, ratio);

  const critRate = rollCritRateByStar(stars.critRate);
  const critDamage = rollCritDamageByStar(stars.critDamage);

  return {
    attack:attack,
    hp:hp,
    maxHp:hp,
    dodge:dodge,
    critRate:critRate,
    critDamage:critDamage,
    status:"정상",
    combatVersion:COMBAT_VERSION,
    stars:stars
  };
}

function getStunMinutes(grade){
  return 10;
}

function formatRemain(ms){
  const sec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if(m <= 0) return s + "초";
  return m + "분 " + String(s).padStart(2, "0") + "초";
}

function updateRecoveringFishHp(f){
  const c = ensureCombatStats(f);

  if(c.status === "기절") c.status = "회복 중";

  if(c.status !== "회복 중") return false;

  const now = Date.now();
  const maxHp = Math.max(1, c.maxHp || 1);

  if(!c.stunUntil){
    c.status = "정상";
    c.hp = maxHp;
    delete c.recoveryStartAt;
    delete c.recoveryStartHp;
    return true;
  }

  const recoveryStartAt = Number(c.recoveryStartAt || (c.stunUntil - getStunMinutes(f.grade) * 60 * 1000));
  const recoveryStartHp = Number(c.recoveryStartHp || 0);
  const duration = Math.max(1, c.stunUntil - recoveryStartAt);
  const ratio = clamp((now - recoveryStartAt) / duration, 0, 1);

  if(ratio >= 1){
    c.status = "정상";
    c.hp = maxHp;
    delete c.stunUntil;
    delete c.recoveryStartAt;
    delete c.recoveryStartHp;
    return true;
  }

  const newHp = Math.max(1, Math.floor(recoveryStartHp + (maxHp - recoveryStartHp) * ratio));
  if(newHp !== c.hp){
    c.hp = Math.min(maxHp, newHp);
    return true;
  }

  return false;
}

function recoverStunnedFish(){
  let changed = false;

  bucket.forEach(f => {
    if(updateRecoveringFishHp(f)) changed = true;
  });

  if(changed) saveGame();
}


function ensureCombatStats(f){
  if(!f.combat) f.combat = makeCombatStats(f);

  if(f.grade === "쓰레기"){
    f.combat.status = "전투 불가";
    f.combat.attack = 0;
    f.combat.hp = 0;
    f.combat.maxHp = 0;
    f.combat.dodge = 0;
    f.combat.critRate = 0;
    f.combat.critDamage = 0;
    f.combat.combatVersion = COMBAT_VERSION;
    f.combat.stars = {attack:0,hp:0,dodge:0,critRate:0,critDamage:0};
    return f.combat;
  }

  if(!f.combat.stars) f.combat.stars = {attack:0,hp:0,dodge:0,critRate:0,critDamage:0};
  if(!f.combat.maxHp) f.combat.maxHp = f.combat.hp || 1;
  if(f.combat.hp === undefined || f.combat.hp === null) f.combat.hp = f.combat.maxHp;
  if(f.combat.critRate === undefined || f.combat.critDamage === undefined){
    rerollCritStats(f);
  }
  if(!f.combat.status) f.combat.status = "정상";

  return f.combat;
}

function migrateCombatStatsToCurrentVersion(){
  const targetVersion = COMBAT_VERSION;
  let changed = false;

  bucket.forEach(f => {
    if(!f) return;

    const currentVersion = Number((f.combat && f.combat.combatVersion) || 0);

    if(currentVersion < targetVersion){
      f.combat = makeCombatStats(f);
      f.combat.combatVersion = targetVersion;
      changed = true;
    }
  });

  if(changed) saveGame();
}

  if(stat === "attack") return combatAttackRanges[grade] || [0,1];
  if(stat === "hp") return combatHpRanges[grade] || [0,1];
  if(stat === "dodge") return [1,45];

function getBossById(id){
  return bossList.find(b => b.id === id) || bossList[0];
}

function isBossUnlocked(boss){
  const idx = bossList.findIndex(b => b.id === boss.id);
  if(idx <= 0) return true;
  const prev = bossList[idx - 1];
  return !!bossProgress.defeated[prev.id];
}

function getSelectedBossId(){
  const selected = getBossById(bossProgress.selectedBossId);

  if(bossProgress.selectedBossId && selected && isBossUnlocked(selected)){
    return selected.id;
  }

  return getCurrentBoss().id;
}

function getCurrentBoss(){
  const selected = getBossById(bossProgress.selectedBossId);

  if(bossProgress.selectedBossId && selected && isBossUnlocked(selected)){
    return selected;
  }

  for(const boss of bossList){
    if(isBossUnlocked(boss) && !bossProgress.defeated[boss.id]){
      bossProgress.selectedBossId = boss.id;
      if(!bossProgress.hp[boss.id]) bossProgress.hp[boss.id] = boss.hp;
      return boss;
    }
  }

  const first = bossList[0];
  bossProgress.selectedBossId = first.id;
  if(!bossProgress.hp[first.id]) bossProgress.hp[first.id] = first.hp;
  return first;
}

function selectBoss(n){
  const boss = bossList[Number(n)-1];

  if(!boss) return print("존재하지 않는 보스 번호입니다.");
  if(!isBossUnlocked(boss)) return print("아직 해금되지 않은 보스입니다.");

  bossProgress.selectedBossId = boss.id;
  if(!bossProgress.hp[boss.id]) bossProgress.hp[boss.id] = boss.hp;
  saveGame();

  print(bossColor(boss.name, boss) + "을 선택했습니다.");
}

function getBossHp(boss){
  if(!bossProgress.hp[boss.id]) bossProgress.hp[boss.id] = boss.hp;
  return Math.max(0, bossProgress.hp[boss.id]);
}

function getBossStatus(boss){
  if(!isBossUnlocked(boss)) return "잠김";
  const left = getBossCooldownLeft(boss.id);
  if(left > 0) return "쿨타임 " + formatRemain(left);
  return bossProgress.defeated[boss.id] ? "처치 완료 / 재도전 가능" : "도전 가능";
}

function addMaterial(name,count){
  bossProgress.materials[name] = (bossProgress.materials[name] || 0) + count;
}
function isBossFirstClear(boss){
  return !(bossProgress.defeated && bossProgress.defeated[boss.id]);
}

function getBossClearReward(boss){
  return isBossFirstClear(boss) ? (boss.reward || 0) : 0;
}

function prepareBossFish(displayNumber){
  if(!isBossMenu) return print("보스전에서만 사용할 수 있습니다.");
  recoverStunnedFish();

  const idx = getBucketIndexByDisplayNumber(displayNumber);
  if(idx < 0 || !bucket[idx]) return print("존재하지 않는 번호입니다.");
  if(bossPrepIndexes.includes(idx)) return print("이미 준비된 물고기입니다.");
  if(bossPrepIndexes.length >= 5) return print("전투 준비는 최대 5마리까지 가능합니다.");

  const f = bucket[idx];
  const c = ensureCombatStats(f);

  if(f.grade === "쓰레기") return print("쓰레기 등급은 전투에 참가할 수 없습니다.");
  if(c.status === "기절") c.status = "회복 중";

  bossPrepIndexes.push(idx);
  pendingRecoveryBattleConfirm = false;
  saveGame();

  let msg = color(lineFish(f), f.grade) + "\n\n전투 준비 완료\n\n" + bossPrepIndexes.length + " / 5";
  if(c.status === "회복 중"){
    msg += "\n\n주의 : 이 물고기는 회복 중입니다.";
  }
  print(msg);
}

function unprepareBossFish(displayNumber){
  if(!isBossMenu) return print("보스전에서만 사용할 수 있습니다.");

  const idx = getBucketIndexByDisplayNumber(displayNumber);
  const pos = bossPrepIndexes.indexOf(idx);

  if(pos < 0) return print("준비 목록에 없는 물고기입니다.");

  const f = bucket[idx];
  bossPrepIndexes.splice(pos,1);
  saveGame();

  print(color(lineFish(f), f.grade) + "\n\n전투 준비 해제");
}

function calcDamage(attackerAttack, critRate, critDamage){
  let damage = attackerAttack;
  const crit = Math.random() * 100 < critRate;
  if(crit) damage = Math.floor(damage * (critDamage / 100));
  return {damage, crit};
}

function stunFish(f){
  const c = ensureCombatStats(f);
  c.hp = 0;
  c.status = "회복 중";
  c.recoveryStartAt = Date.now();
  c.recoveryStartHp = 0;
  c.stunUntil = Date.now() + getStunMinutes(f.grade) * 60 * 1000;
}


function pickBossPattern(boss){
  const r = Math.random() * 100;

  if(boss.id === "kraken"){
    if(r < 25) return "tentacle";
    if(r < 40) return "ink";
  }

  if(boss.id === "leviathan"){
    if(r < 25) return "pressure";
    if(r < 40) return "slash";
  }

  return "normal";
}

function getBossCooldownLeft(bossId=null){
  const id = bossId || getCurrentBoss().id;
  const cooldowns = bossProgress.cooldowns || {};
  return Math.max(0, (cooldowns[id] || 0) - Date.now());
}

function isBossCooldownActive(bossId=null){
  return getBossCooldownLeft(bossId) > 0;
}

function setBossCooldown(bossId=null){
  const id = bossId || getCurrentBoss().id;
  if(!bossProgress.cooldowns) bossProgress.cooldowns = {};
  bossProgress.cooldowns[id] = Date.now() + 5 * 60 * 1000;
}


function getAlivePreparedFishes(){
  return bossPrepIndexes
    .map(idx => bucket[idx])
    .filter(f => {
      if(!f || f.grade === "쓰레기") return false;
      updateRecoveringFishHp(f);
      const c = ensureCombatStats(f);
      if(c.status === "회복 중" && c.hp <= 0) c.hp = 1;
      return c.hp > 0;
    });
}

function getBossAttackMultiplier(boss){
  let multiplier = 1;

  if(boss._enraged){
    multiplier *= 1.3;
  }

  if(boss.id === "jormungandr"){
    const maxBoost = boss._ringCompleted ? 1.0 : 0.5;
    const boost = Math.min(maxBoost, Number(boss._attackBoost || 0));
    multiplier *= (1 + boost);
  }

  return multiplier;
}

function getBossAttackValue(boss, bossAttackMultiplier=1){
  const bonusAttack = Number(boss._bahamutAttackBonus || 0);
  return Math.floor((boss.attack + bonusAttack) * bossAttackMultiplier * getBossAttackMultiplier(boss));
}

function getAliveTargets(targets){
  return targets.filter(f => ensureCombatStats(f).hp > 0 && ensureCombatStats(f).status !== "기절");
}

function applyDamageToFish(f, damage, battleLog, prefix){
  const c = ensureCombatStats(f);
  c.hp = Math.max(0, c.hp - damage);

  let logText = prefix;
  logText += damage.toLocaleString() + " 피해\n\n";
  logText += color(lineFish(f), f.grade) + "\n" + hpBar(c.hp, c.maxHp);
  battleLog.push(logText);

  if(c.hp <= 0){
    stunFish(f);
    battleLog.push(color(lineFish(f), f.grade) + "\n체력이 0이 되어 회복 중입니다.");
  }
}

function bossSingleTargetAttack(boss, targets, battleLog, bossAttackMultiplier=1, skillName="공격", ignoreDodge=false, options={}){
  const alive = getAliveTargets(targets);
  if(alive.length === 0) return;

  const f = alive[Math.floor(Math.random() * alive.length)];
  const c = ensureCombatStats(f);
  const bossAttack = getBossAttackValue(boss, bossAttackMultiplier);
  const dodgeRoll = Math.random() * 100 < c.dodge;

  if(dodgeRoll && !ignoreDodge){
    battleLog.push(bossColor(boss.name, boss) + "의 " + skillName + "\n" + color(lineFish(f), f.grade) + " 회피");
    return;
  }

  const bossHit = calcDamage(bossAttack, boss.critRate, boss.critDamage);

  let prefix = bossColor(boss.name, boss) + "의 " + skillName + "\n";
  if(dodgeRoll && ignoreDodge) prefix += "회피 시도!\n먹물 때문에 회피에 실패했습니다.\n";
  if(bossHit.crit) prefix += "치명타!\n";

  applyDamageToFish(f, bossHit.damage, battleLog, prefix);

  if(ensureCombatStats(f).hp > 0 && options.burn){
    c.burnStacks = Math.min(3, Number(c.burnStacks || 0) + 1);
    battleLog.push(color(lineFish(f), f.grade) + "\n화상 " + c.burnStacks + "중첩");
  }

  if(ensureCombatStats(f).hp > 0 && options.poison){
    c.poisonStacks = Math.min(3, Number(c.poisonStacks || 0) + 1);
    battleLog.push(color(lineFish(f), f.grade) + "\n독 " + c.poisonStacks + "중첩");
  }
}

function bossAllTargetAttack(boss, targets, battleLog, bossAttackMultiplier=1, skillName="전체 공격", options={}){
  const logs = [];
  const bossAttack = getBossAttackValue(boss, bossAttackMultiplier);

  targets.forEach(f => {
    const c = ensureCombatStats(f);
    if(c.hp <= 0 || c.status === "기절") return;

    const dodgeRoll = Math.random() * 100 < c.dodge;
    if(dodgeRoll){
      logs.push(color(lineFish(f), f.grade) + "\n회피");
      return;
    }

    const hit = calcDamage(bossAttack, boss.critRate, boss.critDamage);
    let damage = hit.damage;

    if(options.burnBonus){
      const burn = Number(c.burnStacks || 0);
      if(burn >= 2) damage = Math.floor(damage * 2.0);
      else if(burn >= 1) damage = Math.floor(damage * 1.5);
    }

    c.hp = Math.max(0, c.hp - damage);

    let entry = color(lineFish(f), f.grade) + "\n";
    if(hit.crit) entry += "치명타!\n";
    if(options.burnBonus && (c.burnStacks || 0) > 0) entry += "화상 추가 피해!\n";
    entry += damage.toLocaleString() + " 피해\n";
    entry += hpBar(c.hp, c.maxHp);

    if(c.hp <= 0){
      stunFish(f);
      entry += "\n체력이 0이 되어 회복 중입니다.";
    }

    logs.push(entry);
  });

  if(logs.length > 0) battleLog.push(bossColor(boss.name, boss) + "의 " + skillName + "!\n\n" + logs.join("\n\n"));
}

function applyBossPassiveBeforeFishAttack(boss, damage, battleLog=null){
  if(boss.id === "behemoth") return Math.floor(damage * 0.8);

  if(boss.id === "bahamut"){
    const record = Number(boss._damageRecord || 0);
    if(damage >= record){
      const reduced = Math.floor(damage * 0.5);
      boss._damageRecord = reduced;
      if(battleLog){
        battleLog.push(bossColor(boss.name, boss) + "의 드래곤 스케일\n" + damage.toLocaleString() + " 피해를 " + reduced.toLocaleString() + " 피해로 감소\n피해 기록 : " + reduced.toLocaleString());
      }
      return reduced;
    }
  }

  return damage;
}

function applyPhoenixImmortalityIfNeeded(boss, bossHp, battleLog){
  if(boss.id !== "phoenix") return bossHp;
  if(bossHp > 0) return bossHp;
  if(boss._revived) return bossHp;

  boss._revived = true;
  bossHp = Math.floor(boss.hp * 0.5);
  battleLog.push(bossColor(boss.name, boss) + "의 불사\n체력 50%로 1회 부활했습니다.\n\n" + hpBar(bossHp, boss.hp));
  return bossHp;
}

function applyBossStartTurnEffects(participants, battleLog){
  participants.forEach(f => {
    const c = ensureCombatStats(f);
    if(c.hp <= 0 || c.status === "기절") return;

    const poison = Math.min(3, Number(c.poisonStacks || 0));
    if(poison <= 0) return;

    const damage = Math.floor(c.maxHp * 0.02 * poison);
    c.hp = Math.max(0, c.hp - damage);

    let entry = color(lineFish(f), f.grade) + "\n독 " + poison + "중첩\n";
    entry += damage.toLocaleString() + " 피해\n";
    entry += hpBar(c.hp, c.maxHp);

    if(c.hp <= 0){
      stunFish(f);
      entry += "\n체력이 0이 되어 회복 중입니다.";
    }

    battleLog.push(entry);
  });
}

function applyBossEndTurnPassive(boss, bossHp, battleLog){
  if((boss.id === "hydra" || boss.id === "tiamat") && bossHp > 0){
    const rate = boss.id === "hydra" ? 0.05 : 0.02;
    const heal = Math.floor(boss.hp * rate);
    const before = bossHp;
    bossHp = Math.min(boss.hp, bossHp + heal);
    if(bossHp > before) battleLog.push(bossColor(boss.name, boss) + "가 회복했습니다.\n" + (bossHp - before).toLocaleString() + " 회복\n\n" + hpBar(bossHp, boss.hp));
  }

  if(boss.id === "leviathan" && bossHp > 0 && bossHp <= boss.hp * 0.5 && !boss._enraged){
    boss._enraged = true;
    battleLog.push(bossColor(boss.name, boss) + "이 분노했습니다!\n공격력이 증가했습니다.");
  }

  return bossHp;
}

function spawnBabyDragons(boss, battleLog){
  if(!boss._summons) boss._summons = [];

  for(let i=0;i<3;i++){
    const babyHp = randomInt(100000, 300000);
    const babyAttack = randomInt(10000, 30000);
    boss._summons.push({name:"새끼 용", hp:babyHp, maxHp:babyHp, attack:babyAttack});
  }

  battleLog.push(bossColor(boss.name, boss) + "의 괴수 탄생 (15%)\n새끼 용 3마리를 소환했습니다.");
}

function getAliveSummons(boss){
  return (boss._summons || []).filter(x => x.hp > 0);
}

function fishAttackTargetText(target, boss){
  if(target.type === "boss") return bossColor(boss.name, boss) + "\n" + hpBar(target.hp, boss.hp);
  return target.name + "\n" + hpBar(target.hp, target.maxHp);
}

function babyDragonActions(boss, participants, battleLog){
  const summons = getAliveSummons(boss);
  if(summons.length === 0) return;

  summons.forEach((dragon, i) => {
    const alive = getAliveTargets(participants);
    if(alive.length === 0) return;

    const f = alive[Math.floor(Math.random() * alive.length)];
    const c = ensureCombatStats(f);
    const dodgeRoll = Math.random() * 100 < c.dodge;

    if(dodgeRoll){
      battleLog.push("새끼 용 " + (i+1) + "의 공격\n" + color(lineFish(f), f.grade) + " 회피");
      return;
    }

    applyDamageToFish(f, dragon.attack, battleLog, "새끼 용 " + (i+1) + "의 공격\n");
  });
}

function runBossAction(boss, participants, battleLog){
  if(boss.id === "phoenix"){
    const r = Math.random() * 100;
    if(r < 25) return bossSingleTargetAttack(boss, participants, battleLog, 1, "재의 낙인", false, {burn:true});
    if(r < 40) return bossAllTargetAttack(boss, participants, battleLog, 1.5, "윤회의 불꽃", {burnBonus:true});
    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  if(boss.id === "bahamut"){
    const r = Math.random() * 100;

    if(r < 15){
      bossSingleTargetAttack(boss, participants, battleLog, 3, "메가 플레어", false);
      boss._fishDisabledNextTurn = true;
      battleLog.push(bossColor(boss.name, boss) + "의 메가 플레어 여파\n다음 턴 참가 물고기 전체가 행동할 수 없습니다.");
      return;
    }

    if(r < 40){
      bossSingleTargetAttack(boss, participants, battleLog, 1.5, "용왕의 포효", false);
      boss._bahamutAttackBonus = Number(boss._bahamutAttackBonus || 0) + Math.floor(boss.attack * 0.5);
      battleLog.push(bossColor(boss.name, boss) + "의 공격력이 누적 증가했습니다.\n현재 공격력 : " + (boss.attack + boss._bahamutAttackBonus).toLocaleString());
      return;
    }

    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  if(boss.id === "tiamat"){
    const r = Math.random() * 100;
    if(r < 25) return bossSingleTargetAttack(boss, participants, battleLog, 2, "창세의 바다", false);
    if(r < 40) return spawnBabyDragons(boss, battleLog);
    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  if(boss.id === "jormungandr"){
    const r = Math.random() * 100;
    if(r < 25){
      bossSingleTargetAttack(boss, participants, battleLog, 2, "미드가르드 감기", false);
      boss._ring = Math.min(3, Number(boss._ring || 0) + 1);
      if(boss._ring >= 3 && !boss._ringCompleted){
        boss._ringCompleted = true;
        boss._attackBoost = Math.max(Number(boss._attackBoost || 0), 0.5);
        battleLog.push(bossColor(boss.name, boss) + "의 세계의 고리가 완성되었습니다.\n공격력 증가 한도가 100%로 확장되고 힘이 더 강해졌습니다.");
      } else {
        battleLog.push(bossColor(boss.name, boss) + "의 세계의 고리 " + boss._ring + " / 3");
      }
      return;
    }
    if(r < 40) return bossSingleTargetAttack(boss, participants, battleLog, 1.2, "종말의 독", false, {poison:true});
    return bossSingleTargetAttack(boss, participants, battleLog, 1, "일반 공격", false);
  }

  const skillRoll = Math.random() * 100 < (boss.skillRate || 20);

  if(skillRoll){
    if(boss.id === "kraken") bossSingleTargetAttack(boss, participants, battleLog, 1.5, boss.skillName, false);
    else if(boss.id === "hydra") bossSingleTargetAttack(boss, participants, battleLog, 1.8, boss.skillName, false);
    else if(boss.id === "leviathan") bossAllTargetAttack(boss, participants, battleLog, 1, boss.skillName);
    else if(boss.id === "behemoth") bossSingleTargetAttack(boss, participants, battleLog, 2.5, boss.skillName, false);
    else bossSingleTargetAttack(boss, participants, battleLog, 1, boss.skillName || "공격", false);
  } else {
    if(boss.id === "kraken") bossSingleTargetAttack(boss, participants, battleLog, 1.2, "먹물 난사", true);
    else bossSingleTargetAttack(boss, participants, battleLog, 1, "공격", false);
  }
}

function cleanupBattleEffects(participants){
  participants.forEach(f => {
    const c = ensureCombatStats(f);
    delete c.burnStacks;
    delete c.poisonStacks;
  });
}

function getPreparedRecoveryFishes(){
  return bossPrepIndexes
    .map(idx => bucket[idx])
    .filter(f => f && f.grade !== "쓰레기" && ensureCombatStats(f).status === "회복 중");
}

function runBossBattle(){
  if(!isBossMenu) return print("보스전에 입장한 뒤 사용할 수 있습니다.");
  recoverStunnedFish();

  const selectedBoss = getCurrentBoss();
  if(isBossCooldownActive(selectedBoss.id)) return print("아직 보스전 쿨타임이 남아있습니다.\n\n남은 시간 : " + formatRemain(getBossCooldownLeft(selectedBoss.id)));
  if(bossPrepIndexes.length === 0) return print("준비된 물고기가 없습니다.\n준비 번호 를 입력하세요.");

  const recoveryFishes = getPreparedRecoveryFishes();
  if(recoveryFishes.length > 0 && !pendingRecoveryBattleConfirm){
    let msg = "회복 중인 물고기가 포함되어 있습니다.\n\n";
    recoveryFishes.forEach(f => {
      msg += color(lineFish(f), f.grade) + "\n";
      msg += "상태 : " + getCombatStatusText(f) + "\n\n";
    });
    msg += "회복 중인 물고기도 전투에 참가합니다.\n\n계속하려면 전투 확인 을 입력하세요.";
    pendingRecoveryBattleConfirm = true;
    return print(msg.trim());
  }

  pendingRecoveryBattleConfirm = false;

  const boss = {
    ...getCurrentBoss(),
    _enraged:false,
    _revived:false,
    _damageRecord:0,
    _fishDisabledNextTurn:false,
    _bahamutAttackBonus:0,
    _summons:[],
    _attackBoost:0,
    _ring:0,
    _ringCompleted:false
  };

  if(!isBossUnlocked(boss)) return print("아직 해금되지 않은 보스입니다.");
  if(isBossCooldownActive(boss.id)) return print("아직 보스전 쿨타임이 남아있습니다.\n\n남은 시간 : " + formatRemain(getBossCooldownLeft(boss.id)));

  let bossHp = getBossHp(boss);
  let totalDamage = 0;
  const participants = getAlivePreparedFishes();
  const battleLog = [];
  let result = "처치 실패";
  let rewardMoney = 0;
  let rewardDrop = "";

  if(participants.length === 0) return print("전투 가능한 물고기가 없습니다.");

  cleanupBattleEffects(participants);

  battleLog.push("전투 시작\n\n" + participants.map(f => color(lineFish(f), f.grade) + "\n" + hpBar(ensureCombatStats(f).hp, ensureCombatStats(f).maxHp)).join("\n\n"));

  let turn = 1;
  while(bossHp > 0 && participants.some(f => ensureCombatStats(f).hp > 0 && ensureCombatStats(f).status !== "기절") && turn <= 200){
    boss._fishDisabledThisTurn = !!boss._fishDisabledNextTurn;
    boss._fishDisabledNextTurn = false;

    battleLog.push("턴 " + turn);

    if(boss._fishDisabledThisTurn){
      battleLog.push(bossColor(boss.name, boss) + "의 메가 플레어 여파\n참가 물고기 전체가 이번 턴 행동할 수 없습니다.");
    }

    if(boss.id === "jormungandr"){
      const limit = boss._ringCompleted ? 1.0 : 0.5;
      const before = Number(boss._attackBoost || 0);
      boss._attackBoost = Math.min(limit, before + 0.05);
      if(boss._attackBoost > before){
        battleLog.push(bossColor(boss.name, boss) + "의 세계를 감은 자\n공격력 증가 : +" + Math.round(boss._attackBoost * 100) + "%");
      }
    }

    applyBossStartTurnEffects(participants, battleLog);
    if(!participants.some(f => ensureCombatStats(f).hp > 0 && ensureCombatStats(f).status !== "기절")) break;

    for(const f of participants){
      const c = ensureCombatStats(f);
      if(c.hp <= 0 || c.status === "기절") continue;
      if(bossHp <= 0) break;

      if(boss._fishDisabledThisTurn){
        battleLog.push(color(lineFish(f), f.grade) + "\n메가 플레어의 여파로 행동할 수 없습니다.");
        continue;
      }

      const summons = getAliveSummons(boss);
      const targetSummon = summons.length > 0 ? summons[0] : null;

      if(targetSummon){
        const hit = calcDamage(c.attack, c.critRate, c.critDamage);
        targetSummon.hp = Math.max(0, targetSummon.hp - hit.damage);
        totalDamage += hit.damage;

        let entry = color(lineFish(f), f.grade) + " 공격\n";
        if(hit.crit) entry += "치명타!\n";
        entry += hit.damage.toLocaleString() + " 피해\n\n";
        entry += targetSummon.name + "\n" + hpBar(targetSummon.hp, targetSummon.maxHp);
        battleLog.push(entry);

        if(targetSummon.hp <= 0){
          battleLog.push(targetSummon.name + "을 쓰러뜨렸습니다.");
        }
        continue;
      }

      if(Math.random() * 100 >= boss.dodge){
        const hit = calcDamage(c.attack, c.critRate, c.critDamage);
        let damage = applyBossPassiveBeforeFishAttack(boss, hit.damage, battleLog);
        bossHp = Math.max(0, bossHp - damage);
        totalDamage += damage;

        let entry = color(lineFish(f), f.grade) + " 공격\n";
        if(hit.crit) entry += "치명타!\n";
        if(boss.id === "behemoth" && damage < hit.damage) entry += "베히모스가 피해를 감소시켰습니다.\n";
        entry += damage.toLocaleString() + " 피해\n\n";
        entry += bossColor(boss.name, boss) + "\n" + hpBar(bossHp, boss.hp);
        battleLog.push(entry);

        bossHp = applyPhoenixImmortalityIfNeeded(boss, bossHp, battleLog);
      } else {
        battleLog.push(color(lineFish(f), f.grade) + " 공격\n" + bossColor(boss.name, boss) + " 회피");
      }
    }

    if(bossHp <= 0) break;

    bossHp = applyBossEndTurnPassive(boss, bossHp, battleLog);
    runBossAction(boss, participants, battleLog);
    babyDragonActions(boss, participants, battleLog);

    turn++;
  }

  if(bossHp <= 0){
    result = "처치 성공";
    const firstClear = isBossFirstClear(boss);
    rewardMoney = firstClear ? boss.reward : 0;
    rewardDrop = boss.drop;

    if(rewardMoney > 0){
      money += rewardMoney;
      totalEarned += rewardMoney;
    }

    addMaterial(rewardDrop, 1);
    bossProgress.defeated[boss.id] = true;
    bossProgress.hp[boss.id] = boss.hp;

    if(firstClear){
      battleLog.push("최초 클리어 보상\n" + formatMoney(rewardMoney) + " 획득");
    } else {
      battleLog.push("재도전 클리어\n이미 최초 클리어 보상을 획득한 보스입니다.\n상금은 지급되지 않습니다.");
    }

    const nextBoss = bossList.find(b => isBossUnlocked(b) && !bossProgress.defeated[b.id]);
    if(nextBoss){
      bossProgress.selectedBossId = nextBoss.id;
      if(!bossProgress.hp[nextBoss.id]) bossProgress.hp[nextBoss.id] = nextBoss.hp;
    }
  } else {
    bossProgress.hp[boss.id] = boss.hp;
    battleLog.push(bossColor(boss.name, boss) + "의 체력이 최대 체력으로 회복되었습니다.\n다음 전투는 처음부터 다시 시작됩니다.");
  }

  participants.forEach(f => {
    const c = ensureCombatStats(f);
    if(c.hp > 0){
      c.hp = c.maxHp;
      c.status = "정상";
      delete c.stunUntil;
    }
  });
  cleanupBattleEffects(participants);

  const resultText = buildBattleResultText(boss, participants, totalDamage, result, rewardMoney, rewardDrop, battleLog);
  const summary = buildBattleSummaryText(boss, result, rewardMoney, rewardDrop);

  if(result === "처치 성공"){
    setBossCooldown(boss.id);
  }
  bossPrepIndexes = [];
  saveGame();

  printPreview("전투 종료", summary, "전투 결과", resultText);
}

function buildBattleSummaryText(boss, result, rewardMoney, rewardDrop){
  let s = line() + "\n\n";
  s += bossColor(boss.name, boss) + " " + result + "\n\n";

  if(result === "처치 성공"){
    s += "획득\n\n";
    if(rewardMoney > 0){
      s += "최초 클리어 상금 : " + formatMoney(rewardMoney) + "\n";
    } else {
      s += "상금 : 이미 획득 완료\n";
    }
    s += rewardDrop + " x1\n\n";
  }

  s += line();
  return s;
}

function buildBattleResultText(boss, participants, totalDamage, result, rewardMoney, rewardDrop, battleLog){
  let s = "전투 결과\n\n";
  s += line() + "\n\n";

  if(battleLog && battleLog.length > 0){
    battleLog.forEach((entry,i)=>{
      s += entry + "\n";
      s += "\n" + line() + "\n\n";
    });
  }

  s += "참가 물고기\n\n";

  if(participants.length === 0){
    s += "없음\n";
  } else {
    participants.forEach(f => {
      s += lineFish(f) + " (" + getCombatStatusText(f) + ")\n";
    });
  }

  s += "\n" + line() + "\n\n";
  s += "총 피해\n\n";
  s += totalDamage.toLocaleString() + "\n\n";
  s += line() + "\n\n";
  s += "결과\n\n";
  s += boss.name + " " + result + "\n\n";

  if(result === "처치 성공"){
    s += line() + "\n\n";
    s += "획득\n\n";
    if(rewardMoney > 0){
      s += "최초 클리어 상금 : " + formatMoney(rewardMoney) + "\n";
    } else {
      s += "상금 : 이미 획득 완료\n";
    }
    s += rewardDrop + " x1\n\n";
  }

  s += line();
  return s;
}

function getUpgradeCost(level){
  const points = [
    [1, 1000],[100, 7500],[200, 30000],[300, 150000],[400, 750000],
    [500, 3500000],[600, 15000000],[700, 75000000],[800, 300000000],
    [900, 1500000000],[950, 4000000000],[1000, 7500000000],
    [1100, 15000000000],[1200, 30000000000],[1300, 75000000000],
    [1400, 150000000000],[1500, 300000000000]
  ];

  if(level <= 1) return points[0][1];
  if(level >= MAX_ROD) return points[points.length - 1][1];

  for(let i = 0; i < points.length - 1; i++){
    const [l1, c1] = points[i];
    const [l2, c2] = points[i + 1];

    if(level >= l1 && level <= l2){
      const t = (level - l1) / (l2 - l1);
      return Math.floor(c1 * Math.pow(c2 / c1, t));
    }
  }

  return 1000;
}

function getUpgradeSuccessRate(level){
  if(level >= MAX_ROD) return 0;
  if(level <= 1000){
    const t = (level - 1) / (1000 - 1);
    return Math.max(1, 100 - (99 * t));
  }
  const t = (level - 1000) / (1500 - 1000);
  return Math.max(20, 100 - (80 * t));
}

function getCurrentPlayableMaxRod(){
  return 1200;
}

function getBossMaterialRequirement(level){
  if(level < 1000) return null;
  if(level >= getCurrentPlayableMaxRod()) return "LOCKED";

  let item = "";
  let start = 1000;

  if(level < 1050){ item = "심연의 촉수"; start = 1000; }
  else if(level < 1100){ item = "히드라의 독니"; start = 1050; }
  else if(level < 1150){ item = "리바이어던의 코어"; start = 1100; }
  else if(level < 1200){ item = "고대의 비늘"; start = 1150; }
  else return "LOCKED";

  const amount = Math.floor((level - start) / 25) + 1;
  return {item, amount};
}

function getRequiredBossMaterials(level){
  const req = getBossMaterialRequirement(level);
  if(!req || req === "LOCKED") return [];
  return [{name:req.item, count:req.amount}];
}

function hasRequiredBossMaterials(level){
  return getRequiredBossMaterials(level).every(m => (bossProgress.materials[m.name] || 0) >= m.count);
}

function formatRequiredBossMaterials(level){
  const req = getRequiredBossMaterials(level);
  if(req.length === 0) return "";
  return req.map(m => m.name + " x" + m.count).join("\n");
}

function consumeRequiredBossMaterials(level){
  getRequiredBossMaterials(level).forEach(m => {
    bossProgress.materials[m.name] = Math.max(0, (bossProgress.materials[m.name] || 0) - m.count);
  });
}

function getRawGradeChances(){
  if(rodLevel <= 1000){
    const t = (rodLevel - 1) / (1000 - 1);
    return [
      {name:"쓰레기", chance: 18 - 17.5 * t},
      {name:"일반", chance: 55 - 43 * t},
      {name:"희귀", chance: 25 - 1 * t},
      {name:"영웅", chance: 8 + 27 * t},
      {name:"전설", chance: 2.2 + 27.8 * t},
      {name:"신화", chance: 0.7 + 13.3 * t},
      {name:"초월", chance: 0.1 + 6.9 * t},
      {name:"영원", chance: rodLevel >= 400 ? 0.1 + ((rodLevel - 400) / (1000 - 400)) * 1.4 : 0},
      {name:"공허", chance:0}
    ];
  }

  const base = {"쓰레기":0.40,"일반":9.68,"희귀":19.35,"영웅":28.23,"전설":24.19,"신화":11.29,"초월":5.65,"영원":1.21,"공허":0};
  const target = {"쓰레기":0,"일반":4,"희귀":14,"영웅":21,"전설":25,"신화":22,"초월":10,"영원":3,"공허":1};
  const t = Math.min(1, (rodLevel - 1000) / 500);
  return Object.keys(target).map(name => ({name, chance: base[name] + (target[name] - base[name]) * t}));
}

function pickGrade(){
  let chances = getRawGradeChances();
  chances = chances.map(x => ({...x, chance: Math.max(0, x.chance)}));
  let total = chances.reduce((s,g)=>s+g.chance,0);
  let r = Math.random()*total;
  for(const c of chances){
    if(r < c.chance) return grades.find(g=>g.name===c.name);
    r -= c.chance;
  }
  return grades[1];
}

function pickName(grade){
  const list=fishByGrade[grade];
  return list[Math.floor(Math.random()*list.length)];
}

function makeSizeByName(name){
  const range = sizeData[name];
  if(range === null) return null;
  if(Array.isArray(range)){
    const base = Math.random() * (range[1] - range[0]) + range[0];
    return Math.round((base + rodLevel * 0.02) * 10) / 10;
  }
  return Math.round((Math.random()*100 + 10) * 10) / 10;
}

function getEscapeChance(){
  const t = Math.min(1, (rodLevel - 1) / (MAX_ROD - 1));
  return 35 - (34 * t); // Lv.1 = 35%, Lv.1000 = 1%
}

function getCurrentGradeChances(){
  let chances = getRawGradeChances();
  chances = chances.map(x => ({...x, chance: Math.max(0, x.chance)}));
  const total = chances.reduce((s,g)=>s+g.chance,0);
  return chances.map(x => ({name:x.name, chance: total === 0 ? 0 : x.chance / total * 100}));
}

function makePrice(g,size){
  if(g.name==="쓰레기") return Math.floor(Math.random()*30)+1;
  const s = size === null ? 7777 : size;
  return Math.floor(g.basePrice + s*gradePower[g.name]*1000 + Math.random()*g.basePrice*0.4);
}

function addCollection(f){
  if(!collection[f.name]) collection[f.name]={count:0,bestSize:null,bestGrade:f.grade};
  collection[f.name].count++;
  if(f.size !== null){
    if(collection[f.name].bestSize === null || f.size > collection[f.name].bestSize){
      collection[f.name].bestSize=f.size;
      collection[f.name].bestGrade=f.grade;
    }
  }
}

function fish(){
  if(isFishing) return print("이미 낚시 중입니다.");
  isFishing=true;
  const t=(rodLevel-1)/(MAX_ROD-1);
  const timeMultiplier = getFishingTimeMultiplier();
  const minTime=Math.floor((15000-(7000*t)) * timeMultiplier); // Lv1 15초 -> Lv1000 8초, 연구소 적용
  const maxTime=Math.floor((30000-(15000*t)) * timeMultiplier); // Lv1 30초 -> Lv1000 15초, 연구소 적용
  const wait=Math.floor(Math.random()*(maxTime-minTime))+minTime;
  print("낚싯대를 던졌습니다.");
  setTimeout(()=>{
    const g=pickGrade();
    const name=pickName(g.name);
    const size=makeSizeByName(name);
    const price=makePrice(g,size);
    const caught={grade:g.name,name,size,price,locked:false,time:new Date().toLocaleString()};
    caught.combat = makeCombatStats(caught);

    const escapeGrades = ["일반","희귀","영웅","전설","신화"];
    if(escapeGrades.includes(g.name)){
      const escapeChance = getEscapeChance();
      if(Math.random() * 100 < escapeChance){
        totalFishingCount++;
        const newAchievements = updateAchievements();
        checkSpecialTitles();
        saveGame();
        print(color("[" + g.name + "] " + name, g.name) + subjectParticle(name) + " 도주했습니다.");
        printAchievementRewards(newAchievements);
        isFishing=false;
        return;
      }
    }

    bucket.push(caught);
    addCollection(caught);

    totalFishingCount++;
    gradeCounts[g.name] = (gradeCounts[g.name] || 0) + 1;

    const newAchievements = updateAchievements();

    checkSpecialTitles();
    saveGame();
    print(color(lineFish(caught), caught.grade)+objParticle(caught.name)+" 낚았습니다.");
    announceEternalCatch(caught);
    printAchievementRewards(newAchievements);
    isFishing=false;
  }, wait);
}

function sortedBucketList(){
  return bucket.map((fish, originalIndex) => ({fish, originalIndex})).sort((a,b)=>{
    const gradeCompare = gradePower[b.fish.grade] - gradePower[a.fish.grade];
    const nameCompare = a.fish.name.localeCompare(b.fish.name, "ko");

    if(bucketSortOrder === "오름차순"){
      return -gradeCompare || nameCompare;
    }

    return gradeCompare || nameCompare;
  });
}

function getBucketIndexByDisplayNumber(n){
  const list = sortedBucketList();
  const item = list[n-1];
  return item ? item.originalIndex : -1;
}

function sellAll(){
  if(bucket.length===0) return print("팔 물고기가 없습니다.");
  const sell=bucket.filter(f=>!f.locked);
  const keep=bucket.filter(f=>f.locked);
  if(sell.length===0) return print("판매할 수 있는 물고기가 없습니다. 전부 잠금 상태입니다.");
  const baseTotal=sell.reduce((s,f)=>s+f.price,0);
  const total=sell.reduce((s,f)=>s+applyMarketPrice(f),0);
  const bonusTotal=total-baseTotal;

  bucket=keep;
  money+=total;
  totalEarned+=total;
  saveGame();

  let msg = "잠금된 물고기를 제외한\n"+sell.length+"마리를 판매했습니다.\n\n";
  if(bonusTotal > 0){
    msg += "기본가 합계 : "+formatMoney(baseTotal)+"\n";
    msg += "추가 보너스 : +"+formatMoney(bonusTotal)+"\n";
    msg += "최종 판매가 : "+formatMoney(total)+"\n\n";
  }
  msg += "+"+formatMoney(total);
  print(msg);
}

function upgradeOne(){
  if(rodLevel>=getCurrentPlayableMaxRod()) return print(getLockedUpgradeMessage());

  const materialReq = getBossMaterialRequirement(rodLevel);
  if(materialReq === "LOCKED") return print(getLockedUpgradeMessage());

  const cost=getUpgradeCost(rodLevel);
  const rate=getUpgradeSuccessRate(rodLevel);

  if(money<cost) return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(cost));

  if(!hasRequiredBossMaterials(rodLevel)){
    const need = getRequiredBossMaterials(rodLevel)[0];
    const owned = need ? (bossProgress.materials[need.name] || 0) : 0;
    return print("강화 재료가 부족합니다.\n\n필요 : " + need.name + " x" + need.count + "\n보유 : " + owned.toLocaleString() + "개");
  }

  const before=rodLevel;
  const usedMaterials = formatRequiredBossMaterials(before);
  money-=cost;
  consumeRequiredBossMaterials(before);

  if(tryUpgradeSuccess(before)){
    rodLevel++;
    saveGame();
    print("강화 성공\n\nLv."+before+" → Lv."+rodLevel+"\n성공 확률 : "+rate.toFixed(1)+"%\n사용 금액 : "+formatMoney(cost)+(usedMaterials ? "\n사용 재료\n"+usedMaterials : ""));
  } else {
    saveGame();
    print("강화 실패\n\nLv."+before+" → Lv."+rodLevel+"\n성공 확률 : "+rate.toFixed(1)+"%\n사용 금액 : "+formatMoney(cost)+(usedMaterials ? "\n사용 재료\n"+usedMaterials : ""));
  }
}

function upgradeMax(){
  if(rodLevel>=getCurrentPlayableMaxRod()) return print(getLockedUpgradeMessage());

  const before=rodLevel;
  let spent=0;
  let success=0;
  let fail=0;
  let attempts=0;
  let usedMaterials = {};

  while(rodLevel<getCurrentPlayableMaxRod()){
    const cost=getUpgradeCost(rodLevel);
    if(money<cost) break;
    if(!hasRequiredBossMaterials(rodLevel)) break;

    const levelBefore=rodLevel;
    const req = getRequiredBossMaterials(levelBefore);
    req.forEach(m => {
      usedMaterials[m.name] = (usedMaterials[m.name] || 0) + m.count;
    });

    money-=cost;
    consumeRequiredBossMaterials(levelBefore);
    spent+=cost;
    attempts++;

    if(tryUpgradeSuccess(levelBefore)){
      rodLevel++;
      success++;
    } else {
      fail++;
    }

    if(attempts >= 10000) break;
  }

  if(spent===0){
    if(rodLevel>=1000 && !hasRequiredBossMaterials(rodLevel)){
      const need = getRequiredBossMaterials(rodLevel)[0];
      const owned = need ? (bossProgress.materials[need.name] || 0) : 0;
      return print("강화 재료가 부족합니다.\n\n필요 : " + need.name + " x" + need.count + "\n보유 : " + owned.toLocaleString() + "개");
    }

    return print("돈이 부족합니다.\n강화 비용 : "+formatMoney(getUpgradeCost(rodLevel)));
  }

  saveGame();

  let msg = "일괄강화 결과\n\n";
  msg += "Lv."+before+" → Lv."+rodLevel+"\n\n";
  msg += "시도 : "+attempts.toLocaleString()+"회\n";
  msg += "성공 : "+success.toLocaleString()+"회\n";
  msg += "실패 : "+fail.toLocaleString()+"회\n\n";
  msg += "사용 금액 : "+formatMoney(spent)+"\n";

  const materialEntries = Object.entries(usedMaterials);
  if(materialEntries.length > 0){
    msg += "사용 재료\n";
    materialEntries.forEach(([name,count]) => {
      msg += name + " x" + count.toLocaleString() + "\n";
    });
  }

  msg += "남은 돈 : "+formatMoney(money);

  if(rodLevel>=getCurrentPlayableMaxRod()){
    msg += "\n\n현재 버전의 최대 강화 레벨에 도달했습니다.\n추후 업데이트에서 새로운 강화 단계가 추가될 예정입니다.";
  } else if(rodLevel<MAX_ROD && attempts>=10000){
    msg += "\n\n시도 횟수가 너무 많아 자동 중단되었습니다.";
  } else if(rodLevel>=1000 && !hasRequiredBossMaterials(rodLevel)){
    msg += "\n\n강화 재료가 부족하여 중단되었습니다.\n필요 재료\n" + formatRequiredBossMaterials(rodLevel);
  }

  print(msg.trim());
}

  amount = Number(amount);

  if(!targetNickname || !amount || amount <= 0) return print("사용법 : 송금 닉네임 금액");
  if(targetNickname === currentUser) return print("자기 자신에게는 송금할 수 없습니다.");

  isOnlineActionRunning = true;

  try{
    await refreshMyCloudData();

    if(money < amount){
      isOnlineActionRunning = false;
      return print("돈이 부족합니다.");
    }

    const myRef = db.collection("users").doc(currentUser);
    const targetRef = db.collection("users").doc(targetNickname);

    await db.runTransaction(async (tx)=>{
      const mySnap = await tx.get(myRef);
      const targetSnap = await tx.get(targetRef);

      if(!mySnap.exists) throw new Error("MY_ACCOUNT_NOT_FOUND");
      if(!targetSnap.exists) throw new Error("TARGET_NOT_FOUND");

      const myData = mySnap.data();
      const targetData = targetSnap.data();

      const myState = myData.gameState || {};
      const targetState = targetData.gameState || {};
      const currentMoney = myData.money || 0;

      if(currentMoney < amount) throw new Error("NOT_ENOUGH_MONEY");

      const targetNotifications = targetState.notifications || [];
      targetNotifications.push("📢 알림\n\n" + formatCurrentUserName() + " 님이 " + amount.toLocaleString() + "원을 송금했습니다.");

      myState.money = currentMoney - amount;

      tx.set(myRef, {
        money: currentMoney - amount,
        gameState: myState,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});

      tx.set(targetRef, {
        money: (targetData.money || 0) + amount,
        gameState: {...targetState, money:(targetState.money || targetData.money || 0) + amount, notifications: targetNotifications},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "moneyTransfer",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      amount: amount,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: Date.now()
    });

    await refreshMyCloudData();
    print(targetNickname + " 님에게 " + amount.toLocaleString() + "원을 송금하였습니다.");
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else if(e.message === "NOT_ENOUGH_MONEY") print("돈이 부족합니다.");
    else if(e.message === "MY_ACCOUNT_NOT_FOUND") print("현재 계정을 찾을 수 없습니다. 다시 로그인해주세요.");
    else print("송금 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

async function sendFish(targetNickname, displayNumber){
  if(isOnlineActionRunning) return print("처리 중입니다. 잠시만 기다려주세요.");
  if(!currentUser) return print("로그인 후 사용 가능합니다.");

  targetNickname = cleanNickname(targetNickname);

  if(!targetNickname) return print("사용법 : 전송 닉네임 번호");
  if(targetNickname === currentUser) return print("자기 자신에게는 전송할 수 없습니다.");

  isOnlineActionRunning = true;

  try{
    await refreshMyCloudData();

    const idx = getBucketIndexByDisplayNumber(Number(displayNumber));
    if(idx < 0 || !bucket[idx]){
      isOnlineActionRunning = false;
      return print("존재하지 않는 번호입니다.");
    }

    if(bucket[idx].locked){
      isOnlineActionRunning = false;
      return print("잠금된 물고기는 전송할 수 없습니다.");
    }

    const fish = {...bucket[idx], locked:false};

    const myRef = db.collection("users").doc(currentUser);
    const targetRef = db.collection("users").doc(targetNickname);

    await db.runTransaction(async (tx)=>{
      const mySnap = await tx.get(myRef);
      const targetSnap = await tx.get(targetRef);

      if(!mySnap.exists) throw new Error("MY_ACCOUNT_NOT_FOUND");
      if(!targetSnap.exists) throw new Error("TARGET_NOT_FOUND");

      const myData = mySnap.data();
      const targetData = targetSnap.data();

      const myState = myData.gameState || {};
      const targetState = targetData.gameState || {};
      const myBucket = myState.bucket || [];
      const targetBucket = targetState.bucket || [];
      const targetNotifications = targetState.notifications || [];

      const currentList = myBucket.map((fish, originalIndex) => ({fish, originalIndex})).sort((a,b)=>{
        const gradeCompare = gradePower[b.fish.grade] - gradePower[a.fish.grade];
        const nameCompare = a.fish.name.localeCompare(b.fish.name, "ko");

        if(bucketSortOrder === "오름차순"){
          return -gradeCompare || nameCompare;
        }

        return gradeCompare || nameCompare;
      });

      const displayItem = currentList[Number(displayNumber)-1];
      if(!displayItem || !myBucket[displayItem.originalIndex]) throw new Error("FISH_NOT_FOUND");
      if(myBucket[displayItem.originalIndex].locked) throw new Error("FISH_LOCKED");

      const movedFish = {...myBucket.splice(displayItem.originalIndex,1)[0], locked:false};

      targetBucket.push(movedFish);
      targetNotifications.push("📢 알림\n\n" + formatCurrentUserName() + " 님이 " + lineFish(movedFish) + objParticle(movedFish.name) + " 전송했습니다.");

      tx.set(myRef, {
        gameState: {...myState, bucket: myBucket},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});

      tx.set(targetRef, {
        gameState: {...targetState, bucket: targetBucket, notifications: targetNotifications},
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "fishTransfer",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      fishName: fish.name,
      fishGrade: fish.grade,
      fishSize: fish.size,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: Date.now()
    });

    await refreshMyCloudData();
    print(targetNickname + " 님에게 " + lineFish(fish) + objParticle(fish.name) + " 전송하였습니다.");
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else if(e.message === "FISH_NOT_FOUND") print("존재하지 않는 번호입니다.");
    else if(e.message === "FISH_LOCKED") print("잠금된 물고기는 전송할 수 없습니다.");
    else if(e.message === "MY_ACCOUNT_NOT_FOUND") print("현재 계정을 찾을 수 없습니다. 다시 로그인해주세요.");
    else print("전송 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

async function showNewMessages(){
  if(!messages || messages.length === 0) return;

  const list = [...messages].sort((a,b)=>(a.createdAtMillis || 0) - (b.createdAtMillis || 0));

  let full = "메세지\n\n";
  full += "────┬────────────────────\n";

  list.forEach((m,i)=>{
    const sender = formatUserName(m.from || "알 수 없음", m.fromTitle || "");
    full += rankNumber(i+1) + "│" + sender + "\n";
    full += "    " + formatDateTime(m.createdAtMillis || Date.now()) + "\n";
    full += "    " + safeMessageText(m.text) + "\n";
    if(i !== list.length - 1) full += "────┼────────────────────\n";
  });

  full += "────┴────────────────────";

  printPreview(
    "메세지",
    "새로운 메세지가 " + list.length + "개 도착했습니다.",
    "메세지 전체보기",
    full
  );

  messages = [];
  saveGame();
  if(currentUser) await saveCloudData();
}

async function sendMessage(targetNickname){
  if(isOnlineActionRunning) return print("처리 중입니다. 잠시만 기다려주세요.");
  if(!currentUser) return print("로그인 후 사용 가능합니다.");

  targetNickname = cleanNickname(targetNickname);
  if(!targetNickname) return print("사용법 : 메세지 닉네임");
  if(targetNickname === currentUser) return print("자기 자신에게는 메세지를 보낼 수 없습니다.");

  const text = safeMessageText(prompt("보낼 메세지를 입력하세요."));
  if(!text) return print("메세지 전송이 취소되었습니다.");
  if(text.length > 300) return print("메세지는 300자 이하로 입력해주세요.");

  isOnlineActionRunning = true;

  try{
    const targetRef = db.collection("users").doc(targetNickname);
    const targetSnap = await targetRef.get();

    if(!targetSnap.exists){
      isOnlineActionRunning = false;
      return print("존재하지 않는 닉네임입니다.");
    }

    const messageId = "msg_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const payload = {
      id: messageId,
      from: currentUser,
      fromTitle: getCurrentTitle(),
      text: text,
      createdAtMillis: Date.now()
    };

    await db.runTransaction(async (tx)=>{
      const snap = await tx.get(targetRef);
      if(!snap.exists) throw new Error("TARGET_NOT_FOUND");

      const data = snap.data();
      const state = data.gameState || {};
      const targetMessages = Array.isArray(state.messages) ? state.messages : [];

      targetMessages.push(payload);

      tx.set(targetRef, {
        gameState: {
          ...state,
          messages: targetMessages
        },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, {merge:true});
    });

    await db.collection("serverAlerts").add({
      type: "userMessage",
      from: currentUser,
      fromTitle: getCurrentTitle(),
      to: targetNickname,
      text: text,
      messageId: messageId,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMillis: payload.createdAtMillis
    });

    print(targetNickname + " 님에게 메세지를 보냈습니다.\n\n" + text);
  }catch(e){
    console.error(e);
    if(e.message === "TARGET_NOT_FOUND") print("존재하지 않는 닉네임입니다.");
    else print("메세지 전송 중 오류가 발생했습니다.");
  }finally{
    isOnlineActionRunning = false;
  }
}

function requireLoginForCommand(cmd){
  const allowed = ["명령어", "회원가입", "로그인"];

  if(allowed.includes(cmd)) return true;

  // 다른 사람 정보 조회/랭킹도 로그인 없이 막음
  return false;
}

function runCommand(){
  let cmd=input.value.trim();
  input.value="";
  if(!cmd) return;

  // 예전처럼 !를 붙여도 작동하게 호환
  if(cmd.startsWith("!")) cmd = cmd.slice(1).trim();

  print("> "+cmd);

  if(!currentUser && !requireLoginForCommand(cmd)){
    return print("로그인 후 이용 가능합니다.\n\n회원가입 또는 로그인 을 입력하세요.");
  }

  if(!isAllowedInBossMenu(cmd)){
    return blockedBossCommand();
  }

  if(cmd==="명령어") showCommands();
  else if(cmd==="낚시") fish();
  else if(cmd==="양동이") showBucket();
  else if(cmd.startsWith("양동이 ")) showOtherBucket(cmd.split(" ")[1]);
  else if(cmd==="도감") showCollection();
  else if(cmd==="물고기도감") showFishCollection();
  else if(cmd==="코어도감") showCoreCollection();
  else if(cmd==="내정보") showGameInfo();
  else if(cmd.startsWith("정보 ")){ const p=cmd.split(" "); showFishInfo(Number(p[1])); }
  else if(cmd==="정보") print("사용법 : 내정보 / 정보 번호");
  else if(cmd==="보스전") showBossBattle();
  else if(cmd==="보스정보") showBossInfo();
  else if(cmd==="보스목록") showBossList();
  else if(cmd.startsWith("보스선택 ")){ const p=cmd.split(" "); selectBoss(Number(p[1])); }
  else if(cmd==="인벤토리") showInventory();
  else if(cmd.startsWith("준비해제 ")){ const p=cmd.split(" "); unprepareBossFish(Number(p[1])); }
  else if(cmd.startsWith("준비 ")){ const p=cmd.split(" "); prepareBossFish(Number(p[1])); }
  else if(cmd==="전투 확인") runBossBattle();
  else if(cmd==="전투") runBossBattle();
  else if(cmd==="나가기") leaveBossMenu();
  else if(cmd==="연구소") showResearchLab();
  else if(cmd==="연구소1 강화") upgradeResearch(1);
  else if(cmd==="연구소2 강화") upgradeResearch(2);
  else if(cmd==="시세") showMarket();
  else if(cmd==="랭킹") showRanking();
  else if(cmd.startsWith("메세지 ")) sendMessage(cmd.split(" ")[1]);
  else if(cmd==="지갑") showWallet();
  else if(cmd.startsWith("지갑 ")) showOtherWallet(cmd.split(" ")[1]);
  else if(cmd==="업적") showAchievements();
  else if(cmd==="칭호") showTitles();
  else if(cmd.startsWith("칭호 장착 ")) equipTitle(cmd.split(" ")[2]);
  else if(cmd==="칭호 장착해제") unequipTitle();
  else if(cmd==="회원가입") registerUser();
  else if(cmd==="로그인") loginUser();
  else if(cmd==="로그아웃") logoutUser();
  else if(cmd==="탈퇴") deleteAccount();
  else if(cmd.startsWith("송금 ")){ const p=cmd.split(" "); sendMoney(p[1], p[2]); }
  else if(cmd.startsWith("전송 ")){ const p=cmd.split(" "); sendFish(p[1], p[2]); }
  else if(cmd==="강화") upgradeOne();
  else if(cmd==="일괄강화" || cmd==="강화 최대") upgradeMax();
  else if(cmd.startsWith("정렬 ")) sortBucket(cmd.split(" ")[1]);
  else if(cmd==="일괄판매" || cmd==="물고기 일괄판매") sellAll();
  else if(cmd.startsWith("판매 ")) sellOne(Number(cmd.split(" ")[1]));
  else if(cmd.startsWith("물고기 판매 ")) sellOne(Number(cmd.split(" ")[2]));
  else if(cmd.startsWith("잠금해제 ")) lockOne(Number(cmd.split(" ")[1]), false);
  else if(cmd.startsWith("잠금 ")) lockOne(Number(cmd.split(" ")[1]), true);
  else print("없는 명령어입니다. 명령어 를 입력해보세요.");
}

input.addEventListener("keydown", e=>{ if(e.key==="Enter") runCommand(); });

loadGame();

} else {

  checkGameVersion();

  (async function(){
    let startupAchievements = [];

    try{
      const snap = await db.collection("users").doc(currentUser).get();

      if(!snap.exists){
        currentUser = null;
        localStorage.removeItem("textFishingCurrentUser");
        resetGameData();
        updateWallet();
        print("저장된 계정을 찾을 수 없습니다.\n다시 로그인해주세요.");
        return;
      }

      const data = snap.data();
      applyGameState(data.gameState);
      migrateCombatStatsToCurrentVersion();
      updateWallet();

    }catch(e){
      console.error(e);
      print("클라우드 데이터를 불러오지 못했습니다.\n네트워크 상태를 확인한 뒤 다시 로그인해주세요.");

    }

    try{
      refreshMarketIfNeeded();
    }catch(e){
      console.error(e);
    }

    try{
      startupAchievements = updateAchievements();
      checkSpecialTitles();
      saveGame();
      updateWallet();
      printAchievementRewards(startupAchievements);
    }catch(e){
      console.error(e);
    }

    try{
      startServerAlertListener();
    }catch(e){
      console.error(e);
    }

    try{
      await showUpdateNoticeIfNeeded();
    }catch(e){
      console.error(e);
    }

    try{
      await showNewNotifications();
    }catch(e){
      console.error(e);
    }

    try{
      await showNewMessages();
    }catch(e){
      console.error(e);
    }
  })();
}
